// 그 달에 있는 월요일 수 (= 월 단위 주차 최대)
function getWeeksInMonth(year, month) {
  const firstDay = new Date(Date.UTC(year, month - 1, 1));
  const lastDay  = new Date(Date.UTC(year, month, 0));
  const dayOfWeek = firstDay.getUTCDay() || 7;
  const firstMondayDay = 1 + ((8 - dayOfWeek) % 7);
  return Math.max(1, Math.floor((lastDay.getUTCDate() - firstMondayDay) / 7) + 1);
}

// (year, month, weekOfMonth) → ISO (year, week)
function monthWeekToIso(year, month, weekOfMonth) {
  const firstDay = new Date(Date.UTC(year, month - 1, 1));
  const dayOfWeek = firstDay.getUTCDay() || 7;
  const firstMondayOffset = (8 - dayOfWeek) % 7;
  const targetDay = 1 + firstMondayOffset + (weekOfMonth - 1) * 7;
  const target = new Date(Date.UTC(year, month - 1, targetDay));
  return getISOWeek(`${target.getUTCFullYear()}-${pad2(target.getUTCMonth()+1)}-${pad2(target.getUTCDate())}`);
}

// ISO 주차 → 그 주차의 월요일 Date(UTC)
function isoWeekToMonday(year, week) {
  const jan4 = new Date(Date.UTC(year, 0, 4));
  const jan4Day = jan4.getUTCDay() || 7;
  const monday = new Date(jan4);
  monday.setUTCDate(jan4.getUTCDate() - jan4Day + 1 + (week - 1) * 7);
  return monday;
}

// ISO 주차 → "YYYY M월 N주차" 라벨 (월요일이 속한 달 기준 N번째 월요일)
function isoWeekToMonthLabel(year, week) {
  const jan4 = new Date(Date.UTC(year, 0, 4));
  const jan4Day = jan4.getUTCDay() || 7;
  const week1Monday = new Date(jan4);
  week1Monday.setUTCDate(jan4.getUTCDate() - jan4Day + 1);
  const monday = new Date(week1Monday);
  monday.setUTCDate(week1Monday.getUTCDate() + (week - 1) * 7);
  const y = monday.getUTCFullYear();
  const m = monday.getUTCMonth() + 1;
  const d = monday.getUTCDate();
  const weekOfMonth = Math.floor((d - 1) / 7) + 1;
  return { year: y, month: m, weekOfMonth };
}

function aggregateErpReports(reports, period, opts = {}) {
  // 전체: 모든 데이터를 한 묶음으로 합산
  if (period === 'all') {
    const allRecords = [];
    const dates = new Set();
    (reports || []).forEach(rep => {
      if (rep.reportDate) dates.add(rep.reportDate);
      (rep.records || []).forEach(r => allRecords.push(r));
    });
    if (!allRecords.length) return [];
    const datesArr = [...dates].sort();
    const label = datesArr.length === 1
      ? datesArr[0]
      : (datesArr.length > 0 ? `${datesArr[0]} ~ ${datesArr[datesArr.length-1]}` : '전체');
    return [{ key: 'all', label, dates: datesArr, records: allRecords }].map(g => {
      const byFloor = { '2F': {qty:0, amount:0}, '4F': {qty:0, amount:0}, 'OUT': {qty:0, amount:0} };
      const byType = Object.fromEntries(ERP_DEFECT_TYPES.map(t => [t, 0]));
      g.records.forEach(r => {
        const f = classifyErpFloor(r.originProc);
        byFloor[f].qty    += Number(r.qty)    || 0;
        byFloor[f].amount += Number(r.amount) || 0;
        byType[normalizeDefectType(r.typeDetail)] += Number(r.qty) || 0;
      });
      const totalQty    = byFloor['2F'].qty + byFloor['4F'].qty + byFloor['OUT'].qty;
      const totalAmount = byFloor['2F'].amount + byFloor['4F'].amount + byFloor['OUT'].amount;
      return { ...g, byFloor, byType, totalQty, totalAmount };
    });
  }

  // 데이터 사전 필터
  let source = reports || [];
  if (period === 'day') {
    // 어제(오늘-1) 1일치만 표시
    const yesterday = ymdShift(todayYMD(), -1);
    source = source.filter(r => r.reportDate === yesterday);
    if (!source.length) return [];
  } else if (period === 'range') {
    const start = opts.start, end = opts.end;
    source = source.filter(r => {
      if (!r.reportDate) return false;
      if (start && r.reportDate < start) return false;
      if (end   && r.reportDate > end)   return false;
      return true;
    });
  }

  // 그룹화 단위: day/range → 일별, week → 주별, month → 월별
  const groupBy = period === 'week' ? 'week' : period === 'month' ? 'month' : 'day';

  const groups = new Map();
  source.forEach(rep => {
    const date = rep.reportDate;
    if (!date) return;
    let key, label;
    if (groupBy === 'day') {
      key = date;
      const m = Number(date.slice(5,7));
      const d = Number(date.slice(8,10));
      label = `${m}/${d}`;
    } else if (groupBy === 'week') {
      const w = getISOWeek(date);
      key = `${w.year}-W${pad2(w.week)}`;
      const ml = isoWeekToMonthLabel(w.year, w.week);
      label = `${ml.year} ${ml.month}월 ${ml.weekOfMonth}주차`;
    } else {
      const ym = getYearMonth(date);
      key = `${ym.year}-${pad2(ym.month)}`;
      label = `${ym.year}.${pad2(ym.month)}`;
    }
    if (!groups.has(key)) groups.set(key, { key, label, dates: new Set(), records: [] });
    const g = groups.get(key);
    g.dates.add(date);
    rep.records.forEach(r => g.records.push(r));
  });
  return [...groups.values()].sort((a,b) => a.key < b.key ? -1 : 1).map(g => {
    const byFloor = { '2F': {qty:0, amount:0}, '4F': {qty:0, amount:0}, 'OUT': {qty:0, amount:0} };
    const byType = Object.fromEntries(ERP_DEFECT_TYPES.map(t => [t, 0]));
    g.records.forEach(r => {
      const f = classifyErpFloor(r.originProc);
      byFloor[f].qty    += Number(r.qty)    || 0;
      byFloor[f].amount += Number(r.amount) || 0;
      byType[normalizeDefectType(r.typeDetail)] += Number(r.qty) || 0;
    });
    const totalQty    = byFloor['2F'].qty + byFloor['4F'].qty + byFloor['OUT'].qty;
    const totalAmount = byFloor['2F'].amount + byFloor['4F'].amount + byFloor['OUT'].amount;
    return { ...g, dates: [...g.dates].sort(), byFloor, byType, totalQty, totalAmount };
  });
}

function QualitySummaryTab({ data }) {
  const reports = data.erpReports || [];
  const [period, setPeriod] = useState('day');
  const [startDate, setStartDate] = useState('');
  const [endDate, setEndDate]     = useState('');

  const dataRange = useMemo(() => {
    const ds = reports.map(r => r.reportDate).filter(Boolean).sort();
    return { min: ds[0] || '', max: ds[ds.length - 1] || '' };
  }, [reports]);

  useEffect(() => {
    if (!startDate && dataRange.min) setStartDate(dataRange.min);
    if (!endDate   && dataRange.max) setEndDate(dataRange.max);
  }, [dataRange.min, dataRange.max]);

  const [effStart, effEnd] = (startDate && endDate && startDate > endDate) ? [endDate, startDate] : [startDate, endDate];

  const grouped = useMemo(() => aggregateErpReports(reports, period, { start: effStart, end: effEnd }), [reports, period, effStart, effEnd]);

  // 차트용 데이터 — 전체 모드일 때는 일별 grouping으로 풀어서 추세 보여주기
  const chartGrouped = useMemo(() => {
    if (period !== 'all') return grouped;
    const groups = new Map();
    (reports || []).forEach(rep => {
      const date = rep.reportDate;
      if (!date) return;
      const m = Number(date.slice(5,7));
      const d = Number(date.slice(8,10));
      const label = `${m}/${d}`;
      if (!groups.has(date)) groups.set(date, { key: date, label, records: [] });
      (rep.records || []).forEach(r => groups.get(date).records.push(r));
    });
    return [...groups.values()].sort((a, b) => a.key < b.key ? -1 : 1).map(g => ({
      ...g,
      totalQty:    sum(g.records.map(r => Number(r.qty)    || 0)),
      totalAmount: sum(g.records.map(r => Number(r.amount) || 0)),

  }, [grouped, reports, period]);

  // 전체 합계
  const total = useMemo(() => {
    const acc = {
      qty: 0, amount: 0,

      byType: Object.fromEntries(ERP_DEFECT_TYPES.map(t => [t, 0])),

    grouped.forEach(g => {
      acc.qty    += g.totalQty;
      acc.amount += g.totalAmount;

      ERP_DEFECT_TYPES.forEach(t => { acc.byType[t] += g.byType[t]; });

    return acc;

        <div className="p-4 flex items-center justify-between flex-wrap gap-3">
          <div>
            <div className="text-sm font-bold text-slate-800">기간별 종합 지표</div>

                <td className="px-2 py-2.5 text-center text-slate-700 border-r border-slate-200">{total.byFloor['4F'].amount.toLocaleString('ko-KR')}</td>
                <td className="px-2 py-2.5 text-center text-slate-800 border-r border-slate-100">{total.byFloor['OUT'].qty}</td>
                <td className="px-2 py-2.5 text-center text-slate-700 border-r border-slate-200">{total.byFloor['OUT'].amount.toLocaleString('ko-KR')}</td>
                <td className="px-2 py-2.5 text-center text-slate-900 border-r border-slate-100">{total.qty}</td>
                <td className="px-2 py-2.5 text-center text-rose-800">{total.amount.toLocaleString('ko-KR')}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </Card>

      {/* 추세 차트 */}
      <Card>
        <CardHeader title={`${periodLabel} 추세`} />
        <div className="p-5">
          <SummaryTrendChart grouped={chartGrouped} />
        </div>
      </Card>

      {/* 유형 도넛 + 층 막대 */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <Card>
          <CardHeader title="부적합 유형 분포" sub={`${periodLabel} 누적 (건수 기준)`} />
          <div className="p-5">
            <SummaryTypeDonut byType={total.byType} />
          </div>
        </Card>
        <Card>
          <CardHeader title="제조공정 분포" sub={`${periodLabel} 누적 (건수·손실 비교)`} />
          <div className="p-5">
            <SummaryFloorBar byFloor={total.byFloor} />
          </div>
        </Card>
      </div>
    </Fragment>
  );
}

function SummaryStatCard({ label, value, unit, isKRW, sub, color = 'rose', topReason, delay = 0 }) {
  const map = {
    rose:    'from-rose-500 to-pink-500',
    fuchsia: 'from-fuchsia-500 to-violet-500',
    violet:  'from-violet-500 to-indigo-500',
    pink:    'from-pink-500 to-rose-500',
  }[color] || 'from-rose-500 to-pink-500';
  return (
    <Card delay={delay}>
      <div className="p-5 relative overflow-hidden">
        <div className={`absolute -top-12 -right-12 w-36 h-36 rounded-full bg-gradient-to-br ${map} opacity-10 blur-2xl`}></div>
        <div className="relative">
          <div className="text-[11px] text-slate-500 mb-1">{label}</div>
          {topReason ? (
            <Fragment>
              <div className="text-2xl font-bold text-slate-900 truncate" title={topReason.name}>{topReason.name}</div>
              <div className="text-xs text-slate-500 num mt-1">{topReason.qty}건 누적</div>
            </Fragment>
          ) : (
            <Fragment>
              <div className="flex items-baseline gap-1.5">
                <div className="text-3xl font-extrabold text-slate-900">
                  {isKRW ? <span className="num">{fmtKRW(value)}</span> : <CountUp value={value} decimals={0} suffix={unit ? ` ${unit}` : ''} />}
                </div>
              </div>
              {sub && <div className="text-[11px] text-slate-400 mt-1 num">{sub}</div>}
            </Fragment>
          )}
        </div>
      </div>
    </Card>
  );
}

function SummaryTrendChart({ grouped }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    if (!grouped.length) return;
    const ctx = ref.current.getContext('2d');
    const isBar = grouped.length <= 2; // 데이터 적으면 막대로 자동 전환

    let datasets;
    if (isBar) {
      datasets = [
        {
          label: '발생수량 (건)',
          data: grouped.map(g => g.totalQty),
          backgroundColor: '#F43F5E',
          borderRadius: 6,
          barThickness: 36,
          yAxisID: 'y',
          order: 2,
        },
        {
          label: '손실비용 (원)',
          data: grouped.map(g => g.totalAmount),
          backgroundColor: 'rgba(139, 92, 246, 0.55)',
          borderColor: '#8B5CF6',
          borderWidth: 1.5,
          borderRadius: 6,
          barThickness: 36,
          yAxisID: 'y1',
          order: 1,
        }
      ];
    } else {
      const grad = ctx.createLinearGradient(0, 0, 0, 280);
      grad.addColorStop(0, '#F43F5E55'); grad.addColorStop(1, '#F43F5E00');
      datasets = [
        {
          label: '발생수량 (건)',
          data: grouped.map(g => g.totalQty),
          borderColor: '#F43F5E',
          backgroundColor: grad,
          fill: true, tension: 0.35,
          borderWidth: 2.5,
          pointRadius: 4, pointHoverRadius: 6,
          pointBackgroundColor: '#F43F5E', pointBorderColor: '#fff', pointBorderWidth: 2,
          yAxisID: 'y',
        },
        {
          label: '손실비용 (원)',
          data: grouped.map(g => g.totalAmount),
          borderColor: '#8B5CF6',
          borderDash: [4, 3],
          borderWidth: 2,
          pointRadius: 3,
          fill: false, tension: 0.35,
          yAxisID: 'y1',
        },
      ];
    }

    chartRef.current = new Chart(ref.current, {
      type: isBar ? 'bar' : 'line',
      data: { labels: grouped.map(g => g.label), datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 700, easing: 'easeOutQuart' },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 }, color: '#475569' } },
          tooltip: {
            backgroundColor: '#0F172A', padding: 10,
            callbacks: {
              label: (c) => c.dataset.label.includes('손실') ? `손실 ${fmtKRW(c.parsed.y)}` : `발생 ${c.parsed.y}건`
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#64748B', font: { size: 11 } } },
          y: {
            position: 'left',
            beginAtZero: true,
            grid: { color: '#F1F5F9' },
            ticks: { color: '#64748B', font: { size: 11 }, precision: 0 },
            title: { display: true, text: '건', color: '#94A3B8', font: { size: 10 } },
          },
          y1: {
            position: 'right',
            beginAtZero: true,
            grid: { drawOnChartArea: false },
            ticks: { color: '#64748B', font: { size: 11 }, callback: (v) => fmtKRW(v) },
            title: { display: true, text: '원', color: '#94A3B8', font: { size: 10 } },
          }
        }
      }
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [grouped]);
  if (!grouped.length) return <div className="h-64 grid place-items-center text-slate-400 text-sm">데이터 없음</div>;
  return <div className="relative" style={{ height: '300px' }}><canvas ref={ref}></canvas></div>;
}

function SummaryTypeDonut({ byType }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  const entries = ERP_DEFECT_TYPES.map(t => ({ name: t, qty: byType[t] || 0 })).filter(e => e.qty > 0);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    if (!entries.length) return;
    const palette = ['#F43F5E','#EC4899','#D946EF','#A855F7','#8B5CF6','#6366F1','#3B82F6'];
    chartRef.current = new Chart(ref.current, {
      type: 'doughnut',
      data: {
        labels: entries.map(e => e.name),
        datasets: [{
          data: entries.map(e => e.qty),
          backgroundColor: entries.map((_, i) => palette[i % palette.length]),
          borderColor: '#fff', borderWidth: 3, hoverOffset: 6,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '60%',
        animation: { animateRotate: true, duration: 800 },
        plugins: {
          legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 }, color: '#475569' } },
          tooltip: {
            backgroundColor: '#0F172A', padding: 10,
            callbacks: {
              label: (c) => {
                const total = entries.reduce((a,b) => a+b.qty, 0);
                const pct = total ? (c.parsed/total*100).toFixed(1) : '0';
                return ` ${c.label}: ${c.parsed}건 (${pct}%)`;
              }
            }
          }
        }
      }
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [byType]);
  if (!entries.length) return <div className="h-64 grid place-items-center text-slate-400 text-sm">데이터 없음</div>;
  return <div className="relative" style={{ height: '260px' }}><canvas ref={ref}></canvas></div>;
}

/* ============================================================
   23-D2) OUTSOURCING TAB — 외주협력업체 관리 (업체별 부적합·손실)
   ============================================================ */
function OutsourcingTab({ data }) {
  const reports = data.erpReports || [];
  const [openVendor, setOpenVendor] = useState(null);

  // 기간 필터 상태
  const [periodMode, setPeriodMode] = useState('day'); // 'day' | 'week' | 'month' | 'range' | 'all'
  const [selectedWeek, setSelectedWeek] = useState('');
  const [selectedMonth, setSelectedMonth] = useState('');
  const [startDate, setStartDate] = useState('');
  const [endDate, setEndDate]     = useState('');

  // 사용 가능한 옵션 추출
  const { availableWeeks, availableMonths, dataRange } = useMemo(() => {
    const days = new Set();
    const weeks = new Map();
    const months = new Map();
    reports.forEach(r => {
      if (!r.reportDate) return;
      days.add(r.reportDate);
      const w = getISOWeek(r.reportDate);
      const wk = `${w.year}-W${pad2(w.week)}`;
      if (!weeks.has(wk)) {
        const ml = isoWeekToMonthLabel(w.year, w.week);
        weeks.set(wk, `${ml.year} ${ml.month}월 ${ml.weekOfMonth}주차`);
      }
      const ym = r.reportDate.slice(0, 7);
      if (!months.has(ym)) months.set(ym, `${ym.slice(0,4)}년 ${Number(ym.slice(5,7))}월`);
    });
    const ds = [...days].sort();
    return {
      availableWeeks:  [...weeks.entries()].sort((a,b) => a[0] < b[0] ? -1 : 1),
      availableMonths: [...months.entries()].sort((a,b) => a[0] < b[0] ? -1 : 1),
      dataRange:       { min: ds[0] || '', max: ds[ds.length - 1] || '' },
    };
  }, [reports]);

  // 최신 데이터로 기본값 셋
  useEffect(() => {
    if (!selectedWeek && availableWeeks.length) setSelectedWeek(availableWeeks[availableWeeks.length - 1][0]);
    if (!selectedMonth && availableMonths.length) setSelectedMonth(availableMonths[availableMonths.length - 1][0]);
    if (!startDate && dataRange.min) setStartDate(dataRange.min);
    if (!endDate   && dataRange.max) setEndDate(dataRange.max);
  }, [availableWeeks, availableMonths, dataRange.min, dataRange.max]);

  // 시작·종료가 뒤집힌 경우 자동 정렬
  const [effStart, effEnd] = (startDate && endDate && startDate > endDate) ? [endDate, startDate] : [startDate, endDate];

  // 필터링된 reports
  const yesterday = ymdShift(todayYMD(), -1);
  const filteredReports = useMemo(() => {
    if (periodMode === 'all') return reports;
    return reports.filter(r => {
      if (!r.reportDate) return false;
      if (periodMode === 'day')   return r.reportDate === yesterday;
      if (periodMode === 'week')  {
        const w = getISOWeek(r.reportDate);
        return `${w.year}-W${pad2(w.week)}` === selectedWeek;
      }
      if (periodMode === 'month') return r.reportDate.slice(0, 7) === selectedMonth;
      if (periodMode === 'range') {
        if (effStart && r.reportDate < effStart) return false;
        if (effEnd   && r.reportDate > effEnd)   return false;
        return true;
      }
      return true;
    });
  }, [reports, periodMode, yesterday, selectedWeek, selectedMonth, effStart, effEnd]);

  const periodLabel = (() => {
    if (periodMode === 'day')   return `어제 (${yesterday})`;
    if (periodMode === 'week')  return availableWeeks.find(([k]) => k === selectedWeek)?.[1] || '—';
    if (periodMode === 'month') return availableMonths.find(([k]) => k === selectedMonth)?.[1] || '—';
    if (periodMode === 'range') {
      if (!effStart || !effEnd) return '—';
      const days = Math.round((parseYMD(effEnd) - parseYMD(effStart)) / 86400000) + 1;
      return effStart === effEnd ? `${effStart} · 1일` : `${effStart} ~ ${effEnd} · ${days}일`;
    }
    if (periodMode === 'all')   return `전체 기간 (리포트 ${reports.length}건)`;
    return '';
  })();

  const vendors = useMemo(() => {
    const m = new Map();
    filteredReports.forEach(rep => {
      (rep.records || []).forEach(rec => {
        if (rec.originProc !== '외주협력업체') return;
        const v = (rec.vendor || '').trim() || '(업체명 미상)';
        if (!m.has(v)) m.set(v, {
          vendor: v,
          qty: 0, amount: 0,
          byType: Object.fromEntries(ERP_DEFECT_TYPES.map(t => [t, 0])),
          byProduct: new Map(),
          dates: new Set(),
          incidents: [],
        });
        const g = m.get(v);
        const q = Number(rec.qty) || 0;
        const a = Number(rec.amount) || 0;
        g.qty += q;
        g.amount += a;
        g.byType[normalizeDefectType(rec.typeDetail)] += q;
        const pn = rec.product || '(품목명 없음)';
        const cur = g.byProduct.get(pn) || { qty: 0, amount: 0 };
        g.byProduct.set(pn, { qty: cur.qty + q, amount: cur.amount + a });
        if (rep.reportDate) g.dates.add(rep.reportDate);
        g.incidents.push({
          date: rep.reportDate,
          product: pn,
          qty: q,
          amount: a,
          typeDetail: normalizeDefectType(rec.typeDetail),
          detail: rec.detail || '',
        });
      });
    });
    return [...m.values()].map(v => {
      const dates = [...v.dates].sort();
      const topType = Object.entries(v.byType).sort((a,b) => b[1]-a[1]).filter(([_,n]) => n > 0)[0];
      const topProduct = [...v.byProduct.entries()].sort((a,b) => b[1].qty - a[1].qty)[0];
      return {
        ...v,
        dates,
        latestDate: dates[dates.length - 1] || '',
        firstDate: dates[0] || '',
        topType, topProduct,
        incidents: v.incidents.sort((a,b) => (a.date || '') < (b.date || '') ? 1 : -1),
      };
    }).sort((a, b) => b.amount - a.amount);
  }, [filteredReports]);

  const totalQty    = vendors.reduce((a, v) => a + v.qty, 0);
  const totalAmount = vendors.reduce((a, v) => a + v.amount, 0);

  // 전체 데이터 자체가 없을 때
  if (!reports.length) {
    return <EmptyHint iconName="building" msg="외주협력업체 부적합 데이터가 없습니다. ERP 업로드 시 '원인공정 = 외주협력업체' 행이 자동 집계됩니다." />;
  }

  return (
    <Fragment>
      {/* 기간 선택 */}
      <Card>
        <div className="p-4 flex items-center justify-between gap-3 flex-wrap">
          <div>
            <div className="text-sm font-bold text-slate-800">기간 선택</div>
            <div className="text-[11px] text-slate-500 mt-0.5 num">{periodLabel}</div>
          </div>
          <div className="flex gap-2 flex-wrap items-center">
            <div className="flex gap-1 bg-slate-100 p-1 rounded-lg">
              {[
                { v:'day',   l:'어제' },
                { v:'week',  l:'주별' },
                { v:'month', l:'월별' },
                { v:'range', l:'기간' },
                { v:'all',   l:'전체' },
              ].map(o => (
                <button key={o.v} onClick={() => setPeriodMode(o.v)}
                  className={`px-3 py-1.5 text-xs font-semibold rounded-md transition-colors
                    ${periodMode === o.v ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                  {o.l}
                </button>
              ))}
            </div>
            {periodMode === 'week' && (
              <select value={selectedWeek} onChange={e => setSelectedWeek(e.target.value)}
                className="px-3 py-1.5 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-amber-300">
                {availableWeeks.length === 0 && <option value="">데이터 없음</option>}
                {availableWeeks.map(([k, l]) => <option key={k} value={k}>{l}</option>)}
              </select>
            )}
            {periodMode === 'month' && (
              <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}
                className="px-3 py-1.5 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-amber-300">
                {availableMonths.length === 0 && <option value="">데이터 없음</option>}
                {availableMonths.map(([k, l]) => <option key={k} value={k}>{l}</option>)}
              </select>
            )}
            {periodMode === 'range' && (
              <DateRangePicker
                startDate={startDate} endDate={endDate}
                onChange={(s, e) => { setStartDate(s); setEndDate(e); }}
                min={dataRange.min} max={dataRange.max} />
            )}
          </div>
        </div>
      </Card>

      {/* 필터 결과가 빈 경우 */}
      {!vendors.length ? (
        <EmptyHint iconName="building" msg={`${periodLabel}에 외주협력업체 부적합 데이터가 없습니다.`} />
      ) : (
      <Fragment>

      {/* 요약 */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <HistoryStat label="등록 협력업체"   value={vendors.length} unit="개"  color="indigo" />
        <HistoryStat label="누적 부적합"     value={totalQty}       unit="건"  sub={`평균 ${vendors.length ? Math.round(totalQty/vendors.length) : 0}건/업체`} color="rose" />
        <HistoryStat label="누적 손실"       valueKRW={totalAmount} sub={`평균 ${vendors.length ? fmtKRW(totalAmount/vendors.length) : '—'}/업체`} color="fuchsia" />
        <HistoryStat label="손실 1위 업체"
          textValue={vendors[0]?.vendor || '—'}
          sub={vendors[0] ? `${vendors[0].qty}건 · ${fmtKRW(vendors[0].amount)}` : ''} color="amber" />
      </div>

      {/* 손실 Top 차트 */}
      <Card>
        <CardHeader title="협력업체별 손실 비용" sub={`Top ${Math.min(vendors.length, 10)} · 손실 금액 기준`} />
        <div className="p-5">
          <VendorTopChart vendors={vendors.slice(0, 10)} />
        </div>
      </Card>

      {/* 협력업체별 표 */}
      <Card>
        <CardHeader title="협력업체 상세" sub="행을 클릭하면 유형별·이력별 상세가 펼쳐집니다" />
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead>
              <tr className="bg-slate-50 text-slate-500">
                <th className="px-3 py-2 text-left font-semibold">협력업체명</th>
                <th className="px-3 py-2 text-center font-semibold">발생수량</th>

      type: 'bar',
      data: {

          borderRadius: 6,
          barThickness: 22,
        }]

      options: {

/* ============================================================
   23-E) UPLOAD HISTORY TAB — 업로드 이력 + 삭제 + 휴지통 + 되돌리기
   ============================================================ */
function fmtDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}
function relTime(iso) {
  if (!iso) return '';
  const d = new Date(iso); if (isNaN(d.getTime())) return '';
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60)      return '방금';
  if (diff < 3600)    return `${Math.floor(diff/60)}분 전`;
  if (diff < 86400)   return `${Math.floor(diff/3600)}시간 전`;
  if (diff < 86400*7) return `${Math.floor(diff/86400)}일 전`;
  return `${Math.floor(diff/86400/7)}주 전`;
}

function UploadHistoryTab({ data, onSaveErp, onSaveErpTrash }) {
  const toast = useToast();
  const dialog = useConfirm();
  const reports = data.erpReports || [];
  const trash = data.erpTrash || [];

  // 업로드 묶음 그룹화 (createdAt + filename)
  const groups = useMemo(() => {
    const map = new Map();
    reports.forEach(r => {
      const key = `${r.createdAt || ''}|${r.filename || ''}`;
      if (!map.has(key)) {
        map.set(key, {
          key,
          createdAt: r.createdAt,
          filename: r.filename,
          source: r.source || 'manual',
          reports: [],
        });
      }
      map.get(key).reports.push(r);
    });
    const arr = [...map.values()].map(g => {
      const dates = g.reports.map(r => r.reportDate).filter(Boolean).sort();
      const qty   = sum(g.reports.flatMap(r => (r.records || []).map(rec => Number(rec.qty)||0)));
      const amt   = sum(g.reports.flatMap(r => (r.records || []).map(rec => Number(rec.amount)||0)));
      const rows  = g.reports.reduce((a, r) => a + (r.records?.length || 0), 0);
      return { ...g, dates, dateFrom: dates[0], dateTo: dates[dates.length-1], qty, amt, rows };
    });
    return arr.sort((a, b) => (a.createdAt || '') < (b.createdAt || '') ? 1 : -1);
  }, [reports]);

  // 전체 요약
  const allDates = useMemo(() => reports.map(r => r.reportDate).filter(Boolean).sort(), [reports]);
  const firstDate = allDates[0];
  const lastDate  = allDates[allDates.length - 1];
  const totalRows = reports.reduce((a, r) => a + (r.records?.length || 0), 0);
  const totalQty  = sum(reports.flatMap(r => (r.records || []).map(rec => Number(rec.qty)||0)));
  const totalAmt  = sum(reports.flatMap(r => (r.records || []).map(rec => Number(rec.amount)||0)));

  // === 액션 ===
  const deleteReport = (id) => {
    const target = reports.find(r => r.id === id);
    if (!target) return;
    const next = reports.filter(r => r.id !== id);
    const newTrash = [...trash, { ...target, deletedAt: new Date().toISOString() }];
    onSaveErp(next);
    onSaveErpTrash(newTrash);
    toast(`${target.reportDate} 리포트 삭제됨`, 'info', {
      action: { label: '되돌리기', onClick: () => restoreOne(target.id) },
      duration: 7000,
    });
  };

  const deleteGroup = async (g) => {
    if (!await dialog(`${g.filename || '수기 입력'}\n${g.reports.length}개 일자 (${g.dateFrom} ~ ${g.dateTo})\n리포트를 삭제할까요?`)) return;
    const ids = new Set(g.reports.map(r => r.id));
    const now = new Date().toISOString();
    const next = reports.filter(r => !ids.has(r.id));
    const newTrash = [...trash, ...g.reports.map(r => ({ ...r, deletedAt: now }))];
    onSaveErp(next);
    onSaveErpTrash(newTrash);
    toast(`${g.reports.length}개 일자 리포트 삭제됨`, 'info', {
      action: { label: '되돌리기', onClick: () => restoreMany([...ids]) },
      duration: 7000,
    });
  };

  const restoreOne = (id) => {
    const t = (data.erpTrash || []).find(x => x.id === id);
    if (!t) { toast('복원할 항목을 찾을 수 없습니다', 'warn'); return; }
    const { deletedAt, ...orig } = t;
    onSaveErp([...(data.erpReports || []).filter(r => r.id !== id), orig]);
    onSaveErpTrash((data.erpTrash || []).filter(x => x.id !== id));
    toast(`${orig.reportDate} 복원 완료`, 'success');
  };

  const restoreMany = (ids) => {
    const set = new Set(ids);
    const targets = (data.erpTrash || []).filter(t => set.has(t.id));
    if (!targets.length) { toast('복원할 항목이 없습니다', 'warn'); return; }
    const restored = targets.map(({ deletedAt, ...rest }) => rest);
    onSaveErp([...(data.erpReports || []).filter(r => !set.has(r.id)), ...restored]);
    onSaveErpTrash((data.erpTrash || []).filter(t => !set.has(t.id)));
    toast(`${targets.length}건 복원 완료`, 'success');
  };

  const permaDeleteOne = async (id) => {
    if (!await dialog('이 항목을 영구 삭제할까요?\n이 작업은 되돌릴 수 없습니다.')) return;
    onSaveErpTrash(trash.filter(t => t.id !== id));
    toast('영구 삭제 완료', 'info');
  };

  const emptyTrash = async () => {
    if (!await dialog(`휴지통의 ${trash.length}건을 모두 영구 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`)) return;
    onSaveErpTrash([]);
    toast('휴지통을 비웠습니다', 'info');
  };

  if (!reports.length && !trash.length) {
    return <EmptyHint iconName="upload" msg="아직 업로드된 데이터가 없습니다. '부적합 리포트' 탭에서 ERP를 업로드하면 여기 이력이 표시됩니다." />;
  }

  return (
    <Fragment>
      {/* 전체 요약 */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <HistoryStat label="저장된 리포트" value={reports.length} unit="건" sub={`${groups.length}회 업로드`} color="indigo" />
        <HistoryStat label="데이터 범위" textValue={firstDate && lastDate ? (firstDate === lastDate ? firstDate : `${firstDate} ~ ${lastDate}`) : '—'} sub={firstDate && lastDate ? `${Math.round((parseYMD(lastDate)-parseYMD(firstDate))/86400000)+1}일치` : ''} color="sky" />
        <HistoryStat label="누적 행 수" value={totalRows} unit="행" sub={`발생수량 ${totalQty.toLocaleString('ko-KR')}건`} color="rose" />
        <HistoryStat label="누적 손실" valueKRW={totalAmt} color="fuchsia" />
      </div>

      {/* 업로드 묶음 */}
      <Card>
        <CardHeader title="업로드 묶음" sub={groups.length > 30 ? `최근 순 · 30회 표시 (총 ${groups.length}회)` : `최근 순 · ${groups.length}회`} />
        <div className="p-4 space-y-3">
          {groups.slice(0, 30).map(g => (
            <UploadGroupCard key={g.key} g={g} onDeleteGroup={() => deleteGroup(g)} onDeleteReport={deleteReport} />
          ))}
        </div>
      </Card>

      {/* 휴지통 */}
      <Card>
        <CardHeader title={`휴지통 · ${trash.length}건`}
          sub={trash.length
            ? `복원하면 부적합 리포트로 되돌아갑니다 · 삭제 후 ${TRASH_RETENTION_DAYS}일 경과 시 자동 영구 삭제`
            : `삭제된 항목이 ${TRASH_RETENTION_DAYS}일간 보관됩니다`}
          right={trash.length > 0 && (
            <button onClick={emptyTrash} className="px-3 py-1.5 text-xs font-semibold rounded-lg border border-rose-200 text-rose-600 hover:bg-rose-50">
              전체 비우기
            </button>
          )} />
        {trash.length === 0 ? (
          <div className="px-5 py-8 text-center text-slate-400 text-xs">휴지통이 비어 있습니다.</div>
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead>
                <tr className="bg-slate-50 text-slate-500">
                  <th className="px-3 py-2 text-left font-semibold">보고 일자</th>
                  <th className="px-3 py-2 text-left font-semibold">출처</th>
                  <th className="px-3 py-2 text-center font-semibold">행 수</th>
                  <th className="px-3 py-2 text-center font-semibold">발생수량</th>
                  <th className="px-3 py-2 text-center font-semibold">손실</th>
                  <th className="px-3 py-2 text-left font-semibold">삭제 시각</th>
                  <th className="px-3 py-2 text-center font-semibold">자동삭제까지</th>
                  <th className="px-3 py-2 text-center font-semibold w-[160px]">동작</th>
                </tr>
              </thead>
              <tbody className="num">
                {[...trash].sort((a,b) => (b.deletedAt || '') < (a.deletedAt || '') ? -1 : 1).map(t => {
                  const rqty = sum((t.records||[]).map(r => Number(r.qty)||0));
                  const ramt = sum((t.records||[]).map(r => Number(r.amount)||0));
                  const purgeAt = t.deletedAt ? new Date(t.deletedAt).getTime() + TRASH_RETENTION_MS : null;
                  const remainMs = purgeAt ? purgeAt - Date.now() : null;
                  const remainHours = remainMs !== null ? Math.max(0, remainMs / 3600000) : null;
                  const ddayLabel = remainHours === null ? '—'
                    : remainHours <= 0 ? '곧 삭제'
                    : remainHours < 24 ? `${Math.ceil(remainHours)}시간 후`
                    : `${Math.ceil(remainHours/24)}일 후`;
                  const ddayCls = remainHours === null ? 'text-slate-400'
                    : remainHours < 24 ? 'text-rose-600 font-semibold'
                    : remainHours < 72 ? 'text-amber-600 font-semibold'
                    : 'text-slate-500';
                  return (
                    <tr key={t.id} className="border-t border-slate-100 hover:bg-slate-50/60">
                      <td className="px-3 py-2 text-slate-700 font-semibold">{t.reportDate}</td>
                      <td className="px-3 py-2 text-slate-500 truncate max-w-[260px]">{t.filename || '수기 입력'}</td>
                      <td className="px-3 py-2 text-center text-slate-700">{(t.records||[]).length}</td>
                      <td className="px-3 py-2 text-center text-slate-700">{rqty}</td>
                      <td className="px-3 py-2 text-center text-rose-700">{ramt.toLocaleString('ko-KR')}</td>
                      <td className="px-3 py-2 text-slate-500 text-[10px]">
                        <div>{fmtDateTime(t.deletedAt)}</div>
                        <div className="text-slate-400">{relTime(t.deletedAt)}</div>
                      </td>
                      <td className={`px-3 py-2 text-center text-[11px] ${ddayCls}`}>{ddayLabel}</td>
                      <td className="px-3 py-2 text-center space-x-1">
                        <button onClick={() => restoreOne(t.id)}
                          className="px-2 py-1 text-[11px] font-semibold rounded border border-emerald-200 text-emerald-700 hover:bg-emerald-50">복원</button>
                        <button onClick={() => permaDeleteOne(t.id)}
                          className="px-2 py-1 text-[11px] font-semibold rounded border border-rose-200 text-rose-600 hover:bg-rose-50">영구삭제</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </Card>
    </Fragment>
  );
}

function HistoryStat({ label, value, unit, textValue, valueKRW, sub, color = 'indigo' }) {
  const map = {
    indigo:  'from-indigo-500 to-violet-500',
    sky:     'from-sky-500 to-cyan-500',
    rose:    'from-rose-500 to-pink-500',
    fuchsia: 'from-fuchsia-500 to-violet-500',
    amber:   'from-amber-500 to-orange-500',
  }[color] || 'from-indigo-500 to-violet-500';
  return (
    <Card>
      <div className="p-5 relative overflow-hidden">
        <div className={`absolute -top-10 -right-10 w-32 h-32 rounded-full bg-gradient-to-br ${map} opacity-10 blur-2xl`}></div>
        <div className="relative">
          <div className="text-[11px] text-slate-500 mb-1">{label}</div>
          {textValue !== undefined ? (
            <div className="text-xl font-extrabold text-slate-900 num">{textValue}</div>
          ) : valueKRW !== undefined ? (
            <div className="text-3xl font-extrabold text-slate-900 num">{fmtKRW(valueKRW)}</div>
          ) : (
            <div className="text-3xl font-extrabold text-slate-900 num">
              {value?.toLocaleString('ko-KR')}{unit && <span className="text-base text-slate-500 font-bold ml-1">{unit}</span>}
            </div>
          )}
          {sub && <div className="text-[11px] text-slate-400 mt-1 num">{sub}</div>}
        </div>
      </div>
    </Card>
  );
}

function UploadGroupCard({ g, onDeleteGroup, onDeleteReport }) {
  const [expanded, setExpanded] = useState(false);
  const isErp = g.source === 'erp';
  const dateRange = g.dateFrom === g.dateTo
    ? g.dateFrom
    : (g.dateFrom && g.dateTo ? `${g.dateFrom} ~ ${g.dateTo}` : '—');
  return (
    <div className="border border-slate-200 rounded-xl overflow-hidden">
      <div className="p-4 bg-slate-50/40 flex items-center justify-between gap-3 flex-wrap">
        <div className="flex items-center gap-4 min-w-0 flex-wrap">
          <div className={`w-10 h-10 rounded-xl grid place-items-center shrink-0 ${isErp ? 'bg-rose-50 text-rose-600 border border-rose-200' : 'bg-slate-100 text-slate-600 border border-slate-200'}`}>
            <Icon name={isErp ? 'upload' : 'pencil'} size={18} />
          </div>
          <div className="min-w-0">
            <div className="text-sm font-bold text-slate-800 truncate" title={g.filename}>
              {g.filename || '수기 입력'}
            </div>
            <div className="text-[11px] text-slate-500 num flex items-center gap-2 flex-wrap mt-0.5">
              <span>{fmtDateTime(g.createdAt)}</span>
              <span className="text-slate-300">·</span>
              <span className="text-slate-400">{relTime(g.createdAt)}</span>
            </div>
          </div>
        </div>
        <div className="flex items-center gap-3 flex-wrap">
          <div className="text-[11px] text-slate-500 num flex items-center gap-3">
            <span><span className="text-slate-400">기간</span> <b className="text-slate-700">{dateRange}</b></span>
            <span className="text-slate-300">|</span>
            <span><span className="text-slate-400">일자</span> <b className="text-slate-700">{g.dates.length}</b></span>
            <span className="text-slate-300">|</span>
            <span><span className="text-slate-400">행</span> <b className="text-slate-700">{g.rows}</b></span>
            <span className="text-slate-300">|</span>
            <span><span className="text-slate-400">발생</span> <b className="text-slate-700">{g.qty}</b></span>
            <span className="text-slate-300">|</span>
            <span><span className="text-slate-400">손실</span> <b className="text-rose-700">{g.amt.toLocaleString('ko-KR')}</b></span>
          </div>
          <button onClick={() => setExpanded(v => !v)}
            className="px-2.5 py-1.5 text-xs font-semibold rounded-md text-slate-600 hover:bg-slate-100">
            {expanded ? '접기' : '펼치기'}
          </button>
          <button onClick={onDeleteGroup}
            className="px-3 py-1.5 text-xs font-semibold rounded-md border border-rose-200 text-rose-600 hover:bg-rose-50">
            묶음 삭제
          </button>
        </div>
      </div>
      {expanded && (
        <div className="border-t border-slate-100 overflow-x-auto">
          <table className="w-full text-xs">
            <thead>
              <tr className="bg-slate-50/60 text-slate-500">
                <th className="px-3 py-2 text-left font-semibold">보고 일자</th>
                <th className="px-3 py-2 text-center font-semibold">행 수</th>
                <th className="px-3 py-2 text-center font-semibold">발생수량</th>
                <th className="px-3 py-2 text-center font-semibold">손실 비용</th>
                <th className="px-3 py-2 text-center font-semibold w-[100px]">동작</th>
              </tr>
            </thead>
            <tbody className="num">
              {[...g.reports].sort((a,b) => (a.reportDate || '') < (b.reportDate || '') ? -1 : 1).map(r => {
                const rqty = sum((r.records||[]).map(rc => Number(rc.qty)||0));
                const ramt = sum((r.records||[]).map(rc => Number(rc.amount)||0));
                return (
                  <tr key={r.id} className="border-t border-slate-100 hover:bg-slate-50/60">
                    <td className="px-3 py-2 text-slate-700 font-semibold">{r.reportDate}</td>
                    <td className="px-3 py-2 text-center text-slate-700">{(r.records||[]).length}</td>
                    <td className="px-3 py-2 text-center text-slate-700">{rqty}</td>
                    <td className="px-3 py-2 text-center text-rose-700 font-semibold">{ramt.toLocaleString('ko-KR')}</td>
                    <td className="px-3 py-2 text-center">
                      <button onClick={() => onDeleteReport(r.id)}
                        className="px-2.5 py-1 text-[11px] font-semibold rounded-md text-rose-600 hover:bg-rose-50">삭제</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   24-A) PRODUCTION SETTINGS — 생산팀 5 KPI 목표·임계값
   ============================================================ */
function ProductionSettings({ data, onSave }) {
  const toast = useToast();
  const dialog = useConfirm();
  const [draft, setDraft] = useState(() => ({ ...(data.targets || DEFAULT_TARGETS) }));

  useEffect(() => {
    setDraft({ ...(data.targets || DEFAULT_TARGETS) });
  }, [data.targets]);

  const update = (kpiKey, field, value) => {
    setDraft(prev => ({
      ...prev,
      [kpiKey]: { ...prev[kpiKey], [field]: value === '' ? '' : Number(value) }
    }));
  };

  const handleSave = () => {
    const clean = {};
    KPI_DEFS.forEach(k => {
      const t = draft[k.key] || DEFAULT_TARGETS[k.key];
      clean[k.key] = {
        target: t.target === '' || t.target === undefined ? DEFAULT_TARGETS[k.key].target : Number(t.target),
        warn:   t.warn   === '' || t.warn   === undefined ? DEFAULT_TARGETS[k.key].warn   : Number(t.warn),
        danger: t.danger === '' || t.danger === undefined ? DEFAULT_TARGETS[k.key].danger : Number(t.danger),
      };
    });
    onSave(clean);
    toast('생산팀 목표값 저장 완료', 'success');
  };

  const handleReset = async () => {
    if (!await dialog('생산팀 목표를 기본값으로 초기화할까요?')) return;
    setDraft({ ...DEFAULT_TARGETS });
    onSave({ ...DEFAULT_TARGETS });
    toast('기본값으로 복원', 'success');
  };

  const visibleProcs = PROCESS_DEFS.filter(p => p.key !== 'etc' && KPI_DEFS.some(k => k.process === p.key));

  return (
    <div className="space-y-5">
      <Card delay={0}>
        <CardHeader title="생산팀 KPI 목표·임계값"
          sub="목표 달성 시 녹색, 주의 임계까지는 노란색, 그 외 빨간색으로 KPI 카드가 표시됩니다"
          right={
            <div className="flex gap-2">
              <button onClick={handleReset} className="px-3 py-1.5 text-xs font-semibold rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50">초기화</button>
              <button onClick={handleSave} className="px-4 py-1.5 text-xs font-semibold rounded-lg bg-gradient-to-r from-sky-500 to-cyan-500 text-white hover:from-sky-600 hover:to-cyan-600 shadow shadow-sky-500/20">저장</button>
            </div>
          } />
        <div className="p-5 grid grid-cols-1 lg:grid-cols-3 gap-4 items-start">
          {visibleProcs.map((proc, i) => {
            const kpis = KPI_DEFS.filter(k => k.process === proc.key);
            return (
              <div key={proc.key}
                className="rounded-xl border border-slate-200 overflow-hidden animate-fade-up"
                style={{ animationDelay: `${i*80}ms` }}>
                <header className="px-4 py-3 border-b border-slate-100 flex items-center gap-2" style={{ background: proc.soft + '50' }}>
                  <span className="w-2.5 h-2.5 rounded-full" style={{ background: proc.color }}></span>
                  <h3 className="font-bold text-sm" style={{ color: proc.color }}>{proc.label} 공정</h3>
                </header>
                <div className="p-4 space-y-3">
                  {kpis.map(kpi => {
                    const t = draft[kpi.key] || DEFAULT_TARGETS[kpi.key];
                    return (
                      <div key={kpi.key} className="border border-slate-100 rounded-lg p-3 bg-slate-50/30">
                        <div className="font-semibold text-slate-800 text-sm mb-2">{kpi.label}</div>
                        <div className="grid grid-cols-3 gap-2">
                          <ThreshField label="목표" color="emerald" value={t.target}
                            onChange={(v)=>update(kpi.key, 'target', v)} kpi={kpi} />
                          <ThreshField label="주의" color="amber" value={t.warn}
                            onChange={(v)=>update(kpi.key, 'warn', v)} kpi={kpi} />
                          <ThreshField label="경고" color="rose" value={t.danger}
                            onChange={(v)=>update(kpi.key, 'danger', v)} kpi={kpi} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

/* ============================================================
   24-B) QUALITY SETTINGS — 품질팀 월 누적 부적합·손실 상한
   ============================================================ */
function QualitySettings({ data, onSave }) {
  const toast = useToast();
  const dialog = useConfirm();
  const [draft, setDraft] = useState(() => ({ ...(data.qualityTargets || DEFAULT_QUALITY_TARGETS) }));

  useEffect(() => {
    setDraft({ ...(data.qualityTargets || DEFAULT_QUALITY_TARGETS) });
  }, [data.qualityTargets]);

  const update = (key, field, value) => {
    setDraft(prev => ({
      ...prev,
      [key]: { ...prev[key], [field]: value === '' ? '' : Number(value) }
    }));
  };

  const handleSave = () => {
    const clean = {};
    QUALITY_TARGET_DEFS.forEach(k => {
      const t = draft[k.key] || DEFAULT_QUALITY_TARGETS[k.key];
      clean[k.key] = {
        target: t.target === '' || t.target === undefined ? DEFAULT_QUALITY_TARGETS[k.key].target : Number(t.target),
        warn:   t.warn   === '' || t.warn   === undefined ? DEFAULT_QUALITY_TARGETS[k.key].warn   : Number(t.warn),
        danger: t.danger === '' || t.danger === undefined ? DEFAULT_QUALITY_TARGETS[k.key].danger : Number(t.danger),
      };
    });
    onSave(clean);
    toast('품질팀 목표값 저장 완료', 'success');
  };

  const handleReset = async () => {
    if (!await dialog('품질팀 목표를 기본값으로 초기화할까요?')) return;
    setDraft({ ...DEFAULT_QUALITY_TARGETS });
    onSave({ ...DEFAULT_QUALITY_TARGETS });
    toast('기본값으로 복원', 'success');
  };

  return (
    <div className="space-y-5">
      <Card delay={0}>
        <CardHeader title="품질보증팀 목표"
          right={
            <div className="flex gap-2">
              <button onClick={handleReset} className="px-3 py-1.5 text-xs font-semibold rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50">초기화</button>
              <button onClick={handleSave} className="px-4 py-1.5 text-xs font-semibold rounded-lg bg-gradient-to-r from-rose-500 to-pink-500 text-white hover:from-rose-600 hover:to-pink-600 shadow shadow-rose-500/20">저장</button>
            </div>
          } />
        <div className="p-5 grid grid-cols-1 lg:grid-cols-2 gap-6">
          {[
            { title: '부적합 건수', defs: QUALITY_TARGET_DEFS.filter(q => q.unit === '건') },
            { title: '손실 금액',   defs: QUALITY_TARGET_DEFS.filter(q => q.isKRW) },
          ].map((group, gi) => (
            <div key={group.title}>
              <div className="text-lg font-extrabold text-slate-800 mb-4">{group.title}</div>
              <div className="grid grid-cols-1 gap-3">
                {group.defs.map((q, i) => {
                  const t = draft[q.key] || DEFAULT_QUALITY_TARGETS[q.key];
                  return (
                    <div key={q.key} className="border border-slate-200 rounded-xl p-5 animate-fade-up overflow-hidden relative"
                         style={{ animationDelay: `${(gi*200) + i*80}ms` }}>
                      <div className="absolute -top-12 -right-12 w-40 h-40 rounded-full blur-2xl opacity-10"
                           style={{ background: q.color }}></div>
                      <div className="relative">
                        <div className="font-bold text-slate-800 text-base mb-4">{q.label}</div>
                        <div className="grid grid-cols-3 gap-2">
                          <ThreshField label="목표" color="emerald" value={t.target}
                            onChange={(v)=>update(q.key, 'target', v)} kpi={q} />
                          <ThreshField label="주의" color="amber"   value={t.warn}
                            onChange={(v)=>update(q.key, 'warn', v)} kpi={q} />
                          <ThreshField label="경고" color="rose"    value={t.danger}
                            onChange={(v)=>update(q.key, 'danger', v)} kpi={q} />
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}
function ThreshField({ label, color, value, onChange, kpi }) {
  const map = { emerald: 'text-emerald-700 bg-emerald-50 border-emerald-200',
                amber:   'text-amber-700 bg-amber-50 border-amber-200',
                rose:    'text-rose-700 bg-rose-50 border-rose-200' };
  // 금액 KPI는 만 원 단위 입력 — 표시값 = value/10000, 저장값 = 입력×10000
  const isKRW = kpi.isKRW;
  const displayValue = (isKRW && value !== '' && value !== null && value !== undefined)
    ? Number(value) / 10000 : value;
  const handleChange = (raw) => {
    if (isKRW) onChange(raw === '' ? '' : String(Number(raw) * 10000));
    else onChange(raw);
  };
  return (
    <div>
      <div className={`text-[10px] font-semibold mb-1 px-1.5 py-0.5 rounded inline-block ${map[color]}`}>{label}</div>
      <div className="flex items-stretch border border-slate-200 rounded-md overflow-hidden focus-within:ring-2 focus-within:ring-indigo-300">
        <input type="number" step={isKRW ? 1 : kpi.step} value={displayValue ?? ''} onChange={e=>handleChange(e.target.value)}
          className="flex-1 min-w-0 px-2 py-1.5 text-sm num focus:outline-none" />
        <span className="px-2 grid place-items-center bg-slate-50 text-slate-500 text-[10px] border-l border-slate-200 whitespace-nowrap shrink-0">{isKRW ? '만 원' : kpi.unit}</span>
      </div>
    </div>
  );
}
