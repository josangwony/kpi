function emptyTasks() {
  const out = {};
  Object.entries(TASK_DEFS).forEach(([procKey, tasks]) => {
    out[procKey] = {};
    tasks.forEach(t => { out[procKey][t.key] = {}; });
  });
  return out;
}

// 저장된 entries의 평탄 KPI를 tasks에서 실시간 재계산 — 공식 변경 시 기존 데이터도 자동 반영
function refreshFlatKpis(entries) {
  return (entries || []).map(e => ({ ...e, ...tasksToFlatKpis(e.tasks || {}) }));
}

// KPI별 평균 계산 — kpi.excludeZeroFromAvg=true면 0도 제외 (미측정/입력 실수 가능성)
function avgKpiValues(kpi, values) {
  const exZero = !!(kpi && kpi.excludeZeroFromAvg);
  const xs = (values || []).filter(v =>
    v !== null && v !== undefined && v !== '' && !isNaN(v) && (!exZero || Number(v) !== 0)
  ).map(Number);
  return xs.length ? xs.reduce((a, b) => a + b, 0) / xs.length : null;
}

// tasks → 평탄 KPI (대시보드/종합지표/이력 호환용)
function tasksToFlatKpis(tasks) {
  const t = tasks || {};
  const safeAvg = (arr) => {
    const xs = arr.filter(v => v !== null && v !== undefined && v !== '' && !isNaN(v)).map(Number);
    return xs.length ? xs.reduce((a, b) => a + b, 0) / xs.length : null;
  };
  // 수율은 0(미측정/입력 실수 가능성)을 제외해서 평균. 자재 전부 0/빈 값이면 null
  const safeAvgNonZero = (arr) => {
    const xs = arr.filter(v => v !== null && v !== undefined && v !== '' && !isNaN(v) && Number(v) !== 0).map(Number);
    return xs.length ? xs.reduce((a, b) => a + b, 0) / xs.length : null;
  };
  // 양 라인 합 — 둘 다 빈 값이면 null
  const safeSum = (arr) => {
    const xs = arr.filter(v => v !== null && v !== undefined && v !== '' && !isNaN(v)).map(Number);
    return xs.length ? xs.reduce((a, b) => a + b, 0) : null;
  };
  return {
    spongeYield:      safeAvgNonZero([t.foam?.task1?.recotec, t.foam?.task1?.elastic, t.foam?.task1?.terol]),
    foamInsourcing:   (t.foam?.task2?.progress      ?? null) === '' ? null : (t.foam?.task2?.progress      ?? null),
    quiltingDefect:   (t.quilting?.task1?.quilting   ?? null) === '' ? null : (t.quilting?.task1?.quilting   ?? null),
    interlockDefect:  (t.quilting?.task1?.interlock  ?? null) === '' ? null : (t.quilting?.task1?.interlock  ?? null),
    springDaily:      safeSum([t.spring?.task1?.line1, t.spring?.task1?.line2]),
    springChangeover: safeAvg([t.spring?.task2?.line1, t.spring?.task2?.line2]),
  };
}

// 휴지통 보관 기간: 7일
const TRASH_RETENTION_DAYS = 7;
const TRASH_RETENTION_MS = TRASH_RETENTION_DAYS * 86400 * 1000;

// === ERP 부적합 양식 (grd_list) ===
// 사용자 정의: '커버 퀼팅', '인터로크' → 4층 / '외주협력업체' → 외주 / 그 외 → 2층

  '외주협력업체': 'OUT',

];
const ERP_FLOOR_BY_KEY = Object.fromEntries(ERP_FLOORS.map(f => [f.key, f]));
function classifyErpFloor(originProc) {

}

// 양식의 부적합 유형 컬럼 (고정 순서)
const ERP_DEFECT_TYPES = [
  '퀼팅 봉탈', '작업자 부주의', '구멍 및 찢어짐',
  '인터 봉탈', '오염 및 얼룩', '기타', '이물',
];
function normalizeDefectType(s) {
  const t = String(s || '').trim();
  if (!t) return '기타';
  if (ERP_DEFECT_TYPES.includes(t)) return t;
  // 흔한 변형
  if (/봉탈/.test(t) && /인터/.test(t)) return '인터 봉탈';
  if (/봉탈/.test(t)) return '퀼팅 봉탈';
  if (/오염|얼룩/.test(t)) return '오염 및 얼룩';
  if (/구멍|찢어짐|찢김/.test(t)) return '구멍 및 찢어짐';
  if (/부주의/.test(t)) return '작업자 부주의';
  if (/이물/.test(t)) return '이물';
  return '기타';
}

// 엑셀 시리얼 날짜 → YYYY-MM-DD
function excelDateToYMD(serial) {
  if (typeof serial !== 'number' || !isFinite(serial)) return '';
  // Excel epoch (1900-system, with 1900 leap bug compensated): 1899-12-30 UTC
  const epoch = Date.UTC(1899, 11, 30);
  const ms = Math.round(serial) * 86400 * 1000;
  const d = new Date(epoch + ms);
  return `${d.getUTCFullYear()}-${pad2(d.getUTCMonth()+1)}-${pad2(d.getUTCDate())}`;
}

const ERP_HEADER_MAP = {

function normalizeHeader(s) { return String(s || '').replace(/\s+/g, '').trim(); }

// ERP 엑셀 파일을 파싱 → 정규화된 record 배열
async function parseErpFile(file) {
  if (!window.XLSX) throw new Error('XLSX 라이브러리가 로드되지 않았습니다');
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array', codepage: 949 });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  if (!rows.length) throw new Error('빈 파일입니다');
  const header = rows[0].map(normalizeHeader);
  const idx = {};
  Object.entries(ERP_HEADER_MAP).forEach(([k, name]) => {
    const ix = header.indexOf(normalizeHeader(k));
    if (ix >= 0) idx[name] = ix;
  });
  const required = ['no', 'originProc', 'product', 'qty', 'amount', 'typeDetail'];
  const missing = required.filter(k => idx[k] === undefined);
  if (missing.length) throw new Error('필수 컬럼 누락: ' + missing.map(m => Object.entries(ERP_HEADER_MAP).find(([,v]) => v===m)[0]).join(', '));

  const records = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    const noVal = r[idx.no];
    if (noVal === '' || noVal === null || noVal === undefined) continue;
    // 마지막 합계 행 제외 (no가 숫자가 아닌 'Count/Total' 등)
    const noNum = Number(noVal);
    if (!Number.isFinite(noNum) || noNum <= 0) continue;
    const occurredRaw = r[idx.occurredAt];
    const date = typeof occurredRaw === 'number' ? excelDateToYMD(occurredRaw) : (String(occurredRaw || '').match(/^\d{4}-\d{2}-\d{2}/)?.[0] || '');
    const productName = String(r[idx.product] || '').trim();
    // 품목명에 '커버' 또는 'cover' (대소문자 무관) 미포함 행은 제외 (스펀지/조닝폼 등 비커버 자재)
    if (!/커버|cover/i.test(productName)) continue;
    records.push({
      no: noNum,
      originProc: String(r[idx.originProc] || '').trim(),
      foundProc:  idx.foundProc  !== undefined ? String(r[idx.foundProc] || '').trim() : '',
      vendor:     idx.vendor     !== undefined ? String(r[idx.vendor] || '').trim() : '',
      docNo:      idx.docNo      !== undefined ? String(r[idx.docNo] || '').trim() : '',
      date,
      code:       idx.code       !== undefined ? String(r[idx.code] || '').trim() : '',
      product:    productName,
      spec:       idx.spec       !== undefined ? String(r[idx.spec] || '').trim().replace(/\x00/g, '') : '',
      qty:        Number(r[idx.qty]) || 0,
      unitPrice:  idx.unitPrice  !== undefined ? Number(r[idx.unitPrice]) || 0 : 0,
      amount:     Number(r[idx.amount]) || 0,
      detail:     idx.detail     !== undefined ? String(r[idx.detail] || '').trim() : '',
      type:       idx.type       !== undefined ? String(r[idx.type] || '').trim() : '',
      typeDetail: String(r[idx.typeDetail] || '').trim(),
      owner:      idx.owner      !== undefined ? String(r[idx.owner] || '').trim() : '',
      decision:   idx.decision   !== undefined ? String(r[idx.decision] || '').trim() : '',
      materialType: idx.materialType !== undefined ? String(r[idx.materialType] || '').trim() : '',
    });
  }
  return records;
}

// 리포트 집계 — 1) 당일 종합 (floor별) + 2) 세부내역 (원인공정+품목 × 유형)
function buildErpReport(records) {
  const byFloor = {
    '2F':  { qty: 0, amount: 0, count: 0, disposalAmount: 0, repairAmount: 0 },
    '4F':  { qty: 0, amount: 0, count: 0, disposalAmount: 0, repairAmount: 0 },
    'OUT': { qty: 0, amount: 0, count: 0, disposalAmount: 0, repairAmount: 0 },
  };
  records.forEach(r => {
    const f = classifyErpFloor(r.originProc);
    byFloor[f].qty    += r.qty;
    byFloor[f].amount += r.amount;
    byFloor[f].count  += 1;
    if (getDispositionType(r) === '폐기') byFloor[f].disposalAmount += r.amount;
    else                                   byFloor[f].repairAmount   += r.amount;
  });
  const total = {
    qty:           records.reduce((a,b) => a + b.qty, 0),
    amount:        records.reduce((a,b) => a + b.amount, 0),
    count:         records.length,
    disposalAmount: records.reduce((a,b) => a + (getDispositionType(b)==='폐기' ? b.amount : 0), 0),
    repairAmount:   records.reduce((a,b) => a + (getDispositionType(b)==='수리' ? b.amount : 0), 0),
  };

  // 원인공정별로 그룹, 그 안에서 품목명별 cross-tab
  const groups = new Map(); // originProc -> { product -> { types:{}, total, amount } }
  records.forEach(r => {
    if (!groups.has(r.originProc)) groups.set(r.originProc, new Map());
    const g = groups.get(r.originProc);
    if (!g.has(r.product)) g.set(r.product, { types: {}, total: 0, amount: 0 });
    const cell = g.get(r.product);
    const t = normalizeDefectType(r.typeDetail);
    cell.types[t] = (cell.types[t] || 0) + r.qty;
    cell.total  += r.qty;
    cell.amount += r.amount;
  });

  // 유형별 컬럼 합계
  const typeTotals = Object.fromEntries(ERP_DEFECT_TYPES.map(t => [t, 0]));
  records.forEach(r => {
    const t = normalizeDefectType(r.typeDetail);
    typeTotals[t] = (typeTotals[t] || 0) + r.qty;
  });

  const detailRows = [];
  for (const [originProc, prodMap] of groups.entries()) {
    const products = [];
    for (const [product, cell] of prodMap.entries()) products.push({ product, ...cell });
    products.sort((a,b) => b.total - a.total);
    detailRows.push({ originProc, floor: classifyErpFloor(originProc), products, sum: products.reduce((a,b) => a+b.total, 0) });
  }
  detailRows.sort((a,b) => b.sum - a.sum);

  return { byFloor, total, detailRows, typeTotals };
}

// 처리결정 필드로 폐기/수리 분류 (Excel decision 필드 또는 수동 설정 dispositionType 기준)
function getDispositionType(r) {
  if (r.dispositionType) return r.dispositionType;
  const d = String(r.decision || '').trim();
  return /폐기|파기|스크랩|반품|반납/i.test(d) ? '폐기' : '수리';
}

// 부적합·손실은 낮을수록 좋음 = 누적값이 target 이하면 달성
function getQualityStatus(key, value, qTargets) {
  if (value === null || value === undefined || isNaN(value)) return 'none';
  const t = (qTargets && qTargets[key]) || DEFAULT_QUALITY_TARGETS[key];
  const v = Number(value);
  if (v <= t.target) return 'good';
  if (v <= t.warn)   return 'warn';
  return 'danger';
}

/* ============================================================
   2) 유틸 — 날짜 / 포맷 / 상태판정
   ============================================================ */
function pad2(n) { return String(n).padStart(2, '0'); }
function todayYMD() {
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}
function parseYMD(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function ymdShift(s, days) {
  const d = parseYMD(s); d.setDate(d.getDate() + days);
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}
function ymdToLabel(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-').map(Number);
  const dow = ['일','월','화','수','목','금','토'][new Date(y,m-1,d).getDay()];
  return `${m}월 ${d}일 (${dow})`;
}
function getISOWeek(s) {
  const date = parseYMD(s);
  const target = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = target.getUTCDay() || 7;
  target.setUTCDate(target.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(target.getUTCFullYear(), 0, 1));
  const week = Math.ceil((((target - yearStart) / 86400000) + 1) / 7);
  return { year: target.getUTCFullYear(), week };
}
function getYearMonth(s) {
  const [y, m] = s.split('-').map(Number);
  return { year: y, month: m };
}
function fmtNumber(v, decimals = 0) {
  if (v === null || v === undefined || v === '' || isNaN(v)) return '—';
  const n = Number(v);
  if (decimals === 0) return Math.round(n).toLocaleString('ko-KR');
  return n.toFixed(decimals).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}
function fmtKRW(v) {
  if (v === null || v === undefined || v === '' || isNaN(v)) return '—';
  const n = Math.round(Number(v));
  if (Math.abs(n) >= 100000000) return (n/100000000).toFixed(1) + '억 원';
  if (Math.abs(n) >= 10000)     return (n/10000).toFixed(0) + '만 원';
  return n.toLocaleString('ko-KR') + ' 원';
}
function fmtKRWfull(v) {
  if (v === null || v === undefined || v === '' || isNaN(v)) return '—';
  return Math.round(Number(v)).toLocaleString('ko-KR') + ' 원';
}
function avg(arr) {
  const xs = arr.filter(x => x !== null && x !== undefined && !isNaN(x)).map(Number);
  if (!xs.length) return null;
  return xs.reduce((a,b) => a+b, 0) / xs.length;
}
function sum(arr) {
  return arr.filter(x => x !== null && x !== undefined && !isNaN(x))
            .map(Number).reduce((a,b) => a+b, 0);
}
// "8:40-10:25" 또는 "8:40~10:25" 형태 → 분 단위 정수. 역순·파싱 실패는 0
function parseTimeRangeMinutes(s) {
  if (!s) return 0;
  const m = String(s).match(/(\d{1,2}):(\d{2})\s*[-~]\s*(\d{1,2}):(\d{2})/);
  if (!m) return 0;
  const diff = (Number(m[3]) * 60 + Number(m[4])) - (Number(m[1]) * 60 + Number(m[2]));
  return diff > 0 ? diff : 0;
}

function getStatus(kpiKey, value, targets) {
  if (value === null || value === undefined || value === '' || isNaN(value)) return 'none';
  const def = KPI_BY_KEY[kpiKey];
  const t = (targets && targets[kpiKey]) || DEFAULT_TARGETS[kpiKey];
  const v = Number(value);
  if (def.higher) {
    if (v >= t.target) return 'good';
    if (v >= t.warn)   return 'warn';
    return 'danger';
  } else {
    if (v <= t.target) return 'good';
    if (v <= t.warn)   return 'warn';
    return 'danger';
  }
}

const STATUS_STYLE = {

  warn:   { bg: 'bg-amber-50',   text: 'text-amber-700',   ring: 'ring-amber-200',   dot: '#F59E0B', label: '주의',  hex: '#F59E0B' },
  danger: { bg: 'bg-rose-50',    text: 'text-rose-700',    ring: 'ring-rose-200',    dot: '#F43F5E', label: '경고',  hex: '#F43F5E' },
  none:   { bg: 'bg-slate-100',  text: 'text-slate-500',   ring: 'ring-slate-200',   dot: '#94A3B8', label: '—',     hex: '#94A3B8' },
};

// 달성률(0~1+). higher=true면 value/target, false면 target/value (상한 1.5로 클램프 권장)
function getAchievement(kpiKey, value, targets) {
  if (value === null || value === undefined || isNaN(value)) return null;
  const def = KPI_BY_KEY[kpiKey];
  const t = (targets && targets[kpiKey]) || DEFAULT_TARGETS[kpiKey];
  const v = Number(value);
  if (def.higher) {
    return v / (t.target || 1);
  } else {
    if (v <= 0) return 1.5;
    return (t.target || 1) / v;
  }
}

};

    catch { return fallback; }

  set: (k, v) => {
    try { localStorage.setItem('kpi_' + k, JSON.stringify(v)); } catch {}
    if (window.__fb) window.__fb.set(k, v);

async function pullFB() {
  if (!window.__fb) return null;
  try {
    const d = await window.__fb.get();
    const out = {};
    STORE_KEYS.forEach(k => {
      if (d[k] !== undefined) {

          out[k] = parsed;
          localStorage.setItem('kpi_' + k, JSON.stringify(parsed));
        } catch {}
      }
    });
    return out;
  } catch (e) { console.warn('FB pull error', e); return null; }
}

   ============================================================ */
function useHashRoute() {
  const [route, setRoute] = useState(() => window.location.hash.replace(/^#/, '') || '/');
  useEffect(() => {
    const h = () => setRoute(window.location.hash.replace(/^#/, '') || '/');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  const navigate = useCallback((to) => {
    if (window.location.hash.replace(/^#/, '') === to) return;
    window.location.hash = to;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);
  return [route, navigate];
}

/* ============================================================
   5) Count-up 숫자 애니메이션
   ============================================================ */
function CountUp({ value, decimals = 0, duration = 700, suffix = '', className = '' }) {
  const [n, setN] = useState(0);
  const fromRef = useRef(0);
  useEffect(() => {
    const to = (value === null || value === undefined || isNaN(value)) ? 0 : Number(value);
    const from = fromRef.current;
    if (from === to) { setN(to); return; }
    const start = performance.now();
    let raf;
    const step = (t) => {
      const p = Math.min((t - start) / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      const cur = from + (to - from) * eased;
      setN(cur);
      if (p < 1) raf = requestAnimationFrame(step);
      else fromRef.current = to;
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [value, duration]);
  if (value === null || value === undefined || isNaN(value)) {
    return <span className={className + ' num'}>—</span>;
  }
  return <span className={className + ' num'}>{fmtNumber(n, decimals)}{suffix}</span>;
}

const ToastCtx = React.createContext(() => {});
function ToastProvider({ children }) {
  const [items, setItems] = useState([]);
  const push = useCallback((msg, kind = 'info', options = {}) => {
    const id = Math.random().toString(36).slice(2);
    setItems(prev => [...prev, { id, msg, kind, action: options.action }]);
    const duration = options.duration || 2600;
    setTimeout(() => setItems(prev => prev.filter(i => i.id !== id)), duration);
  }, []);
  const dismiss = (id) => setItems(prev => prev.filter(x => x.id !== id));
  return (
    <ToastCtx.Provider value={push}>
      {children}
      <div className="fixed top-5 right-5 z-50 flex flex-col gap-2">
        {items.map(i => {
          const kindCls = i.kind === 'success' ? 'bg-emerald-600' :
                          i.kind === 'error'   ? 'bg-rose-600' :
                          i.kind === 'warn'    ? 'bg-amber-600' : 'bg-slate-800';
          return (
            <div key={i.id} className={`pl-4 pr-2 py-2 rounded-xl text-white text-sm shadow-xl animate-slide-down flex items-center gap-3 ${kindCls}`}>
              <span>{i.msg}</span>
              {i.action && (
                <button onClick={() => { i.action.onClick(); dismiss(i.id); }}
                  className="px-2.5 py-1 rounded-md bg-white/20 hover:bg-white/30 text-xs font-bold">
                  {i.action.label}
                </button>
              )}
            </div>
          );
        })}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => React.useContext(ToastCtx);

        if (erpChanged)  LS.set('erpTrash',        erpCleaned);
        if (prodChanged) LS.set('productionTrash', prodCleaned);
        return { ...prev, erpTrash: erpCleaned, productionTrash: prodCleaned };
      });
    };
    purge();
    const id = setInterval(purge, 60 * 60 * 1000);
    return () => clearInterval(id);
  }, [data.erpTrash.length, data.productionTrash.length]);

  const isHome = route === '/' || route === '';

  return (
    <ConfirmProvider>
    <ToastProvider>
      {syncing && (
        <div className="fixed top-0 left-0 right-0 h-0.5 z-[99999] bg-slate-200 overflow-hidden">
          <div className="h-full bg-indigo-500 shimmer" style={{width:'100%'}}></div>
        </div>
      )}
      {isHome ? (
        <HomePage navigate={navigate} data={data} />
      ) : (
        <div className="min-h-screen flex flex-col">
          <TopBar route={route} navigate={navigate} lastSync={lastSync} syncing={syncing} />
          <main className="flex-1 px-6 lg:px-10 py-6 max-w-[1600px] w-full mx-auto">
            {route === '/dashboard'           && <DashboardPage     data={data} />}
            {route === '/production'          && <ProductionPage    data={data} onSave={saveProduction} onSaveTrash={saveProductionTrash} onSaveJournal={saveWeeklyJournal} onSaveCatalog={saveProductCatalog} onSaveBunghalLog={saveBunghalLog} onSaveBunghalCorrections={saveBunghalCorrections} onSaveGeminiKey={saveGeminiApiKey} onSaveGeminiPassHash={saveGeminiPassHash} />}
            {route === '/quality'             && <QualityPage       data={data}
                                                                    onSave={saveQuality}
                                                                    onSaveErp={saveErpReports}
                                                                    onSaveErpTrash={saveErpTrash} />}
            {route === '/production/settings' && <ProductionSettings data={data} onSave={saveTargets} />}
            {route === '/quality/settings'    && <QualitySettings    data={data} onSave={saveQualityTargets} />}
            {/* 구 라우트 호환 */}
            {route === '/settings'            && <ProductionSettings data={data} onSave={saveTargets} />}
          </main>

      )}
    </ToastProvider>

  );
}

/* ============================================================
   11-C) ConfirmProvider — 확인/취소 팝업 (브라우저 confirm 대체)
   ============================================================ */
const ConfirmCtx = React.createContext(() => Promise.resolve(false));
function ConfirmProvider({ children }) {
  const [pending, setPending] = useState(null); // { message, resolve }
  const confirm = useCallback((message) => new Promise(resolve => setPending({ message, resolve })), []);
  const close = (result) => { if (pending) { pending.resolve(result); setPending(null); } };
  useEffect(() => {
    if (!pending) return;
    const h = (e) => { if (e.key === 'Escape') close(false); };
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [pending]);
  return (
    <ConfirmCtx.Provider value={confirm}>
      {children}
      {pending && (
        <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 animate-fade-in"
             style={{ background: 'rgba(15,23,42,0.55)', backdropFilter: 'blur(4px)' }}
             onClick={() => close(false)}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 animate-pop"
               onClick={e => e.stopPropagation()}>
            <div className="flex items-start gap-4 mb-5">
              <div className="w-10 h-10 rounded-xl bg-rose-50 flex items-center justify-center shrink-0 text-xl">🗑️</div>
              <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap pt-1">{pending.message}</p>
            </div>
            <div className="flex gap-2">
              <button onClick={() => close(false)} autoFocus
                className="flex-1 py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold transition-colors">
                취소
              </button>
              <button onClick={() => close(true)}
                className="flex-1 py-2.5 rounded-xl bg-rose-600 hover:bg-rose-700 text-white text-sm font-bold transition-colors">
                확인
              </button>
            </div>
          </div>
        </div>
      )}
    </ConfirmCtx.Provider>
  );
}
const useConfirm = () => React.useContext(ConfirmCtx);

function DashboardPage({ data }) {
  const [period, setPeriod] = useState('day'); // 'day' | 'week' | 'month' | 'all'
  const targets = data.targets || DEFAULT_TARGETS;
  const qualityTargets = data.qualityTargets || DEFAULT_QUALITY_TARGETS;

  const today = todayYMD();
  const yesterday = ymdShift(today, -1);
  const todayIso = getISOWeek(today);
  const thisWeekKey  = `${todayIso.year}-W${pad2(todayIso.week)}`;
  const thisMonthKey = today.slice(0, 7);

  // 사용자가 선택한 일/주/월 (빈 문자열 → useEffect가 최신 데이터 기준으로 자동 설정)
  const [selectedDay, setSelectedDay] = useState(yesterday);
  const [selectedWeek, setSelectedWeek] = useState('');
  const [selectedMonth, setSelectedMonth] = useState('');

  // ===== Production / ERP =====
  const prodSorted = useMemo(() => refreshFlatKpis([...(data.production||[])]).sort((a,b)=> a.date < b.date ? -1 : 1), [data.production]);
  const erpSorted  = useMemo(() => [...(data.erpReports||[])].sort((a,b)=> a.reportDate < b.reportDate ? -1 : 1), [data.erpReports]);

  // 사용 가능한 일/주/월 옵션 (production + erpReports 둘 다 기준, 최신순)
  const { availableDays, availableWeeks, availableMonths } = useMemo(() => {
    const days   = new Set();
    const weeks  = new Map();
    const months = new Map();
    const addDate = (ymd) => {
      if (!ymd) return;
      days.add(ymd);
      const w = getISOWeek(ymd);
      const wk = `${w.year}-W${pad2(w.week)}`;
      if (!weeks.has(wk)) {
        const ml = isoWeekToMonthLabel(w.year, w.week);
        weeks.set(wk, `${ml.year} ${ml.month}월 ${ml.weekOfMonth}주차`);
      }
      const ym = ymd.slice(0, 7);
      if (!months.has(ym)) months.set(ym, `${ym.slice(0,4)}년 ${Number(ym.slice(5,7))}월`);
    };
    prodSorted.forEach(e => addDate(e.date));
    erpSorted.forEach(r => addDate(r.reportDate));
    return {
      availableDays:   [...days].sort().reverse(),
      availableWeeks:  [...weeks.entries()].sort((a,b) => a[0] < b[0] ? 1 : -1),
      availableMonths: [...months.entries()].sort((a,b) => a[0] < b[0] ? 1 : -1),
    };
  }, [prodSorted, erpSorted, today]);

  // 선택된 주/월이 유효 목록에 없으면 최신 데이터 기준으로 자동 조정
  useEffect(() => {
    if (availableWeeks.length && !availableWeeks.some(([k]) => k === selectedWeek))
      setSelectedWeek(availableWeeks[0][0]);
    if (availableMonths.length && !availableMonths.some(([k]) => k === selectedMonth))
      setSelectedMonth(availableMonths[0][0]);
  }, [availableWeeks, availableMonths]);

  const selectedWeekLabel  = availableWeeks.find(([k]) => k === selectedWeek)?.[1] || selectedWeek;
  const selectedMonthLabel = availableMonths.find(([k]) => k === selectedMonth)?.[1] || selectedMonth;

  const safeAvg = (arr) => {
    const xs = arr.filter(v => v !== null && v !== undefined && v !== '' && !isNaN(v)).map(Number);
    return xs.length ? xs.reduce((a,b) => a+b, 0) / xs.length : null;
  };

  // 이전 일/주/월 키 — 선택된 일/주/월 기준
  const prevDayKey = useMemo(() => ymdShift(selectedDay, -1), [selectedDay]);

  const prevWeekKey = useMemo(() => {
    const [yStr, wStr] = selectedWeek.split('-W');
    const monday = isoWeekToMonday(Number(yStr), Number(wStr));
    monday.setUTCDate(monday.getUTCDate() - 7);
    const ymd = `${monday.getUTCFullYear()}-${pad2(monday.getUTCMonth()+1)}-${pad2(monday.getUTCDate())}`;
    const iso = getISOWeek(ymd);
    return `${iso.year}-W${pad2(iso.week)}`;
  }, [selectedWeek]);

  const prevMonthKey = useMemo(() => {
    const [y, m] = selectedMonth.split('-').map(Number);
    return m === 1 ? `${y-1}-12` : `${y}-${pad2(m-1)}`;
  }, [selectedMonth]);

  const filterProd = (mode, key) => {
    if (mode === 'day')   return prodSorted.filter(e => e.date === key);
    if (mode === 'week') {
      return prodSorted.filter(e => (e.weekKey === key) || (e.year === Number(key.split('-W')[0]) && e.week === Number(key.split('-W')[1])));
    }
    if (mode === 'month') return prodSorted.filter(e => (e.date || '').startsWith(key));
    return prodSorted; // all
  };

  const prodCurrent = useMemo(() => {
    const entries = period === 'day'   ? filterProd('day',   selectedDay)
                  : period === 'week'  ? filterProd('week',  selectedWeek)
                  : period === 'month' ? filterProd('month', selectedMonth)
                  : prodSorted;
    const values = Object.fromEntries(KPI_DEFS.map(k => [k.key, avgKpiValues(k, entries.map(e => e[k.key]))]));
    const latest = entries[entries.length - 1] || null;
    return { entries, values, count: entries.length, latestTasks: latest?.tasks || emptyTasks() };
  }, [prodSorted, period, selectedDay, selectedWeek, selectedMonth]);

  const prodPrev = useMemo(() => {
    if (period === 'all') return null;
    const entries = period === 'day'  ? filterProd('day',  prevDayKey)
                  : period === 'week' ? filterProd('week', prevWeekKey)
                  :                     filterProd('month', prevMonthKey);
    if (!entries.length) return null;
    return { values: Object.fromEntries(KPI_DEFS.map(k => [k.key, avgKpiValues(k, entries.map(e => e[k.key]))])) };
  }, [prodSorted, period, prevDayKey, prevWeekKey, prevMonthKey]);

  // ===== ERP (품질) =====
  const filterErp = (mode, key) => {
    if (mode === 'day')   return erpSorted.filter(r => r.reportDate === key);
    if (mode === 'week')  return erpSorted.filter(r => {
      if (!r.reportDate) return false;
      const w = getISOWeek(r.reportDate);
      return `${w.year}-W${pad2(w.week)}` === key;
    });
    if (mode === 'month') return erpSorted.filter(r => (r.reportDate || '').startsWith(key));
    return erpSorted;
  };

  const aggErp = (reports) => {
    const records = reports.flatMap(r => r.records || []);
    const totalQty    = records.reduce((a, r) => a + (Number(r.qty) || 0), 0);
    const totalLoss   = records.reduce((a, r) => a + (Number(r.amount) || 0), 0);
    const disposalLoss = records.reduce((a, r) => a + (getDispositionType(r)==='폐기' ? Number(r.amount)||0 : 0), 0);
    const repairLoss   = records.reduce((a, r) => a + (getDispositionType(r)==='수리' ? Number(r.amount)||0 : 0), 0);
    const byFloor = {
      '2F':  { qty:0, amount:0, disposalAmount:0, repairAmount:0 },
      '4F':  { qty:0, amount:0, disposalAmount:0, repairAmount:0 },
      'OUT': { qty:0, amount:0, disposalAmount:0, repairAmount:0 },
    };
    const byType  = Object.fromEntries(ERP_DEFECT_TYPES.map(t => [t, 0]));
    const vendors = new Map();
    records.forEach(r => {
      const f = classifyErpFloor(r.originProc);
      byFloor[f].qty    += Number(r.qty)    || 0;
      byFloor[f].amount += Number(r.amount) || 0;
      if (getDispositionType(r) === '폐기') byFloor[f].disposalAmount += Number(r.amount) || 0;
      else                                   byFloor[f].repairAmount   += Number(r.amount) || 0;
      byType[normalizeDefectType(r.typeDetail)] += Number(r.qty) || 0;
      if (r.originProc === '외주협력업체' && r.vendor) {
        const v = vendors.get(r.vendor) || { vendor: r.vendor, qty: 0, amount: 0 };
        v.qty += Number(r.qty) || 0;
        v.amount += Number(r.amount) || 0;
        vendors.set(r.vendor, v);
      }
    });
    return { reports, records, totalQty, totalLoss, disposalLoss, repairLoss, byFloor, byType,
      vendors: [...vendors.values()].sort((a,b) => b.amount - a.amount) };
  };

  const erpCurrent = useMemo(() => {
    const reports = period === 'day'   ? filterErp('day',   selectedDay)
                  : period === 'week'  ? filterErp('week',  selectedWeek)
                  : period === 'month' ? filterErp('month', selectedMonth)
                  : erpSorted;
    return aggErp(reports);
  }, [erpSorted, period, selectedDay, selectedWeek, selectedMonth]);

  const erpPrev = useMemo(() => {
    if (period === 'all') return null;
    const reports = period === 'day'  ? filterErp('day',  prevDayKey)
                  : period === 'week' ? filterErp('week', prevWeekKey)
                  :                     filterErp('month', prevMonthKey);
    if (!reports.length) return null;
    return aggErp(reports);
  }, [erpSorted, period, prevDayKey, prevWeekKey, prevMonthKey]);

  // 월 누적 (품질 월 목표 대비) — 선택된 월 기준 (또는 전체이면 이번 달)
  const monthForCum = period === 'month' ? selectedMonth : thisMonthKey;
  const prevMonthForCum = useMemo(() => {
    const [y, m] = monthForCum.split('-').map(Number);
    return m === 1 ? `${y-1}-12` : `${y}-${pad2(m-1)}`;
  }, [monthForCum]);
  const monthlyCum = useMemo(() => {
    const cur = filterErp('month', monthForCum);
    const prv = filterErp('month', prevMonthForCum);
    const sumQty  = (rs) => rs.flatMap(r => r.records || []).reduce((a, r) => a + (Number(r.qty)||0), 0);
    const sumLoss = (rs) => rs.flatMap(r => r.records || []).reduce((a, r) => a + (Number(r.amount)||0), 0);
    return {
      current: { defect: sumQty(cur), loss: sumLoss(cur), days: cur.length },
      prev:    { defect: sumQty(prv), loss: sumLoss(prv) },
      ym: monthForCum,
    };
  }, [erpSorted, monthForCum, prevMonthForCum]);

  // 라벨
  const periodLabel = period === 'day'   ? selectedDay
                    : period === 'week'  ? selectedWeekLabel
                    : period === 'month' ? selectedMonthLabel
                    :                      '전체 기간';
  const periodSub = (() => {
    const fmtMD = (ymd) => `${Number(ymd.slice(5,7))}/${Number(ymd.slice(8,10))}`;
    if (period === 'day') {
      const dow = ['일','월','화','수','목','금','토'][parseYMD(selectedDay).getDay()];
      const tag = selectedDay === today ? ' · 오늘' : selectedDay === yesterday ? ' · 어제' : '';
      return `${dow}요일${tag}`;
    }
    if (period === 'week') {
      const [yStr, wStr] = selectedWeek.split('-W');
      const monday = isoWeekToMonday(Number(yStr), Number(wStr));
      const sunday = new Date(monday); sunday.setUTCDate(sunday.getUTCDate() + 6);
      const s = `${monday.getUTCFullYear()}-${pad2(monday.getUTCMonth()+1)}-${pad2(monday.getUTCDate())}`;
      const e = `${sunday.getUTCFullYear()}-${pad2(sunday.getUTCMonth()+1)}-${pad2(sunday.getUTCDate())}`;
      return `${fmtMD(s)} ~ ${fmtMD(e)}${selectedWeek === thisWeekKey ? ' · 이번 주' : ''}`;
    }
    if (period === 'month') {
      const [y, m] = selectedMonth.split('-').map(Number);
      const last = new Date(Date.UTC(y, m, 0)).getUTCDate();
      return `${m}/1 ~ ${m}/${last}${selectedMonth === thisMonthKey ? ' · 이번 달' : ''}`;
    }
    return prodSorted.length || erpSorted.length ? `누적 ${prodSorted.length + erpSorted.length}건` : '';
  })();

  // 빈 상태
  if (!prodSorted.length && !erpSorted.length) {
    return (
      <div className="space-y-6">
        <div>
          <h2 className="text-xl font-bold text-slate-800">매트리스 KPI 통합 대시보드</h2>
          <p className="text-xs text-slate-500 mt-0.5">데이터가 아직 없습니다.</p>
        </div>
        <EmptyHint iconName="dashboard" msg="생산팀에서 주간 입력, 품질팀에서 부적합 리포트를 먼저 등록해 주세요." />
      </div>
    );
  }

  return (
    <div className="space-y-6">
      {/* 헤더 + 기간 토글 */}
      <div className="flex items-center justify-between gap-3 flex-wrap animate-fade-up">
        <div>
          <h2 className="text-2xl font-bold text-slate-800">매트리스 KPI 통합 대시보드</h2>
          <p className="text-sm text-slate-600 mt-1.5 num font-medium">{periodLabel}</p>
          {periodSub && <p className="text-xs text-slate-400 num mt-0.5">{periodSub}</p>}
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          <div className="flex gap-1 bg-slate-100 p-1 rounded-lg">
            {[
              { v:'day',   l:'일별' },
              { v:'week',  l:'주별' },
              { v:'month', l:'월별' },
              { v:'all',   l:'전체' },
            ].map(o => (
              <button key={o.v} onClick={() => setPeriod(o.v)}
                className={`px-4 py-1.5 text-xs font-semibold rounded-md transition-colors
                  ${period === o.v ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                {o.l}
              </button>
            ))}
          </div>
          {period === 'day' && (
            <DateRangePicker mode="single"
              startDate={selectedDay}
              onChange={(d) => d && setSelectedDay(d)}
              min={availableDays.length ? availableDays[availableDays.length - 1] : undefined}
              max={today}
              accent="indigo" />
          )}
          {period === 'week' && availableWeeks.length > 0 && (
            <select value={selectedWeek} onChange={e => setSelectedWeek(e.target.value)}
              className="px-3 py-1.5 border border-slate-200 rounded-lg text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
              {availableWeeks.map(([k, l]) => <option key={k} value={k}>{l}{k === thisWeekKey ? ' (이번 주)' : ''}</option>)}
            </select>
          )}
          {period === 'month' && availableMonths.length > 0 && (
            <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}
              className="px-3 py-1.5 border border-slate-200 rounded-lg text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
              {availableMonths.map(([k, l]) => <option key={k} value={k}>{l}{k === thisMonthKey ? ' (이번 달)' : ''}</option>)}
            </select>
          )}
        </div>
      </div>

      {/* 생산 KPI 5개 */}
      <section>
        <SectionTitle label="생산 KPI" sub={prodCurrent.count ? `${periodLabel} · ${prodCurrent.count}건 ${prodCurrent.count > 1 ? '평균' : ''}` : '입력 없음'} delay={50} />
        {!prodCurrent.count
          ? <EmptyHint iconName="trending" msg={`${periodLabel}에 해당하는 주간 입력이 없습니다.`} />
          : (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4 mt-3">
              {KPI_DEFS.map((kpi, i) => (
                <KpiHeroCard key={kpi.key} kpi={kpi}
                  cur={prodCurrent.values[kpi.key]}
                  prev={prodPrev?.values?.[kpi.key]}
                  targets={targets} delay={i * 60 + 100} />
              ))}
            </div>
          )
        }
      </section>

      {/* 공정별 상세 — 행 단위 grid로 정렬 (같은 row 카드 높이·메모 위치 일치) */}
      {prodCurrent.count > 0 && (() => {
        const visibleProcs = PROCESS_DEFS.filter(p => p.key !== 'etc' && TASK_DEFS[p.key]);
        const maxTaskCount = Math.max(...visibleProcs.map(p => TASK_DEFS[p.key].length));
        return (
          <section className="space-y-3">
            <SectionTitle label="공정별 상세" sub="과제별 KPI와 진행 메모" delay={250} />
            {/* 공정 헤더 한 줄 */}
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-5 mt-3 animate-fade-up">
              {visibleProcs.map(proc => (
                <div key={proc.key}
                     className="rounded-xl bg-white border border-slate-200 shadow-sm px-5 py-4 flex items-center gap-2.5"
                     style={{ background: proc.soft + '50' }}>
                  <span className="w-3 h-3 rounded-full" style={{ background: proc.color }}></span>
                  <h3 className="font-bold text-lg" style={{ color: proc.color }}>{proc.label} 공정</h3>
                </div>
              ))}
            </div>
            {/* 과제별 행 */}
            {Array.from({ length: maxTaskCount }, (_, taskIdx) => (
              <div key={taskIdx} className="grid grid-cols-1 lg:grid-cols-3 gap-5 items-stretch animate-fade-up"
                   style={{ animationDelay: `${300 + taskIdx * 80}ms` }}>
                {visibleProcs.map(proc => {
                  const task = TASK_DEFS[proc.key][taskIdx];
                  if (!task) return <div key={proc.key} />;
                  // progressThis가 그 entry에 없으면 그 task의 가장 최근 progressThis로 fallback
                  const cellValue = (prodCurrent.latestTasks[proc.key] || {})[task.key] || {};
                  let fallbackProgress = '';
                  if (!cellValue.progressThis) {
                    for (let i = prodSorted.length - 1; i >= 0; i--) {
                      const v = prodSorted[i].tasks?.[proc.key]?.[task.key]?.progressThis;
                      if (v && v.trim()) { fallbackProgress = v; break; }
                    }
                  }
                  const value = fallbackProgress
                    ? { ...cellValue, progressThis: fallbackProgress }
                    : cellValue;
                  return (
                    <TaskViewCard key={`${proc.key}-${task.key}`}
                      num={taskIdx + 1}
                      task={task}
                      value={value}
                      accent={proc.color}
                      targets={targets}
                      procKey={proc.key} />
                  );
                })}
              </div>
            ))}
          </section>
        );
      })()}

      {/* 품질 — 부적합 종합 */}
      <section>
        <SectionTitle label="품질 KPI · 부적합 현황" sub={erpCurrent.records.length ? `${periodLabel} 기준 · ${erpCurrent.totalQty}건 / ${fmtKRW(erpCurrent.totalLoss)}` : '입력 없음'} delay={500} />
        {erpCurrent.records.length === 0
          ? <EmptyHint iconName="shield" msg={`${periodLabel}에 부적합 리포트가 없습니다.`} />
          : (
            <Fragment>
              {/* 기간 요약 3 카드 */}
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-3">
                <QualitySummaryCard
                  label="발생 건수"
                  value={erpCurrent.totalQty}
                  prev={erpPrev?.totalQty}
                  unit="건" color="rose" delay={550}
                  target={period === 'week'  ? qualityTargets.weeklyDefect?.target
                        : period === 'month' ? qualityTargets.monthlyDefect?.target
                        : undefined}
                  targetLabel={period === 'week' ? '주 목표' : period === 'month' ? '월 목표' : ''}
                />
                <QualitySummaryCard
                  label="내부 손실 비용"
                  value={(erpCurrent.byFloor?.['2F']?.amount || 0) + (erpCurrent.byFloor?.['4F']?.amount || 0)}
                  prev={erpPrev ? (erpPrev.byFloor?.['2F']?.amount || 0) + (erpPrev.byFloor?.['4F']?.amount || 0) : null}
                  unit="원" isKRW color="fuchsia" delay={610}
                  target={period === 'week'  ? qualityTargets.weeklyInternalLoss?.target
                        : period === 'month' ? qualityTargets.monthlyInternalLoss?.target
                        : undefined}
                  targetLabel={period === 'week' ? '주 목표' : period === 'month' ? '월 목표' : ''}
                />
                <QualitySummaryCard
                  label="외주 손실 금액 합계"
                  value={erpCurrent.vendors.reduce((s, v) => s + (v.amount || 0), 0)}
                  prev={erpPrev?.vendors ? erpPrev.vendors.reduce((s, v) => s + (v.amount || 0), 0) : null}
                  vendorList={erpCurrent.vendors.slice(0, 3).map(v => ({ name: v.vendor, qty: v.qty, loss: v.amount }))}
                  unit="원" isKRW color="pink" delay={670}
                  target={period === 'week'  ? qualityTargets.weeklyVendorLoss?.target
                        : period === 'month' ? qualityTargets.monthlyVendorLoss?.target
                        : undefined}
                  targetLabel={period === 'week' ? '주 목표' : period === 'month' ? '월 목표' : ''}
                />
              </div>

              {/* 분포 차트 — 유형 도넛 + 공정 막대 */}
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 mt-5">
                <Card delay={730}>
                  <CardHeader title="부적합 유형 분포" sub={`${periodLabel} 누적`} />
                  <div className="p-5">
                    <SummaryTypeDonut byType={erpCurrent.byType} />
                  </div>
                </Card>
                <Card delay={790}>
                  <CardHeader title="제조공정 분포" sub={`${periodLabel} · 건수·손실`} />
                  <div className="p-5">
                    <SummaryFloorBar byFloor={erpCurrent.byFloor} />
                  </div>
                </Card>
              </div>
            </Fragment>
          )
        }
      </section>
    </div>
  );
}

function SectionTitle({ label, sub, delay = 0 }) {
  return (
    <div className="flex items-end justify-between mt-1 animate-fade-up" style={{animationDelay:`${delay}ms`}}>
      <div>
        <h2 className="text-lg font-bold text-slate-800">{label}</h2>
        {sub && <p className="text-xs text-slate-500 mt-1">{sub}</p>}
      </div>
    </div>
  );
}
function EmptyHint({ iconName = 'trending', msg }) {
  return (
    <div className="bg-white border border-dashed border-slate-300 rounded-2xl px-6 py-12 text-center text-slate-400 animate-fade-up mt-3">
      <div className="inline-flex w-12 h-12 rounded-2xl bg-slate-50 border border-slate-200 items-center justify-center mb-3 text-slate-400">
        <Icon name={iconName} size={22} />
      </div>
      <div className="text-sm text-slate-500">{msg}</div>
    </div>
  );
}

/* ============================================================
   DateRangePicker — 듀얼 캘린더 popover (기간 선택 통합)
   ============================================================ */
function DateRangePicker({ startDate, endDate, onChange, min, max, accent = 'rose', mode = 'range' }) {
  const [open, setOpen] = useState(false);
  const [pickingEnd, setPickingEnd] = useState(false);
  const [hoverDate, setHoverDate] = useState(null);
  const [viewMonth, setViewMonth] = useState(() => {
    const base = startDate || max || todayYMD();
    return base.slice(0, 7);
  });
  const [popPos, setPopPos] = useState({ top: 0, right: 0 });
  const triggerRef = useRef(null);
  const popoverRef = useRef(null);

  // popover 위치 계산 (트리거 우측 정렬, 아래로 6px)
  const recalcPos = () => {
    if (!triggerRef.current) return;
    const r = triggerRef.current.getBoundingClientRect();
    setPopPos({ top: r.bottom + 6, right: window.innerWidth - r.right });
  };

  useEffect(() => {
    if (!open) return;
    recalcPos();
    const h = (e) => {
      if (triggerRef.current?.contains(e.target) || popoverRef.current?.contains(e.target)) return;
      setOpen(false);
      setPickingEnd(false);
    };
    const onResize = () => recalcPos();
    document.addEventListener('mousedown', h);
    window.addEventListener('resize', onResize);
    window.addEventListener('scroll', onResize, true);
    return () => {
      document.removeEventListener('mousedown', h);
      window.removeEventListener('resize', onResize);
      window.removeEventListener('scroll', onResize, true);
    };
  }, [open]);

  const addMonths = (s, n) => {
    const [y, m] = s.split('-').map(Number);
    const d = new Date(Date.UTC(y, m - 1 + n, 1));
    return `${d.getUTCFullYear()}-${pad2(d.getUTCMonth() + 1)}`;
  };

  const handleSelect = (ymd) => {
    if (min && ymd < min) return;
    if (max && ymd > max) return;
    // 단일 날짜 선택 모드: 한 번 클릭으로 끝
    if (mode === 'single') {
      onChange(ymd, null);
      setOpen(false);
      return;
    }
    if (!pickingEnd) {
      onChange(ymd, '');
      setPickingEnd(true);
    } else {
      const [s, e] = ymd < startDate ? [ymd, startDate] : [startDate, ymd];
      onChange(s, e);
      setPickingEnd(false);
      setOpen(false);
      setHoverDate(null);
    }
  };

  const fmtMonthLabel = (s) => {
    const [y, m] = s.split('-').map(Number);
    return `${y}년 ${m}월`;
  };

  const accentRing  = accent === 'rose' ? 'focus:ring-rose-300' : 'focus:ring-indigo-300';
  const triggerText = mode === 'single'
    ? (startDate || '날짜 선택')
    : (startDate && endDate)
      ? `${startDate} ~ ${endDate}`
      : (startDate ? `${startDate} ~ 종료일 선택` : '기간 선택');

  return (
    <div className="relative">
      <button ref={triggerRef} onClick={() => setOpen(o => !o)}
        className={`px-3 py-1.5 border border-slate-200 rounded-lg text-xs num bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 ${accentRing} flex items-center gap-2`}>
        <Icon name="dashboard" size={12} className="text-slate-400" />
        <span className={startDate ? 'text-slate-700' : 'text-slate-400'}>{triggerText}</span>
      </button>
      {open && ReactDOM.createPortal(
        <div ref={popoverRef}
             style={{ position: 'fixed', top: popPos.top, right: popPos.right, zIndex: 9999 }}
             className="bg-white border border-slate-200 rounded-xl shadow-xl p-4 animate-slide-down">
          {/* 헤더 */}
          <div className="flex items-center justify-between mb-3">
            <button onClick={() => setViewMonth(addMonths(viewMonth, -1))}
              className="w-7 h-7 rounded-md hover:bg-slate-100 text-slate-500 grid place-items-center">‹</button>
            <span className="text-sm font-bold text-slate-700 num">{fmtMonthLabel(viewMonth)}</span>
            <button onClick={() => setViewMonth(addMonths(viewMonth, 1))}
              className="w-7 h-7 rounded-md hover:bg-slate-100 text-slate-500 grid place-items-center">›</button>
          </div>
          {/* 단일 달 그리드 */}
          <MonthGrid month={viewMonth} startDate={startDate} endDate={endDate}
            hoverDate={pickingEnd ? hoverDate : null}
            onSelect={handleSelect} onHover={setHoverDate} min={min} max={max} accent={accent} />
          {/* 상태 안내 */}
          <div className="mt-3 pt-3 border-t border-slate-100 flex items-center justify-between text-[11px] text-slate-500">
            <span>{mode === 'single' ? '날짜를 선택하세요' : (pickingEnd ? '종료일을 선택하세요' : '시작일을 선택하세요')}</span>
            <button onClick={() => { setOpen(false); setPickingEnd(false); setHoverDate(null); }}
              className="text-slate-400 hover:text-slate-600">닫기</button>
          </div>
        </div>,
        document.body
      )}
    </div>
  );
}

function MonthGrid({ month, startDate, endDate, hoverDate, onSelect, onHover, min, max, accent }) {
  const [y, m] = month.split('-').map(Number);
  const firstDay = new Date(Date.UTC(y, m - 1, 1));
  const firstDow = firstDay.getUTCDay(); // 일=0, 월=1, ..., 토=6
  const lastDate = new Date(Date.UTC(y, m, 0)).getUTCDate();
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= lastDate; d++) cells.push(d);

  const accentCls = accent === 'rose'
    ? { selected: 'bg-rose-500 text-white font-bold', inRange: 'bg-rose-100 text-rose-700' }
    : { selected: 'bg-indigo-500 text-white font-bold', inRange: 'bg-indigo-100 text-indigo-700' };

  // hover 범위: startDate가 선택된 상태에서 hoverDate가 있을 때
  const previewEnd = hoverDate && startDate && hoverDate >= startDate ? hoverDate : null;
  const rangeStart = startDate;
  const rangeEnd   = endDate || previewEnd;

  const dowColor = (col) => col === 0 ? 'text-rose-500' : col === 6 ? 'text-blue-500' : 'text-slate-700';
  const dowHeaderColor = (col) => col === 0 ? 'text-rose-400' : col === 6 ? 'text-blue-400' : 'text-slate-400';

  return (
    <div>
      <div className="grid grid-cols-7 gap-0.5 text-[10px] font-semibold text-center mb-1">
        {['일','월','화','수','목','금','토'].map((d, i) =>
          <div key={d} className={`w-8 ${dowHeaderColor(i)}`}>{d}</div>
        )}
      </div>
      <div className="grid grid-cols-7 gap-0.5">
        {cells.map((d, i) => {
          if (d === null) return <div key={i} className="w-8 h-8" />;
          const ymd = `${y}-${pad2(m)}-${pad2(d)}`;
          const disabled = (min && ymd < min) || (max && ymd > max);
          const isStart = ymd === rangeStart;
          const isEnd   = ymd === rangeEnd;
          const inRange = rangeStart && rangeEnd && ymd > rangeStart && ymd < rangeEnd;
          const col = i % 7;
          const baseColor = dowColor(col);
          const cls = disabled ? 'text-slate-300 cursor-not-allowed'
                    : (isStart || isEnd) ? accentCls.selected
                    : inRange ? accentCls.inRange
                    : `hover:bg-slate-100 ${baseColor} cursor-pointer`;
          return (
            <button key={i} disabled={disabled}
              onClick={() => !disabled && onSelect(ymd)}
              onMouseEnter={() => !disabled && onHover && onHover(ymd)}
              className={`w-8 h-8 text-xs rounded num ${cls}`}>
              {d}
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================================
   13) 집계 함수 (일/주/월)
   ============================================================ */
function aggregateProduction(entries, period) {
  if (period === 'day') {
    return entries.map(e => ({
      key: e.date,
      label: ymdToLabel(e.date),
      ymd: e.date,
      values: Object.fromEntries(KPI_DEFS.map(k => [k.key, e[k.key] ?? null])),
      entries: [e],
      count: 1,
    }));
  }
  const groups = new Map();
  entries.forEach(e => {
    let key, label;
    if (period === 'week') {
      const w = getISOWeek(e.date);
      key = `${w.year}-W${pad2(w.week)}`;
      const ml = isoWeekToMonthLabel(w.year, w.week);
      label = `${ml.year} ${ml.month}월 ${ml.weekOfMonth}주차`;
    } else {
      const m = getYearMonth(e.date);
      key = `${m.year}-${pad2(m.month)}`;
      label = `${m.year}년 ${m.month}월`;
    }
    if (!groups.has(key)) groups.set(key, { key, label, ymd: e.date, entries: [] });
    groups.get(key).entries.push(e);
  });
  return [...groups.values()].sort((a,b) => a.key < b.key ? -1 : 1).map(g => ({
    key: g.key,
    label: g.label,
    ymd: g.entries[g.entries.length-1].date,
    values: Object.fromEntries(KPI_DEFS.map(k => [k.key, avgKpiValues(k, g.entries.map(e => e[k.key]))])),
    entries: g.entries,
    count: g.entries.length,
  }));
}
function aggregateQuality(entries, period) {
  if (period === 'day') {
    return entries.map(e => qualitySummary(e.date, ymdToLabel(e.date), [e]));
  }
  const groups = new Map();
  entries.forEach(e => {
    let key, label;
    if (period === 'week') {
      const w = getISOWeek(e.date);
      key = `${w.year}-W${pad2(w.week)}`;
      const ml = isoWeekToMonthLabel(w.year, w.week);
      label = `${ml.year} ${ml.month}월 ${ml.weekOfMonth}주차`;
    } else {
      const m = getYearMonth(e.date);
      key = `${m.year}-${pad2(m.month)}`;
      label = `${m.year}년 ${m.month}월`;
    }
    if (!groups.has(key)) groups.set(key, { key, label, entries: [] });
    groups.get(key).entries.push(e);
  });
  return [...groups.values()].sort((a,b) => a.key < b.key ? -1 : 1).map(g => qualitySummary(g.key, g.label, g.entries));
}
function qualitySummary(key, label, entries) {
  const all = [];
  entries.forEach(e => (e.items || []).forEach(it => all.push(it)));
  const totalQty  = sum(all.map(it => it.qty));
  const totalLoss = sum(all.map(it => it.lossKrw));
  const byReason  = groupSum(all, 'reason');
  const byProcess = groupSum(all, 'process');
  const topReason = byReason[0] || null;
  return { key, label, totalQty, totalLoss, byReason, byProcess, topReason, count: entries.length };
}
function groupSum(items, field) {
  const map = new Map();
  items.forEach(it => {
    const k = it[field] || '미분류';
    if (!map.has(k)) map.set(k, { name: k, qty: 0, loss: 0 });
    const g = map.get(k);
    g.qty  += Number(it.qty || 0);
    g.loss += Number(it.lossKrw || 0);
  });
  return [...map.values()].sort((a,b) => b.qty - a.qty);
}

/* ============================================================
   14) KPI Hero Card (목표 대비 상태 색 + count-up + 전기간 대비)
   ============================================================ */
function KpiHeroCard({ kpi, cur, prev, targets, delay = 0 }) {
  // 상태 판정 (품질 KPI는 자체 statusFn 사용)
  const status = kpi.statusFn ? kpi.statusFn(cur, targets) : getStatus(kpi.key, cur, targets);
  const s = STATUS_STYLE[status];
  const hasCur = cur !== null && cur !== undefined && !isNaN(cur);
  const hasPrev = prev !== null && prev !== undefined && !isNaN(prev);
  const delta = (hasCur && hasPrev) ? Number(cur) - Number(prev) : null;
  const proc = PROC_BY_KEY[kpi.process] || { label: kpi.procLabel || '품질', color: kpi.color, soft: kpi.soft || '#F1F5F9' };
  const t = (targets && targets[kpi.key]) || DEFAULT_TARGETS[kpi.key] || { target: kpi.target };

  let trendNode = null;
  if (delta !== null) {
    const improved = kpi.higher ? delta > 0 : delta < 0;
    const cls = delta === 0 ? 'text-slate-500 bg-slate-100' :
                improved      ? 'text-emerald-700 bg-emerald-50' :
                                'text-rose-700 bg-rose-50';
    const arrow = delta === 0 ? '→' : improved ? '▲' : '▼';
    trendNode = (
      <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs font-semibold ${cls} num`}>
        <span>{arrow}</span>
        <span>{kpi.decimals === 0 ? Math.round(Math.abs(delta)).toLocaleString('ko-KR') : Math.abs(delta).toFixed(kpi.decimals)}{kpi.unit==='%' ? 'pp' : kpi.unit}</span>
      </span>
    );
  }

  return (
    <article className="relative bg-white rounded-2xl border border-slate-200 p-6 shadow-sm hover:shadow-xl hover:-translate-y-0.5 transition-all overflow-hidden animate-fade-up group"
             style={{ animationDelay: `${delay}ms` }}>
      {/* 좌측 컬러 라인 (공정 색상) */}
      <div className="absolute inset-y-0 left-0 w-1" style={{ background: kpi.color }}></div>
      {/* 우상단 그라데이션 글로우 */}
      <div className="absolute -top-10 -right-10 w-40 h-40 rounded-full opacity-[0.1] group-hover:opacity-[0.18] transition-opacity"
           style={{ background: `radial-gradient(circle, ${kpi.color} 0%, transparent 65%)` }}></div>

      <div className="flex items-center justify-between mb-4 relative">
        <span className="px-2.5 py-1 rounded-md text-xs font-semibold" style={{ background: proc.soft, color: proc.color }}>
          {proc.label}
        </span>
        <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold ${s.bg} ${s.text}`}>
          <span className="w-1.5 h-1.5 rounded-full" style={{ background: s.dot }}></span>
          {s.label}
        </span>
      </div>

      <div className="text-sm text-slate-600 font-medium mb-2">{kpi.label}</div>
      <div className="flex items-baseline gap-1.5 relative">
        {kpi.isKRW ? (
          <div className="text-5xl font-extrabold tracking-tight num" style={{ color: hasCur ? kpi.color : '#CBD5E1' }}>
            {hasCur ? fmtKRW(cur) : '—'}
          </div>
        ) : (
          <Fragment>
            <div className="text-5xl font-extrabold tracking-tight" style={{ color: hasCur ? kpi.color : '#CBD5E1' }}>
              <CountUp value={hasCur ? cur : null} decimals={kpi.decimals} />
            </div>
            <div className="text-base text-slate-500 font-medium">{kpi.unit}</div>
          </Fragment>
        )}
      </div>

      <div className="mt-4 pt-3 border-t border-slate-100 flex items-center justify-between relative">
        <div className="text-xs flex items-center gap-2">
          <span className="text-slate-500">
            목표 <span className="text-slate-800 font-bold num">{kpi.isKRW ? fmtKRW(t.target) : `${fmtNumber(t.target, kpi.decimals)}${kpi.unit}`}</span>
          </span>
        </div>
        {trendNode}
      </div>
    </article>
  );
}

/* ============================================================
   15) Production Trend (Line) — KPI별 토글
   ============================================================ */
function ProductionTrend({ aggregated, targets }) {
  const [active, setActive] = useState('spongeYield');
  const ref = useRef(null);
  const chartRef = useRef(null);
  const kpi = KPI_BY_KEY[active];

  useEffect(() => {
    if (!ref.current || !aggregated.length) {
      if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
      return;
    }
    const labels = aggregated.map(a => a.label);
    const values = aggregated.map(a => a.values[active]);
    const t = (targets && targets[active]) || DEFAULT_TARGETS[active];

    const ctx = ref.current.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 280);
    grad.addColorStop(0, kpi.color + '55');
    grad.addColorStop(1, kpi.color + '00');

    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: kpi.label,
            data: values,
            borderColor: kpi.color,
            backgroundColor: grad,
            fill: true,
            tension: 0.35,
            spanGaps: true,
            borderWidth: 2.5,
            pointRadius: 4,
            pointHoverRadius: 6,
            pointBackgroundColor: kpi.color,
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
          },
          {
            label: '목표',
            data: values.map(() => t.target),
            borderColor: '#94A3B8',
            borderDash: [6, 4],
            borderWidth: 1.5,
            pointRadius: 0,
            fill: false,
            tension: 0,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 700, easing: 'easeOutQuart' },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 }, color: '#475569' } },
          tooltip: {
            backgroundColor: '#0F172A',
            titleFont: { size: 11 }, bodyFont: { size: 12 },
            padding: 10, displayColors: false,
            callbacks: {
              label: (c) => {
                if (c.parsed.y === null) return `${c.dataset.label}: —`;
                return `${c.dataset.label}: ${fmtNumber(c.parsed.y, kpi.decimals)}${kpi.unit}`;
              }
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#64748B', font: { size: 11 } } },
          y: {
            grid: { color: '#F1F5F9' }, ticks: { color: '#64748B', font: { size: 11 } },
            title: { display: true, text: kpi.unit, color: '#94A3B8', font: { size: 10 } }
          }
        }
      }
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [aggregated, active, targets]);

  return (
    <div>
      <div className="flex flex-wrap gap-1.5 mb-4">
        {KPI_DEFS.map(k => (
          <button key={k.key} onClick={() => setActive(k.key)}
            className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center gap-1.5
              ${active === k.key ? 'text-white shadow-sm' : 'text-slate-500 bg-slate-50 hover:bg-slate-100'}`}
            style={active === k.key ? { backgroundColor: k.color } : {}}>
            <span className="w-2 h-2 rounded-full" style={{ background: active === k.key ? '#fff' : k.color }}></span>
            {k.short}
          </button>
        ))}
      </div>
      <div className="relative" style={{ height: '300px' }}>
        {aggregated.length === 0
          ? <div className="absolute inset-0 grid place-items-center text-slate-400 text-sm">기록이 쌓이면 추세가 표시됩니다.</div>
          : <canvas ref={ref}></canvas>}
      </div>
    </div>
  );
}

/* ============================================================
   16) Achievement Row — 목표 달성률 (가로 막대)
   ============================================================ */
// 공정별 추세 차트 정의 — entries에서 직접 tasks 값 추출
const PROCESS_TREND_DEFS = {
  foam: {
    label: '발포',
    color: '#F59E0B',
    fields: [
      { key: 'recotec', label: '레코텍폼',   color: '#F59E0B', unit: '%',  decimals: 1, axis: 'y',
        getValue: e => e.tasks?.foam?.task1?.recotec },
      { key: 'elastic', label: '엘라스틱폼', color: '#3B82F6', unit: '%',  decimals: 1, axis: 'y',
        getValue: e => e.tasks?.foam?.task1?.elastic },
      { key: 'terol',   label: '테롤폼',     color: '#EC4899', unit: '%',  decimals: 1, axis: 'y',
        getValue: e => e.tasks?.foam?.task1?.terol },
    ],
  },
  quilting: {
    label: '퀼팅',
    color: '#8B5CF6',
    fields: [
      { key: 'quilting',  label: '퀼팅 봉탈률',    color: '#8B5CF6', unit: '%', decimals: 2, axis: 'y',
        getValue: e => e.tasks?.quilting?.task1?.quilting },
      { key: 'interlock', label: '인터로크 봉탈률', color: '#A855F7', unit: '%', decimals: 2, axis: 'y',
        getValue: e => e.tasks?.quilting?.task1?.interlock },
    ],
  },
  spring: {
    label: '스프링',
    color: '#10B981',
    dualAxis: true,
    fields: [
      { key: 'springDaily', label: '일 평균 생산량', color: '#10B981', unit: '개', decimals: 0, axis: 'y',
        getValue: e => {
          const vs = [e.tasks?.spring?.task1?.line1, e.tasks?.spring?.task1?.line2]
            .filter(v => v !== null && v !== undefined && v !== '' && !isNaN(v)).map(Number);
          return vs.length ? vs.reduce((a,b) => a+b, 0) / vs.length : null;
        } },
      { key: 'springChangeover', label: '품목 교체 시간', color: '#0EA5E9', unit: '분', decimals: 0, axis: 'y1',
        getValue: e => {
          const vs = [e.tasks?.spring?.task2?.line1, e.tasks?.spring?.task2?.line2]
            .filter(v => v !== null && v !== undefined && v !== '' && !isNaN(v)).map(Number);
          return vs.length ? vs.reduce((a,b) => a+b, 0) / vs.length : null;
        } },
    ],
  },
};

function ProcessTrendChart({ aggregated }) {
  const [active, setActive] = useState('foam');
  const ref = useRef(null);
  const chartRef = useRef(null);
  const procDef = PROCESS_TREND_DEFS[active];

  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    if (!aggregated.length) return;
    const labels = aggregated.map(g => g.label);
    const ctx = ref.current.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 280);
    grad.addColorStop(0, procDef.color + '33');
    grad.addColorStop(1, procDef.color + '00');

    const safeAvg = (arr) => {
      const xs = arr.filter(v => v !== null && v !== undefined && v !== '' && !isNaN(v)).map(Number);
      return xs.length ? xs.reduce((a,b) => a+b, 0) / xs.length : null;
    };

    const datasets = procDef.fields.map((f, i) => ({
      label: f.label,
      data: aggregated.map(g => safeAvg((g.entries || []).map(e => f.getValue(e)))),
      borderColor: f.color,
      backgroundColor: i === 0 ? grad : f.color + '22',
      fill: i === 0 && procDef.fields.length === 1,
      tension: 0.35,
      spanGaps: true,
      borderWidth: 2.5,
      pointRadius: 4, pointHoverRadius: 6,
      pointBackgroundColor: f.color, pointBorderColor: '#fff', pointBorderWidth: 2,
      yAxisID: f.axis,
    }));

    chartRef.current = new Chart(ref.current, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 700, easing: 'easeOutQuart' },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 }, color: '#475569' } },
          tooltip: {
            backgroundColor: '#0F172A', padding: 10,
            callbacks: {
              label: (c) => {
                const f = procDef.fields[c.datasetIndex];
                if (c.parsed.y === null) return `${c.dataset.label}: —`;
                return `${c.dataset.label}: ${fmtNumber(c.parsed.y, f.decimals)}${f.unit}`;
              }
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#64748B', font: { size: 11 } } },
          y: {
            position: 'left', beginAtZero: true,
            grid: { color: '#F1F5F9' },
            ticks: { color: '#64748B', font: { size: 11 } },
            title: { display: true, text: procDef.fields[0]?.unit || '', color: '#94A3B8', font: { size: 10 } },
          },
          ...(procDef.dualAxis && {
            y1: {
              position: 'right', beginAtZero: true,
              grid: { drawOnChartArea: false },
              ticks: { color: '#64748B', font: { size: 11 } },
              title: { display: true, text: procDef.fields.find(f => f.axis === 'y1')?.unit || '', color: '#94A3B8', font: { size: 10 } },
            }
          })
        }
      }
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [aggregated, active]);

  return (
    <div>
      <div className="flex flex-wrap gap-1.5 mb-4">
        {Object.entries(PROCESS_TREND_DEFS).map(([k, def]) => (
          <button key={k} onClick={() => setActive(k)}
            className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center gap-1.5
              ${active === k ? 'text-white shadow-sm' : 'text-slate-500 bg-slate-50 hover:bg-slate-100'}`}
            style={active === k ? { backgroundColor: def.color } : {}}>
            <span className="w-2 h-2 rounded-full" style={{ background: active === k ? '#fff' : def.color }}></span>
            {def.label}
          </button>
        ))}
      </div>
      <div className="relative" style={{ height: '320px' }}>
        {aggregated.length === 0
          ? <div className="absolute inset-0 grid place-items-center text-slate-400 text-sm">기록이 쌓이면 추세가 표시됩니다.</div>
          : <canvas ref={ref}></canvas>}
      </div>
    </div>
  );
}

function AchievementRow({ kpi, value, targets }) {
  const t = (targets && targets[kpi.key]) || DEFAULT_TARGETS[kpi.key];
  const status = getStatus(kpi.key, value, targets);
  const s = STATUS_STYLE[status];
  const ach = getAchievement(kpi.key, value, targets);
  const pct = ach === null ? 0 : Math.max(0, Math.min(1.2, ach));
  const widthPct = Math.min(100, pct * 100 / 1.2); // 0~120% 범위를 0~100% 막대로
  const hasVal = value !== null && value !== undefined && !isNaN(value);

  return (
    <div className="space-y-1.5">
      <div className="flex items-center justify-between text-xs">
        <span className="font-medium text-slate-700">{kpi.short}</span>
        <span className="num">
          {hasVal
            ? <Fragment>
                <span className="text-slate-900 font-bold">{fmtNumber(value, kpi.decimals)}{kpi.unit}</span>
                <span className="text-slate-400"> / {fmtNumber(t.target, kpi.decimals)}{kpi.unit}</span>
              </Fragment>
            : <span className="text-slate-400">—</span>}
        </span>
      </div>
      <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
        <div
          className="h-full rounded-full transition-all duration-700"
          style={{ width: `${widthPct}%`, background: s.hex }}
        ></div>
      </div>
      <div className="flex items-center justify-between text-[10px]">
        <span className={`px-1.5 py-0.5 rounded-md font-semibold ${s.bg} ${s.text}`}>{s.label}</span>
        <span className="text-slate-400 num">{hasVal ? `달성률 ${Math.round((ach || 0) * 100)}%` : ''}</span>
      </div>
    </div>
  );
}

/* ============================================================
   16-B) Monthly Progress Card — 품질 월 누적 목표 대비
   ============================================================ */
function MonthlyProgressCard({ qDef, value, prev, target, monthLabel, days, delay }) {
  const t = target || DEFAULT_QUALITY_TARGETS[qDef.key];
  const status = getQualityStatus(qDef.key, value, { [qDef.key]: t });
  const s = STATUS_STYLE[status];

  // 스케일: 경고 임계의 1.15배 또는 현재값 + 10% 중 큰 것
  const maxScale = Math.max(Number(t.danger) * 1.15, Number(value) * 1.1, 1);
  const pct       = Math.min(100, (Number(value) / maxScale) * 100);
  const targetPct = Math.min(100, (Number(t.target) / maxScale) * 100);
  const warnPct   = Math.min(100, (Number(t.warn)   / maxScale) * 100);
  const dangerPct = Math.min(100, (Number(t.danger) / maxScale) * 100);

  // 전월 대비 (작을수록 좋음)
  let trendNode = null;
  if (value !== null && prev !== null && prev !== undefined) {
    const delta = Number(value) - Number(prev);
    const improved = delta < 0;
    const cls = delta === 0 ? 'text-slate-500 bg-slate-100' :
                improved      ? 'text-emerald-700 bg-emerald-50' :
                                'text-rose-700 bg-rose-50';
    const arrow = delta === 0 ? '→' : improved ? '▼' : '▲';
    trendNode = (
      <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-[10px] font-semibold ${cls} num`}>
        <span>{arrow}</span>
        <span>전월 대비 {qDef.isKRW ? fmtKRW(Math.abs(delta)) : Math.abs(delta).toLocaleString('ko-KR') + qDef.unit}</span>
      </span>
    );
  }

  const valueStr = qDef.isKRW ? fmtKRW(value) : Math.round(Number(value)).toLocaleString('ko-KR');
  const targetStr = qDef.isKRW ? fmtKRW(t.target) : Number(t.target).toLocaleString('ko-KR') + qDef.unit;
  const ratioPct = t.target > 0 ? Math.round((Number(value) / Number(t.target)) * 100) : 0;

  return (
    <article className="relative bg-white rounded-2xl border border-slate-200 p-5 shadow-sm overflow-hidden animate-fade-up"
             style={{ animationDelay: `${delay}ms` }}>
      <div className="absolute -top-12 -right-12 w-44 h-44 rounded-full blur-2xl opacity-10" style={{background: qDef.color}}></div>
      <div className="relative">
        <div className="flex items-start justify-between mb-3">
          <div>
            <div className="flex items-center gap-2 mb-1">
              <span className="px-2 py-0.5 rounded-md text-[10px] font-semibold" style={{ background: qDef.soft, color: qDef.dark }}>
                {monthLabel} 누적
              </span>
              <span className={`inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[10px] font-semibold ${s.bg} ${s.text}`}>
                <span className="w-1.5 h-1.5 rounded-full" style={{ background: s.dot }}></span>
                {s.label}
              </span>
            </div>
            <div className="text-[11px] text-slate-500">{qDef.label} · 상한 {targetStr}</div>
          </div>
          <div className="text-right">
            <div className="text-[10px] text-slate-400">목표 대비</div>
            <div className="text-sm font-bold text-slate-800 num">{ratioPct}%</div>
          </div>
        </div>

        <div className="flex items-baseline gap-2 mb-3">
          <div className="text-3xl font-extrabold text-slate-900 num">{valueStr}</div>
          <div className="text-xs text-slate-500">/ {targetStr}</div>
        </div>

        {/* 멀티-존 진척 바 */}
        <div className="relative h-3 rounded-full bg-slate-100 overflow-hidden">
          {/* 배경 존 — 목표(녹색)/주의(노랑)/경고(빨강) */}
          <div className="absolute inset-y-0 left-0 bg-emerald-100"   style={{ width: `${targetPct}%` }}></div>
          <div className="absolute inset-y-0 bg-amber-100"            style={{ left: `${targetPct}%`, width: `${Math.max(0, warnPct - targetPct)}%` }}></div>
          <div className="absolute inset-y-0 bg-rose-100"             style={{ left: `${warnPct}%`,   width: `${Math.max(0, dangerPct - warnPct)}%` }}></div>
          {/* 현재값 바 */}
          <div className="absolute inset-y-0 left-0 rounded-full transition-all duration-700"
               style={{ width: `${pct}%`, background: s.hex }}></div>
          {/* 목표 / 주의 마커 */}
          <div className="absolute inset-y-[-2px] w-0.5 bg-emerald-600" style={{ left: `${targetPct}%` }} title="목표"></div>
          <div className="absolute inset-y-[-2px] w-0.5 bg-amber-600"   style={{ left: `${warnPct}%`   }} title="주의"></div>
        </div>

        <div className="flex items-center justify-between mt-2 text-[10px] text-slate-500 num">
          <span>0</span>
          <span className="text-emerald-700">목표 {qDef.isKRW ? fmtKRW(t.target) : Number(t.target).toLocaleString('ko-KR')}</span>
          <span className="text-amber-700">주의 {qDef.isKRW ? fmtKRW(t.warn) : Number(t.warn).toLocaleString('ko-KR')}</span>
          <span className="text-rose-700">경고 {qDef.isKRW ? fmtKRW(t.danger) : Number(t.danger).toLocaleString('ko-KR')}</span>
        </div>

        <div className="mt-3 flex items-center justify-between">
          <span className="text-[10px] text-slate-400">이번 달 입력 {days}일</span>
          {trendNode}
        </div>
      </div>
    </article>
  );
}

/* ============================================================
   17) Quality Summary Cards
   ============================================================ */
function QualitySummaryCard({ label, value, prev, unit, isKRW, color = 'rose', delay, vendorList, target, targetLabel }) {
  const colorMap = {
    rose:    { bg: 'from-rose-500 to-pink-500',     soft: 'bg-rose-50',    text: 'text-rose-700' },
    fuchsia: { bg: 'from-fuchsia-500 to-violet-500', soft: 'bg-fuchsia-50', text: 'text-fuchsia-700' },
    pink:    { bg: 'from-pink-500 to-rose-500',     soft: 'bg-pink-50',    text: 'text-pink-700' },
  }[color] || { bg: 'from-rose-500 to-pink-500', soft: 'bg-rose-50', text: 'text-rose-700' };

  // trend (value vs prev)
  let trend = null;
  if (value !== undefined && prev !== null && prev !== undefined) {
    const delta = Number(value) - Number(prev);
    const improved = delta < 0;
    const cls = delta === 0 ? 'text-slate-500 bg-slate-100' : improved ? 'text-emerald-700 bg-emerald-50' : 'text-rose-700 bg-rose-50';
    const arrow = delta === 0 ? '→' : improved ? '▼' : '▲';
    trend = (
      <span className={`inline-flex items-center gap-1 px-1.5 py-0.5 rounded-md text-[10px] font-semibold ${cls} num`}>
        <span>{arrow}</span>
        <span>{isKRW ? fmtKRW(Math.abs(delta)) : Math.abs(delta).toLocaleString('ko-KR') + unit}</span>
      </span>
    );
  }

  return (
    <article className="relative bg-white rounded-2xl border border-slate-200 p-5 shadow-sm overflow-hidden animate-fade-up"
             style={{ animationDelay: `${delay}ms` }}>
      <div className={`absolute -top-10 -right-10 w-36 h-36 rounded-full bg-gradient-to-br ${colorMap.bg} opacity-10 blur-2xl`}></div>
      <div className="relative">
        <div className="text-[11px] text-slate-500 mb-1">{label}</div>
        <div className="flex items-baseline gap-1.5">
          <div className="text-3xl font-extrabold text-slate-900">
            {isKRW
              ? <span className="num">{fmtKRW(value)}</span>
              : <CountUp value={value} decimals={0} suffix={unit ? ` ${unit}` : ''} />}
          </div>
        </div>
        <div className="mt-3">{trend}</div>
        {target !== undefined && target !== null && (
          <div className="mt-3 pt-3 border-t border-slate-100 text-xs text-slate-500">
            {targetLabel || '목표'} <span className="text-slate-800 font-bold num">
              {isKRW ? fmtKRW(target) : `${Number(target).toLocaleString('ko-KR')}${unit || ''}`}
            </span>
          </div>
        )}
        {vendorList && vendorList.length > 0 && (
          <div className="mt-3 pt-3 border-t border-slate-100 space-y-1.5">
            {vendorList.map((r, i) => (
              <div key={r.name} className="flex items-center justify-between text-xs gap-2">
                <div className="text-slate-600 truncate min-w-0 flex-1" title={r.name}>
                  <span className="text-slate-400 num mr-1.5">{i + 1}.</span>
                  <span className="font-medium">{r.name}</span>
                  <span className="text-slate-400 num"> ({r.qty}건)</span>
                </div>
                <span className="num font-semibold text-slate-700 shrink-0">
                  {fmtKRW(r.loss)}
                </span>
              </div>
            ))}
          </div>
        )}
      </div>
    </article>
  );
}
