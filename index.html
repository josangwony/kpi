/* ============================================================
   22) PRODUCTION PAGE — 일별 입력
   ============================================================ */
function ProductionPage({ data, onSave, onSaveTrash, onSaveJournal, onSaveCatalog, onSaveBunghalLog, onSaveBunghalCorrections, onSaveGeminiKey, onSaveGeminiPassHash }) {
  const toast = useToast();
  const [tab, setTab] = useState('input');
  const today = todayYMD();
  const yesterday = ymdShift(today, -1);
  // 기본 입력 일자 = 어제 (오늘 데이터는 다음날 입력되는 운영 패턴)
  const [selectedDate, setSelectedDate] = useState(yesterday);

  const [tasks, setTasks] = useState(() => emptyTasks());

  const findExisting = (list, dateKey) => (list || []).find(e => e.date === dateKey);

  // 일자 변경 / 데이터 변경 시 — 그 일자 entry 로드 + 비어있는 task3/progressThis는 같은 주 다른 entry에서 carry-forward
  useEffect(() => {
    const ex = findExisting(data.production, selectedDate);
    const baseTasks = ex && ex.tasks ? { ...emptyTasks(), ...ex.tasks } : emptyTasks();

    // 같은 주의 다른 일자 entries (자기 자신 제외, 최신 우선)
    const selIso = getISOWeek(selectedDate);
    const sameWeekOthers = (data.production || [])
      .filter(e => e.date && e.date !== selectedDate)
      .filter(e => {
        const w = getISOWeek(e.date);
        return w.year === selIso.year && w.week === selIso.week;
      })
      .sort((a, b) => a.date < b.date ? 1 : -1);

    // 새 일자(저장 안 됨)면 이전 일자만, 기존 일자면 같은 주 모든 다른 일자에서 fallback
    const candidates = ex ? sameWeekOthers : sameWeekOthers.filter(e => e.date < selectedDate);

    if (!candidates.length) { setTasks(baseTasks); return; }

    const hasInputField = (taskObj) =>
      taskObj && Object.keys(taskObj).some(k =>
        k !== 'progressThis' && taskObj[k] !== '' && taskObj[k] !== null && taskObj[k] !== undefined
      );

    Object.keys(baseTasks).forEach(procKey => {
      Object.keys(baseTasks[procKey] || {}).forEach(taskKey => {
        const cur = baseTasks[procKey][taskKey] || {};
        // task3 (현장 지원 능력): 입력값이 비어있으면 같은 주 다른 entry에서 끌어옴
        if (taskKey === 'task3' && !hasInputField(cur)) {
          for (const other of candidates) {
            const src = other.tasks?.[procKey]?.task3;
            if (hasInputField(src)) {
              baseTasks[procKey][taskKey] = { ...src, ...(cur.progressThis ? { progressThis: cur.progressThis } : {}) };
              break;
            }
          }
        }
        // progressThis: 현재 비어있으면 같은 주 다른 entry에서 끌어옴
        if (!baseTasks[procKey][taskKey]?.progressThis) {
          for (const other of candidates) {
            const src = other.tasks?.[procKey]?.[taskKey];
            if (src?.progressThis) {
              baseTasks[procKey][taskKey] = { ...(baseTasks[procKey][taskKey] || {}), progressThis: src.progressThis };
              break;
            }
          }
        }
      });
    });

    setTasks(baseTasks);
  }, [selectedDate, data.production]);

  const existing = findExisting(data.production, selectedDate);

  const updateTask = (procKey, taskKey, field, value) => {
    setTasks(prev => ({
      ...prev,
      [procKey]: {
        ...(prev[procKey] || {}),
        [taskKey]: { ...((prev[procKey] || {})[taskKey] || {}), [field]: value },
      },
    }));
  };

  const handleSave = () => {
    const flat = tasksToFlatKpis(tasks);
    const owner = localStorage.getItem('kpi_owner_prod') || '';
    const selIso = getISOWeek(selectedDate);
    const entry = {
      id: existing?.id || crypto.randomUUID(),
      date: selectedDate,
      year: selIso.year, week: selIso.week,
      weekKey: `${selIso.year}-W${pad2(selIso.week)}`,
      owner,
      tasks,
      ...flat,
      createdAt: existing?.createdAt || new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    };
    let next;
    const idx = (data.production || []).findIndex(e => e.date === selectedDate);
    if (idx >= 0) { next = [...data.production]; next[idx] = entry; }
    else          { next = [...(data.production || []), entry]; }
    onSave(next);
    toast(existing ? '수정 저장 완료' : '신규 저장 완료', 'success');
  };

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between gap-2 flex-wrap animate-fade-up">
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-1.5 inline-flex gap-1 flex-wrap">
          <ProductionTabBtn active={tab==='input'}   onClick={() => setTab('input')}   icon="pencil"    label="일간 입력" />
          <ProductionTabBtn active={tab==='journal'} onClick={() => setTab('journal')} icon="notebook"  label="주간 기록" />
          <ProductionTabBtn active={tab==='summary'} onClick={() => setTab('summary')} icon="dashboard" label="종합 지표" />
          <ProductionTabBtn active={tab==='bunghalRecord'} onClick={() => setTab('bunghalRecord')} icon="pencil" label="봉탈 기록" />
          <ProductionTabBtn active={tab==='bunghal'} onClick={() => setTab('bunghal')} icon="shield"    label="봉탈 분석" />
          <ProductionTabBtn active={tab==='history'} onClick={() => setTab('history')} icon="upload"    label="작성 이력" />
        </div>
        {tab === 'input' && (
          <div className="flex items-center gap-2 flex-wrap">
            <div className="inline-flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-1.5 shadow-sm">
              <span className="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">입력 일자</span>
              <DateRangePicker mode="single"
                startDate={selectedDate}
                onChange={(d) => d && setSelectedDate(d)}
                max={today}
                accent="indigo" />
            </div>
            <button onClick={handleSave}
              className="px-4 py-2 rounded-lg text-xs font-semibold bg-gradient-to-r from-sky-500 to-cyan-500 text-white hover:from-sky-600 hover:to-cyan-600 shadow-md shadow-sky-500/20 flex items-center gap-1.5">
              <Icon name="check" size={14} />
              {existing ? '수정 저장' : '신규 저장'}
            </button>
          </div>
        )}
      </div>
      {tab === 'input'   && <ProductionInputTab   tasks={tasks} updateTask={updateTask} />}
      {tab === 'journal' && <WeeklyJournalTab     data={data} onSaveJournal={onSaveJournal} />}
      {tab === 'summary' && <ProductionSummaryTab data={data} />}
      {tab === 'bunghalRecord' && <BunghalAnalysisTab mode="record"   data={data} onSave={onSave} onSaveLog={onSaveBunghalLog} onSaveCatalog={onSaveCatalog} onSaveCorrections={onSaveBunghalCorrections} onSaveGeminiKey={onSaveGeminiKey} onSaveGeminiPassHash={onSaveGeminiPassHash} />}
      {tab === 'bunghal'       && <BunghalAnalysisTab mode="analysis" data={data} onSave={onSave} onSaveLog={onSaveBunghalLog} onSaveCatalog={onSaveCatalog} onSaveCorrections={onSaveBunghalCorrections} onSaveGeminiKey={onSaveGeminiKey} onSaveGeminiPassHash={onSaveGeminiPassHash} />}
      {tab === 'history' && <ProductionHistoryTab data={data} onSave={onSave} onSaveTrash={onSaveTrash} />}
    </div>
  );
}

/* ============================================================
   22-A2) WEEKLY JOURNAL TAB — 공정별 담당자 주간 성장 기록
   ============================================================ */
const JOURNAL_OWNERS = {
  foam:     ['고영주'],
  quilting: ['조상원', '양승우'],
  spring:   ['김민현'],
};

// 주간 기록 시작 주차 (2026 5월 3주차) — 이전 주차는 노출하지 않음
const JOURNAL_START_YEAR = 2026;
const JOURNAL_START_WEEK = 21;

function WeeklyJournalTab({ data, onSaveJournal }) {
  const journal = data.weeklyJournal || {};
  const todayIso = getISOWeek(todayYMD());
  const todayWeekKey = `${todayIso.year}-W${pad2(todayIso.week)}`;

  // 시작 주차(2026-W21) → 오늘 +4주 (미래 4주는 자동, 한 주 지나면 한 주가 더 생성됨)
  const weeks = useMemo(() => {
    const startMonday = isoWeekToMonday(JOURNAL_START_YEAR, JOURNAL_START_WEEK);
    const todayMonday = isoWeekToMonday(todayIso.year, todayIso.week);
    const endMonday   = new Date(todayMonday);
    endMonday.setUTCDate(todayMonday.getUTCDate() + 4 * 7);
    const list = [];
    const cur = new Date(endMonday);
    while (cur.getTime() >= startMonday.getTime()) {
      const ymd = `${cur.getUTCFullYear()}-${pad2(cur.getUTCMonth()+1)}-${pad2(cur.getUTCDate())}`;
      list.push(getISOWeek(ymd));
      cur.setUTCDate(cur.getUTCDate() - 7);
    }
    return list;
  }, [todayIso.year, todayIso.week]);

  const [expanded, setExpanded] = useState(() => ({ [todayWeekKey]: true }));

  const toggle = (key) => setExpanded(prev => ({ ...prev, [key]: !prev[key] }));

  const updateEntry = (weekKey, procKey, owner, text) => {
    const next = {
      ...(journal || {}),
      [weekKey]: {
        ...((journal || {})[weekKey] || {}),
        [procKey]: {
          ...(((journal || {})[weekKey] || {})[procKey] || {}),
          [owner]: text,
        },
      },
    };
    onSaveJournal(next);
  };

  const visibleProcs = PROCESS_DEFS.filter(p => JOURNAL_OWNERS[p.key]);

  return (
    <div className="space-y-3 animate-fade-up">
      <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
        <div className="px-5 py-3.5 border-b border-slate-100 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <Icon name="notebook" size={16} className="text-slate-400" />
            <h3 className="text-sm font-bold text-slate-700">주간 기록</h3>
          </div>
          <div className="text-[11px] text-slate-400">담당자별로 주간 성장·이슈·메모를 자유롭게 기록</div>
        </div>
        <div className="divide-y divide-slate-100">
          {weeks.map(iso => {
            const wk    = `${iso.year}-W${pad2(iso.week)}`;
            const ml    = isoWeekToMonthLabel(iso.year, iso.week);
            const label = `${iso.year} ${ml.month}월 ${ml.weekOfMonth}주차`;
            const isFuture = wk > todayWeekKey;
            const isCurrent = wk === todayWeekKey;
            const isOpen = !!expanded[wk];
            const entry = (journal || {})[wk] || {};
            const totalChars = visibleProcs.reduce((sum, p) => {
              const owners = JOURNAL_OWNERS[p.key];
              return sum + owners.reduce((s, o) => s + (((entry[p.key] || {})[o] || '').length), 0);
            }, 0);

            return (
              <div key={wk} className="bg-white">
                <button onClick={() => toggle(wk)}
                  className="w-full px-5 py-3 flex items-center gap-3 hover:bg-slate-50 transition-colors">
                  <Icon name={isOpen ? 'chevronDown' : 'chevronRight'} size={16} className="text-slate-400" />
                  <span className={`text-sm font-bold ${isCurrent ? 'text-sky-600' : isFuture ? 'text-slate-400' : 'text-slate-700'}`}>{label}</span>
                  {isCurrent && <span className="px-1.5 py-0.5 rounded-md text-[10px] font-bold bg-sky-100 text-sky-700">이번 주</span>}
                  {isFuture && <span className="px-1.5 py-0.5 rounded-md text-[10px] font-bold bg-slate-100 text-slate-500">예정</span>}
                  <div className="flex-1" />
                  {totalChars > 0 && (
                    <span className="text-[11px] text-slate-400 num">{totalChars}자 기록</span>
                  )}
                </button>
                {isOpen && (
                  <div className="px-5 pb-5 pt-1 animate-slide-down">
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                      {visibleProcs.map(proc => (
                        <div key={proc.key}
                             className="rounded-xl border border-slate-200 bg-white overflow-hidden flex flex-col"
                             style={{ background: proc.soft + '40' }}>
                          <div className="px-4 py-2.5 flex items-center gap-2 border-b border-slate-100"
                               style={{ background: proc.soft + '80' }}>
                            <span className="w-2 h-2 rounded-full" style={{ background: proc.color }}></span>
                            <h4 className="text-sm font-bold" style={{ color: proc.color }}>{proc.label}</h4>
                          </div>
                          <div className="p-3 space-y-2.5 bg-white">
                            {JOURNAL_OWNERS[proc.key].map(owner => (
                              <JournalCell key={owner}
                                owner={owner}
                                value={((entry[proc.key] || {})[owner]) || ''}
                                onCommit={(text) => updateEntry(wk, proc.key, owner, text)} />
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function JournalCell({ owner, value, onCommit }) {
  const [draft, setDraft] = useState(value || '');
  const draftRef    = useRef(draft);
  const valueRef    = useRef(value || '');
  const onCommitRef = useRef(onCommit);
  useEffect(() => { setDraft(value || ''); valueRef.current = value || ''; }, [value]);
  useEffect(() => { draftRef.current = draft; }, [draft]);
  useEffect(() => { onCommitRef.current = onCommit; }, [onCommit]);

  const commit = () => {
    const cur = draftRef.current || '';
    if (cur === (valueRef.current || '')) return;
    onCommitRef.current(cur);
  };

  // 창 닫기 · 탭 전환 · 새로고침 직전 강제 commit (onBlur가 안 터지는 경우 대비)
  useEffect(() => {
    const flush = () => {
      const cur = draftRef.current || '';
      if (cur !== (valueRef.current || '')) onCommitRef.current(cur);
    };
    const onVis = () => { if (document.visibilityState === 'hidden') flush(); };
    window.addEventListener('pagehide', flush);
    document.addEventListener('visibilitychange', onVis);
    return () => {
      window.removeEventListener('pagehide', flush);
      document.removeEventListener('visibilitychange', onVis);
    };
  }, []);

  return (
    <div>
      <label className="block text-[11px] text-slate-500 font-semibold mb-1">{owner}</label>
      <textarea
        value={draft}
        onChange={e => setDraft(e.target.value)}
        onBlur={commit}
        placeholder="이번 주 진행 사항·배운 점·이슈…"
        className="w-full h-28 px-3 py-2 border border-slate-200 rounded text-sm resize-none bg-white focus:outline-none focus:ring-2 focus:ring-sky-300 placeholder:text-slate-300 leading-relaxed" />
    </div>
  );
}

/* ============================================================
   22-B) PRODUCTION SUMMARY TAB — 종합 지표 (주간 기반)
   ============================================================ */
function aggregateProductionByPeriod(entries, period, opts = {}) {
  // 단일 일자: 선택된 일자의 entry (없으면 빈 배열)
  if (period === 'day') {
    const targetDate = opts.day || todayYMD();
    const filtered = (entries || []).filter(e => e.date === targetDate);
    if (!filtered.length) return [];
    const e = filtered[0];
    return [{
      key: e.date,
      label: ymdToLabel(e.date),
      ymd: e.date,
      values: Object.fromEntries(KPI_DEFS.map(k => [k.key, e[k.key] ?? null])),
      entries: filtered,
      count: filtered.length,
    }];
  }
  // 이번 주: 이번 주의 일별 entries 모두 평균
  if (period === 'thisweek') {
    const iso = getISOWeek(todayYMD());
    const wk  = `${iso.year}-W${pad2(iso.week)}`;
    const filtered = (entries || []).filter(e => {
      if (!e.date) return false;
      const w = getISOWeek(e.date);
      return `${w.year}-W${pad2(w.week)}` === wk;
    });
    if (!filtered.length) return [];
    const monday = (() => {
      const m = isoWeekToMonday(iso.year, iso.week);
      return `${m.getUTCFullYear()}-${pad2(m.getUTCMonth()+1)}-${pad2(m.getUTCDate())}`;
    })();
    return [{
      key: wk,
      label: `${iso.year} ${isoWeekToMonthLabel(iso.year, iso.week).month}월 ${isoWeekToMonthLabel(iso.year, iso.week).weekOfMonth}주차`,
      ymd: monday,
      values: Object.fromEntries(KPI_DEFS.map(k => [k.key, avgKpiValues(k, filtered.map(e => e[k.key]))])),
      entries: filtered,
      count: filtered.length,
    }];
  }
  // 전체: 모든 데이터 평균
  if (period === 'all') {
    if (!entries.length) return [];
    const dates = entries.map(e => e.date).filter(Boolean).sort();
    const label = dates.length === 1 ? dates[0] : (dates.length ? `${dates[0]} ~ ${dates[dates.length-1]}` : '전체');
    return [{
      key: 'all', label,
      ymd: dates[dates.length-1] || '',
      values: Object.fromEntries(KPI_DEFS.map(k => [k.key, avgKpiValues(k, entries.map(e => e[k.key]))])),
      entries,
      count: entries.length,
    }];
  }
  // 기간: 시작~종료 사이 entry, 주차 grouping
  if (period === 'range') {
    const { start, end } = opts;
    const filtered = (entries || []).filter(e => {
      if (!e.date) return false;
      if (start && e.date < start) return false;
      if (end   && e.date > end)   return false;
      return true;
    });
    return aggregateProductionByPeriod(filtered, 'week');
  }
  // 주별 / 월별: 기존 aggregateProduction 활용
  return aggregateProduction(entries, period);
}

function ProductionSummaryTab({ data }) {
  const reports = useMemo(() => refreshFlatKpis(data.production || []), [data.production]);
  const targets = data.targets || DEFAULT_TARGETS;
  const today = todayYMD();
  const yesterday = ymdShift(today, -1);
  const todayIso = getISOWeek(today);
  const thisWeekKey  = `${todayIso.year}-W${pad2(todayIso.week)}`;
  const thisMonthKey = today.slice(0, 7);
  const [period, setPeriod] = useState('day');
  const [selectedDay, setSelectedDay]     = useState(yesterday);
  const [selectedWeek, setSelectedWeek]   = useState('');
  const [selectedMonth, setSelectedMonth] = useState('');
  const [startDate, setStartDate] = useState('');
  const [endDate, setEndDate]     = useState('');

  // 사용 가능한 주차·월 (대시보드 패턴 동일)
  const { availableWeeks, availableMonths, dataRange } = useMemo(() => {
    const weeks = new Map();
    const months = new Map();
    const ds = [];
    reports.forEach(r => {
      if (!r.date) return;
      ds.push(r.date);
      const w = getISOWeek(r.date);
      const wk = `${w.year}-W${pad2(w.week)}`;
      if (!weeks.has(wk)) {
        const ml = isoWeekToMonthLabel(w.year, w.week);
        weeks.set(wk, `${ml.year} ${ml.month}월 ${ml.weekOfMonth}주차`);
      }
      const ym = r.date.slice(0, 7);
      if (!months.has(ym)) months.set(ym, `${ym.slice(0,4)}년 ${Number(ym.slice(5,7))}월`);
    });
    const dsSorted = ds.sort();
    return {
      availableWeeks:  [...weeks.entries()].sort((a,b) => a[0] < b[0] ? 1 : -1),
      availableMonths: [...months.entries()].sort((a,b) => a[0] < b[0] ? 1 : -1),
      dataRange:       { min: dsSorted[0] || '', max: dsSorted[dsSorted.length-1] || '' },
    };
  }, [reports, today]);

  useEffect(() => {
    if (availableWeeks.length && !availableWeeks.some(([k]) => k === selectedWeek))
      setSelectedWeek(availableWeeks[0][0]);
    if (availableMonths.length && !availableMonths.some(([k]) => k === selectedMonth))
      setSelectedMonth(availableMonths[0][0]);
    if (!startDate && dataRange.min) setStartDate(dataRange.min);
    if (!endDate   && dataRange.max) setEndDate(dataRange.max);
  }, [availableWeeks, availableMonths, dataRange.min, dataRange.max]);

  const [effStart, effEnd] = (startDate && endDate && startDate > endDate) ? [endDate, startDate] : [startDate, endDate];

  // 선택된 주·달 단일 시점 집계 + 이전 주·달 비교
  const prevWeekKey = useMemo(() => {
    const [yStr, wStr] = selectedWeek.split('-W');
    const monday = isoWeekToMonday(Number(yStr), Number(wStr));
    monday.setUTCDate(monday.getUTCDate() - 7);
    const ymd = `${monday.getUTCFullYear()}-${pad2(monday.getUTCMonth()+1)}-${pad2(monday.getUTCDate())}`;
    const iso = getISOWeek(ymd);
    return `${iso.year}-W${pad2(iso.week)}`;
  }, [selectedWeek]);
  const prevMonthKey = useMemo(() => {
    const [y, m] = selectedMonth.split('-').map(Number);
    return m === 1 ? `${y-1}-12` : `${y}-${pad2(m-1)}`;
  }, [selectedMonth]);

  // 기간별 entry 필터링
  const filterByPeriod = (mode, key) => {
    if (mode === 'day')   return reports.filter(e => e.date === key);
    if (mode === 'week')  return reports.filter(e => {
      if (!e.date) return false;
      const w = getISOWeek(e.date);
      return `${w.year}-W${pad2(w.week)}` === key;
    });
    if (mode === 'month') return reports.filter(e => (e.date || '').startsWith(key));
    return reports;
  };

  // KPI 카드용 단일 시점 집계
  const currentAgg = useMemo(() => {
    let entries = [];
    if (period === 'day')        entries = filterByPeriod('day',   selectedDay);
    else if (period === 'week')  entries = filterByPeriod('week',  selectedWeek);
    else if (period === 'month') entries = filterByPeriod('month', selectedMonth);
    else if (period === 'range') entries = reports.filter(e => {
      if (!e.date) return false;
      if (effStart && e.date < effStart) return false;
      if (effEnd   && e.date > effEnd)   return false;
      return true;
    });
    else entries = reports;
    if (!entries.length) return null;
    return {
      values: Object.fromEntries(KPI_DEFS.map(k => [k.key, avgKpiValues(k, entries.map(e => e[k.key]))])),
      count: entries.length,
    };
  }, [reports, period, selectedDay, selectedWeek, selectedMonth, effStart, effEnd]);

  // 이전 시점 (전 주/달/일) 비교용
  const previousAgg = useMemo(() => {
    if (period === 'all' || period === 'range') return null;
    let entries = [];
    if (period === 'day')        entries = filterByPeriod('day',   ymdShift(selectedDay, -1));
    else if (period === 'week')  entries = filterByPeriod('week',  prevWeekKey);
    else if (period === 'month') entries = filterByPeriod('month', prevMonthKey);
    if (!entries.length) return null;
    return {
      values: Object.fromEntries(KPI_DEFS.map(k => [k.key, avgKpiValues(k, entries.map(e => e[k.key]))])),
    };
  }, [reports, period, selectedDay, prevWeekKey, prevMonthKey]);

  // 추세 차트용 시리즈 — 항상 모든 데이터의 주별 grouping
  const chartGrouped = useMemo(() => aggregateProduction(reports, period === 'month' ? 'month' : 'week'), [reports, period]);

  const latestAgg = currentAgg;
  const prevAgg   = previousAgg;

  const periodLabel = period === 'day' ? '일별'
                    : period === 'week' ? '주별'
                    : period === 'month' ? '월별'
                    : period === 'range' ? '기간'
                    : '전체';

  const selectedWeekLabel  = availableWeeks.find(([k]) => k === selectedWeek)?.[1] || selectedWeek;
  const selectedMonthLabel = availableMonths.find(([k]) => k === selectedMonth)?.[1] || selectedMonth;

  const periodMetaLabel = (() => {
    if (period === 'day') {
      const tag = selectedDay === today ? ' · 오늘' : selectedDay === yesterday ? ' · 어제' : '';
      return `${selectedDay}${tag}`;
    }
    if (period === 'week')  return selectedWeekLabel + (selectedWeek === thisWeekKey ? ' · 이번 주' : '');
    if (period === 'month') return selectedMonthLabel + (selectedMonth === thisMonthKey ? ' · 이번 달' : '');
    if (period === 'range') return effStart && effEnd ? `${effStart} ~ ${effEnd}` : '기간을 선택하세요';
    return '전체';
  })();

  const periodMetaSub = (() => {
    const fmtMD = (ymd) => `${Number(ymd.slice(5,7))}/${Number(ymd.slice(8,10))}`;
    if (period === 'day') {
      const dow = ['일','월','화','수','목','금','토'][parseYMD(selectedDay).getDay()];
      return `${dow}요일${currentAgg ? ` · ${currentAgg.count}건` : ''}`;
    }
    if (period === 'week') {
      const [yStr, wStr] = selectedWeek.split('-W');
      const monday = isoWeekToMonday(Number(yStr), Number(wStr));
      const sunday = new Date(monday); sunday.setUTCDate(sunday.getUTCDate() + 6);
      const s = `${monday.getUTCFullYear()}-${pad2(monday.getUTCMonth()+1)}-${pad2(monday.getUTCDate())}`;
      const e = `${sunday.getUTCFullYear()}-${pad2(sunday.getUTCMonth()+1)}-${pad2(sunday.getUTCDate())}`;
      return `${fmtMD(s)} ~ ${fmtMD(e)}${currentAgg ? ` · ${currentAgg.count}건` : ''}`;
    }
    if (period === 'month') {
      const [y, m] = selectedMonth.split('-').map(Number);
      const last = new Date(Date.UTC(y, m, 0)).getUTCDate();
      return `${m}/1 ~ ${m}/${last}${currentAgg ? ` · ${currentAgg.count}건` : ''}`;
    }
    if (period === 'range' && effStart && effEnd) {
      const days = Math.round((parseYMD(effEnd) - parseYMD(effStart)) / 86400000) + 1;
      return effStart === effEnd ? '1일' : `총 ${days}일`;
    }
    if (period === 'all' && dataRange.min && dataRange.max) {
      return `데이터 ${fmtMD(dataRange.min)} ~ ${fmtMD(dataRange.max)} · ${reports.length}건`;
    }
    return '';
  })();

  if (!reports.length) {
    return <EmptyHint iconName="dashboard" msg="저장된 일간 입력이 없습니다. '일간 입력' 탭에서 KPI를 먼저 등록해 주세요." />;
  }

  return (
    <Fragment>
      {/* 기간 토글 */}
      <Card>
        <div className="p-4 flex items-center justify-between flex-wrap gap-3">
          <div>
            <div className="text-sm font-bold text-slate-800">생산 KPI 종합 지표</div>
            <div className="text-[11px] text-slate-500 mt-0.5 num">{periodMetaLabel}</div>
            {periodMetaSub && <div className="text-[10px] text-slate-400 mt-0.5 num">{periodMetaSub}</div>}
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            <div className="flex gap-1 bg-slate-100 p-1 rounded-lg">
              {[
                { v:'day',   l:'일별' },
                { v:'week',  l:'주별' },
                { v:'month', l:'월별' },
                { v:'range', l:'기간' },
                { v:'all',   l:'전체' },
              ].map(o => (
                <button key={o.v} onClick={() => setPeriod(o.v)}
                  className={`px-3 py-1.5 text-xs font-semibold rounded-md transition-colors
                    ${period === o.v ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                  {o.l}
                </button>
              ))}
            </div>
            {period === 'day' && (
              <DateRangePicker mode="single"
                startDate={selectedDay}
                onChange={(d) => d && setSelectedDay(d)}
                max={today}
                accent="indigo" />
            )}
            {period === 'week' && availableWeeks.length > 0 && (
              <select value={selectedWeek} onChange={e => setSelectedWeek(e.target.value)}
                className="px-3 py-1.5 border border-slate-200 rounded-lg text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
                {availableWeeks.map(([k, l]) => <option key={k} value={k}>{l}{k === thisWeekKey ? ' (이번 주)' : ''}</option>)}
              </select>
            )}
            {period === 'month' && availableMonths.length > 0 && (
              <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}
                className="px-3 py-1.5 border border-slate-200 rounded-lg text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
                {availableMonths.map(([k, l]) => <option key={k} value={k}>{l}{k === thisMonthKey ? ' (이번 달)' : ''}</option>)}
              </select>
            )}
            {period === 'range' && (
              <DateRangePicker
                startDate={startDate} endDate={endDate}
                onChange={(s, e) => { setStartDate(s); setEndDate(e); }}
                min={dataRange.min} max={dataRange.max} />
            )}
          </div>
        </div>
      </Card>

      {!currentAgg ? (
        <EmptyHint iconName="dashboard" msg={`${periodLabel}에 해당하는 데이터가 없습니다.`} />
      ) : (
        <Fragment>
          {/* KPI 히어로 5개 — latestAgg 기준 */}
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4">
            {KPI_DEFS.map((kpi, i) => (
              <KpiHeroCard key={kpi.key} kpi={kpi}
                cur={latestAgg?.values?.[kpi.key]}
                prev={prevAgg?.values?.[kpi.key]}
                targets={targets} delay={i * 60 + 50} />
            ))}
          </div>

          {/* KPI × 시점 매트릭스 + 목표 달성률 */}
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
            <Card className="lg:col-span-2" delay={250}>
              <CardHeader title="KPI 매트릭스"
                sub={period === 'day' ? '최근 7일 · 일별' : period === 'week' ? '최근 4주 · 주별' : period === 'month' ? '최근 6개월 · 월별' : period === 'range' ? '기간 내 일별' : '최근 7일'} />
              <KpiMatrix reports={reports} targets={targets}
                period={period} selectedDay={selectedDay} selectedWeek={selectedWeek} selectedMonth={selectedMonth}
                effStart={effStart} effEnd={effEnd} />
            </Card>
            <Card delay={310}>
              <CardHeader title="목표 달성률" sub="선택 시점 기준" />
              <div className="p-5 space-y-3">
                {KPI_DEFS.map(kpi => (
                  <AchievementRow key={kpi.key} kpi={kpi}
                    value={latestAgg?.values?.[kpi.key]} targets={targets} />
                ))}
              </div>
            </Card>
          </div>
        </Fragment>
      )}
    </Fragment>
  );
}

/* ============================================================
   22-B1b) KPI MATRIX — 최근 N일/주/월 KPI × 시점 매트릭스 표
   ============================================================ */
function KpiMatrix({ reports, targets, period, selectedDay, selectedWeek, selectedMonth, effStart, effEnd }) {
  const { columns, unit } = useMemo(() => {
    const cols = [];
    let u = 'day';
    if (period === 'day' || period === 'all') {
      u = 'day';
      for (let i = 6; i >= 0; i--) {
        cols.push(ymdShift(period === 'day' ? selectedDay : todayYMD(), -i));
      }
    } else if (period === 'week') {
      u = 'week';
      const [yStr, wStr] = selectedWeek.split('-W');
      for (let i = 3; i >= 0; i--) {
        const m = isoWeekToMonday(Number(yStr), Number(wStr));
        m.setUTCDate(m.getUTCDate() - i * 7);
        const ymd = `${m.getUTCFullYear()}-${pad2(m.getUTCMonth()+1)}-${pad2(m.getUTCDate())}`;
        const iso = getISOWeek(ymd);
        cols.push(`${iso.year}-W${pad2(iso.week)}`);
      }
    } else if (period === 'month') {
      u = 'month';
      const [y, m] = selectedMonth.split('-').map(Number);
      for (let i = 5; i >= 0; i--) {
        const d = new Date(Date.UTC(y, m - 1 - i, 1));
        cols.push(`${d.getUTCFullYear()}-${pad2(d.getUTCMonth()+1)}`);
      }
    } else if (period === 'range') {
      u = 'day';
      if (effStart && effEnd) {
        const cur = parseYMD(effStart);
        const end = parseYMD(effEnd);
        // 최대 14일까지 (너무 길면 끝쪽만)
        const all = [];
        while (cur <= end) {
          all.push(`${cur.getFullYear()}-${pad2(cur.getMonth()+1)}-${pad2(cur.getDate())}`);
          cur.setDate(cur.getDate() + 1);
        }
        return { columns: all.slice(-14), unit: u };
      }
    }
    return { columns: cols, unit: u };
  }, [period, selectedDay, selectedWeek, selectedMonth, effStart, effEnd]);

  const getCellValue = (kpi, colKey) => {
    let entries;
    if (unit === 'day')        entries = reports.filter(e => e.date === colKey);
    else if (unit === 'week')  entries = reports.filter(e => {
      if (!e.date) return false;
      const w = getISOWeek(e.date);
      return `${w.year}-W${pad2(w.week)}` === colKey;
    });
    else                       entries = reports.filter(e => (e.date || '').startsWith(colKey));
    if (!entries.length) return null;
    return avgKpiValues(kpi, entries.map(e => e[kpi.key]));
  };

  const colLabel = (key) => {
    if (unit === 'day') {
      const dow = ['일','월','화','수','목','금','토'][parseYMD(key).getDay()];
      return { main: `${Number(key.slice(5,7))}/${Number(key.slice(8,10))}`, sub: dow };
    }
    if (unit === 'week') {
      const [yStr, wStr] = key.split('-W');
      const ml = isoWeekToMonthLabel(Number(yStr), Number(wStr));
      return { main: `${ml.month}월 ${ml.weekOfMonth}주`, sub: '' };
    }
    if (unit === 'month') {
      return { main: `${Number(key.slice(5,7))}월`, sub: key.slice(0,4) };
    }
    return { main: key, sub: '' };
  };

  const colDowColor = (key) => {
    if (unit !== 'day') return 'text-slate-600';
    const dow = parseYMD(key).getDay();
    return dow === 0 ? 'text-rose-500' : dow === 6 ? 'text-blue-500' : 'text-slate-600';
  };

  if (!columns.length) {
    return <div className="p-6 text-center text-xs text-slate-400">표시할 시점이 없습니다.</div>;
  }

  return (
    <div className="overflow-x-auto">
      <table className="w-full text-xs border-t border-slate-200">
        <thead>
          <tr className="bg-slate-50">
            <th className="px-3 py-2 text-left font-semibold text-slate-600 sticky left-0 bg-slate-50 z-10 whitespace-nowrap">KPI</th>
            {columns.map(col => {
              const lb = colLabel(col);
              return (
                <th key={col} className={`px-2 py-2 text-center font-semibold whitespace-nowrap ${colDowColor(col)}`}>
                  <div className="num">{lb.main}</div>
                  {lb.sub && <div className="text-[9px] font-normal opacity-70">{lb.sub}</div>}
                </th>
              );
            })}
          </tr>
        </thead>
        <tbody>
          {KPI_DEFS.map(kpi => (
            <tr key={kpi.key} className="border-t border-slate-100 hover:bg-slate-50/30">
              <td className="px-3 py-2 font-bold whitespace-nowrap sticky left-0 bg-white num text-[11px]" style={{ color: kpi.color }}>
                {kpi.short}
                <span className="ml-1 text-[9px] text-slate-400 font-normal">{kpi.unit}</span>
              </td>
              {columns.map(col => {
                const v = getCellValue(kpi, col);
                if (v === null) return <td key={col} className="px-2 py-2 text-center text-slate-300">—</td>;
                const status = kpi.statusFn ? kpi.statusFn(v, targets) : getStatus(kpi.key, v, targets);
                const s = STATUS_STYLE[status] || STATUS_STYLE.none;
                const showBg = status !== 'none';
                return (
                  <td key={col} className={`px-2 py-2 text-center font-bold num ${showBg ? `${s.bg} ${s.text}` : 'text-slate-700'}`}>
                    {fmtNumber(v, kpi.decimals)}
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function makeEmptyBunghalRecord() {

}

// 인식된 작업자명을 catalog.owners 목록 중 가장 가까운 이름으로 교정 (편집거리 ≤ 2)
function snapToKnownOwner(raw, owners) {
  if (!raw || !owners || !owners.length) return raw;
  const s = raw.trim();
  if (!s) return s;
  if (owners.includes(s)) return s;
  const ci = owners.find(o => o.toLowerCase() === s.toLowerCase());
  if (ci) return ci;
  function editDist(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i===0?j:j===0?i:0));
    for (let i = 1; i <= m; i++)
      for (let j = 1; j <= n; j++)
        dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    return dp[m][n];
  }
  let best = raw, bestDist = Infinity;
  owners.forEach(o => { const d = editDist(s, o); if (d < bestDist) { bestDist = d; best = o; } });
  return bestDist <= 2 ? best : raw;
}

// 비밀번호 해시 (Web Crypto API의 SHA-256)
async function sha256Hex(text) {
  const buf = new TextEncoder().encode(text);
  const h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// 품목 표기 정규화 — "데일리SS상" 같은 자유 입력을 catalog에 fuzzy match
function normalizeProductName(raw, catalog) {
  const s = String(raw || '').trim();
  if (!s) return s;
  // alias 직접 치환
  let out = s;
  Object.entries(catalog.aliases || {}).forEach(([from, to]) => {
    out = out.replace(new RegExp(from, 'g'), to);
  });
  return out;
}

// 이미지 압축 — 최대 1500px, JPEG 85% (OCR 품질 유지하면서 전송 크기 축소)
function compressImageDataUrl(dataUrl, maxPx = 1500, quality = 0.85) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const w = Math.round(img.width  * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl); // 실패하면 원본 그대로
    img.src = dataUrl;
  });
}

    ? corrections.map(c => `  - "${c.wrong}" → "${c.correct}"`).join('\n')
    : '  (없음)';
  return `당신은 매트리스 공장의 손글씨 작업일지를 읽어서 *두 개의 표*를 JSON 객체로 변환합니다.

컬럼: 번호 | 품목 | 수량 | 작업시간 | 특이사항
각 행을 다음 필드로 추출 → "production" 배열:

컬럼: 품목 | 수량 | 원인 | 원인공정 | 처리내역

작업시간은 여러 행이 하나의 블록을 공유할 수 있습니다.

// mode: 'daily'  → { date, rate, bunghalQty, prodQty }
//       'weekly' → { week, label, fullLabel, rate, bunghalQty, prodQty }
function BunghalTrendChart({ trend, mode = 'daily' }) {
  const ref = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    const hasData = trend.some(t => t.rate !== null);
    if (!trend.length || !hasData) return;
    const ctx = ref.current.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 260);
    grad.addColorStop(0, 'rgba(139, 92, 246, 0.35)');
    grad.addColorStop(1, 'rgba(139, 92, 246, 0)');
    const xLabels = trend.map(t =>
      mode === 'weekly'
        ? t.label
        : `${Number(t.date.slice(5,7))}/${Number(t.date.slice(8,10))}`
    );
    chartRef.current = new Chart(ref.current, {
      type: 'line',
      data: {
        labels: xLabels,
        datasets: [{
          label: '봉탈률',
          data: trend.map(t => t.rate),
          borderColor: '#8B5CF6',
          backgroundColor: grad,
          borderWidth: 2.5,
          tension: 0.35,
          fill: true,
          spanGaps: false,
          pointBackgroundColor: '#8B5CF6',
          pointBorderColor: '#fff',
          pointBorderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 6,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 800, easing: 'easeOutQuart' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0F172A', padding: 10, displayColors: false,
            callbacks: {
              title: (its) => {
                const t = trend[its[0].dataIndex];
                return mode === 'weekly' ? (t?.fullLabel || t?.label || '') : (t?.date || '');
              },
              label: (c) => {
                const t = trend[c.dataIndex];
                if (!t) return '';
                const lines = [];
                if (t.rate !== null) lines.push(`봉탈률: ${t.rate.toFixed(2)}%`);
                lines.push(`봉탈 ${(t.bunghalQty||0).toLocaleString('ko-KR')}건 · 생산 ${(t.prodQty||0).toLocaleString('ko-KR')}건`);
                return lines;
              },
            },
          },
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#64748B', font: { size: 10 } } },
          y: {
            beginAtZero: true, grace: '5%', grid: { color: '#F1F5F9' },
            ticks: { color: '#64748B', font: { size: 10 }, callback: v => v.toFixed(1) + '%' },
          },
        },
        layout: { padding: { bottom: 2 } },
      },
      plugins: [{
        id: 'bunghalDatalabels',
        afterDatasetsDraw(chart) {
          const { ctx: c2 } = chart;
          const meta = chart.getDatasetMeta(0);
          const dataset = chart.data.datasets[0];
          c2.save();
          c2.font = 'bold 10px sans-serif';
          c2.fillStyle = '#7C3AED';
          c2.textAlign = 'center';
          c2.textBaseline = 'bottom';
          dataset.data.forEach((val, i) => {
            if (val == null) return;
            const pt = meta.data[i];
            if (!pt) return;
            c2.fillText(val.toFixed(1) + '%', pt.x, pt.y - 4);
          });
          c2.restore();
        },
      }],
    });
    chartRef.current.resize();
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [trend, mode]);

  if (!trend.length || !trend.some(t => t.rate !== null)) {
    return <div className="h-64 grid place-items-center text-slate-400 text-sm">생산 데이터 없음 — 봉탈률을 계산하려면 생산량을 먼저 입력해주세요</div>;
  }
  return (
    <div style={{ position: 'relative', height: '280px' }}>
      <canvas ref={ref} height="280"></canvas>
    </div>
  );
}
