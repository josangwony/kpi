      type: 'doughnut',
      data: {
        labels: items.map(it => it.name),
        datasets: [{
          data: items.map(it => it.qty),
          backgroundColor: items.map((_, idx) => colors[idx % colors.length]),
          borderColor: '#fff',
          borderWidth: 2,
          hoverOffset: 4,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '60%',
        animation: { animateRotate: true, duration: 800 },
        plugins: {
          legend: { position: 'bottom', labels: { color: '#475569', font: { size: 11 }, boxWidth: 12, padding: 10 } },
          tooltip: { backgroundColor: '#0F172A', padding: 10,
            callbacks: { label: (c) => {
              const total = items.reduce((s, it) => s + it.qty, 0);
              const pct = total ? Math.round(c.parsed / total * 100) : 0;
              return ` ${c.label}: ${c.parsed}건 (${pct}%)`;
            } } },
        },
      },
    });
    chartRef.current.resize();
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [items]);
  if (!items.length) {
    return <div className="h-56 grid place-items-center text-slate-400 text-sm">데이터 없음</div>;
  }
  return (
    <div style={{ position: 'relative', height: '224px' }}>
      <canvas ref={ref} height="224"></canvas>
    </div>
  );
}

function BunghalAnalysisTab({ data, onSave, onSaveLog, onSaveCatalog, onSaveCorrections, onSaveGeminiKey, onSaveGeminiPassHash, mode = 'analysis' }) {
  const isRecord = mode === 'record';
  const isAnalysis = mode === 'analysis';
  const toast = useToast();
  const dialog = useConfirm();
  const erpReports = data.erpReports || [];
  const bunghalLog = data.bunghalLog || [];
  const catalog    = data.productCatalog || DEFAULT_PRODUCT_CATALOG;
  const today = todayYMD();
  const yesterday = ymdShift(today, -1);

  const [period, setPeriod] = useState('week');
  const [selectedDay, setSelectedDay] = useState(yesterday);
  const [weekStart, setWeekStart] = useState('');
  const [weekEnd,   setWeekEnd]   = useState('');
  const [selectedMonth, setSelectedMonth] = useState(() => today.slice(0, 7));
  const [startDate, setStartDate] = useState('');
  const [endDate, setEndDate] = useState('');
  const [typeFilter, setTypeFilter] = useState('both'); // 'quilting' | 'inter' | 'both'
  const [showMoreCause, setShowMoreCause] = useState(false);
  const [showMoreDefect, setShowMoreDefect] = useState(false);
  const [showMoreWorker, setShowMoreWorker] = useState(false);

  // 작업일지 입력 영역 상태
  const [inputOpen, setInputOpen] = useState(true);
  const [ownerEditOpen, setOwnerEditOpen] = useState(false);
  const [ownerEditText, setOwnerEditText] = useState('');
  const [inputDate, setInputDate] = useState(yesterday);
  const [inputOwner, setInputOwner] = useState(() => localStorage.getItem('kpi_owner_bunghal') || '');
  const [editingEntryId, setEditingEntryId] = useState(null); // 편집 중인 항목 ID (owner 변경 시 신규 생성 방지)
  const [ownerAlert, setOwnerAlert] = useState(null); // 미등록 작업자 팝업 { recognized, reason }
  const [inputRecords, setInputRecords] = useState([]);
  const [productionRecords, setProductionRecords] = useState([]);  // 생산량 (상단 표)
  const [originalRecords, setOriginalRecords] = useState([]); // 인식 직후 원본 (수정 비교용)
  const [photoDataUrl, setPhotoDataUrl] = useState(null);
  const [photoZoomOpen, setPhotoZoomOpen] = useState(false);
  const [recognizing, setRecognizing] = useState(false);
  const apiKey = data.geminiApiKey || '';
  // 비밀번호 잠금
  const [keyUnlocked, setKeyUnlocked] = useState(false);
  const [keyPassMode, setKeyPassMode] = useState(null); // null | 'set' | 'verify'
  const [passInput, setPassInput] = useState('');
  const [passInput2, setPassInput2] = useState('');
  const [passError, setPassError] = useState('');
  const pasteRef = useRef(null);
  const fileRef  = useRef(null);
  const skipReloadRef = useRef(false);  // 인식 후 헤더 자동 갱신 시 useEffect의 reset 건너뛰기

  const hasPassword = !!data.geminiPassHash;

  const setApiKey = (k) => {
    onSaveGeminiKey && onSaveGeminiKey(k || '');
    // 구버전 호환 — localStorage의 옛 키 정리
    if (!k) localStorage.removeItem('kpi_gemini_key');
  };

  // 사진 확대 모달 ESC 닫기
  useEffect(() => {
    if (!photoZoomOpen) return;
    const h = (e) => { if (e.key === 'Escape') setPhotoZoomOpen(false); };
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [photoZoomOpen]);

  // 키 영역 열기 — 비밀번호 미설정 시 'set', 잠겨있으면 'verify'
  const openKeyEditor = () => {
    setPassInput(''); setPassInput2(''); setPassError('');
    if (!hasPassword) setKeyPassMode('set');
    else if (!keyUnlocked) setKeyPassMode('verify');
    else setKeyPassMode(null); // 이미 열려있음
  };

  const closeKeyEditor = () => {
    setKeyPassMode(null);
    setKeyUnlocked(false); // 닫으면 자동 잠금
    setPassInput(''); setPassInput2(''); setPassError('');
  };

  const handleSetPassword = async () => {
    if (passInput.length < 4) { setPassError('비밀번호는 최소 4자 이상'); return; }
    if (passInput !== passInput2) { setPassError('비밀번호가 일치하지 않습니다'); return; }
    const hash = await sha256Hex(passInput);
    onSaveGeminiPassHash && onSaveGeminiPassHash(hash);
    setKeyUnlocked(true);
    setKeyPassMode(null);
    setPassInput(''); setPassInput2(''); setPassError('');
    toast('비밀번호 설정 완료', 'success');
  };

  const handleVerifyPassword = async () => {
    const hash = await sha256Hex(passInput);
    if (hash === (data.geminiPassHash || '')) {
      setKeyUnlocked(true);
      setKeyPassMode(null);
      setPassInput(''); setPassError('');
    } else {
      setPassError('비밀번호가 일치하지 않습니다');
    }
  };

  const handleResetPassword = async () => {
    if (!await dialog('비밀번호와 API 키를 모두 초기화할까요?\nFirestore의 공유 비밀번호·키도 삭제되어 모든 PC에 적용됩니다.')) return;
    localStorage.removeItem('kpi_gemini_pass_hash');
    localStorage.removeItem('kpi_gemini_key');
    onSaveGeminiPassHash && onSaveGeminiPassHash('');
    onSaveGeminiKey && onSaveGeminiKey('');
    setKeyUnlocked(false);
    setKeyPassMode(null);
    setPassInput(''); setPassInput2(''); setPassError('');
    toast('비밀번호·API 키 초기화 완료', 'info');
  };

  // 사진 붙여넣기 — paste 이벤트 → base64
  const onPasteImage = (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const it of items) {
      if (it.type && it.type.startsWith('image/')) {
        const blob = it.getAsFile();
        const reader = new FileReader();
        reader.onload = async ev => setPhotoDataUrl(await compressImageDataUrl(ev.target.result));
        reader.readAsDataURL(blob);
        e.preventDefault();
        return;
      }
    }
  };
  const onPickFile = (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = async ev => setPhotoDataUrl(await compressImageDataUrl(ev.target.result));
    reader.readAsDataURL(file);
  };

  // Gemini Vision 호출 — 작업일지 사진 → JSON record 배열
  const runRecognition = async () => {
    if (!photoDataUrl) { toast('먼저 사진을 붙여넣거나 선택해주세요', 'warn'); return; }
    if (!apiKey) { setShowKeyEditor(true); toast('Gemini API 키를 먼저 등록해주세요', 'warn'); return; }
    setRecognizing(true);
    try {
      const base64 = photoDataUrl.split(',')[1];
      const mimeType = photoDataUrl.match(/^data:(.+);base64/)?.[1] || 'image/png';
      const corrections = (data.bunghalCorrections || []).slice(-30); // 최근 30개만
      const prompt = buildBunghalPrompt(catalog, corrections);
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: prompt },
              { inline_data: { mime_type: mimeType, data: base64 } },
            ],
          }],
          generationConfig: { temperature: 0.1, responseMimeType: 'application/json' },
        }),
      });
      if (!res.ok) {
        const hint = res.status === 400 ? 'API 키가 잘못됐거나 이미지 형식이 지원되지 않습니다.'
                   : res.status === 403 ? 'API 키 권한이 없습니다. 키를 다시 확인해주세요.'
                   : res.status === 429 ? '요청 한도를 초과했습니다. 잠시 후 다시 시도해주세요.'
                   : res.status >= 500 ? `Gemini 서버 오류 (${res.status}). 잠시 후 다시 시도해주세요.`
                   : `오류 코드 ${res.status}`;
        throw new Error(hint);
      }
      const json = await res.json();
      const text = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
      let parsed;
      try { parsed = JSON.parse(text); }
      catch (e) { throw new Error('API 응답을 파싱할 수 없습니다. 사진이 너무 흐리거나 글씨가 잘 안 보이면 다시 촬영해주세요.'); }
      // 호환: 구버전 응답(배열만)도 지원
      const defectsArr = Array.isArray(parsed) ? parsed : (parsed.defects || []);
      const prodArr    = Array.isArray(parsed) ? []     : (parsed.production || []);

      const defectRecords = defectsArr.map(r => {
        let cause = String(r.cause || '').trim();
        let originProc = String(r.originProc || '').trim();
        if (/수선/.test(cause)) {
          originProc = '수선';
          cause = cause.replace(/\s*[\(\[]?\s*수선건?\s*[\)\]]?\s*/g, '').trim();
        }
        return {
          _id: crypto.randomUUID(),
          product:    String(r.product || '').trim(),
          size:       String(r.size || '').trim().toUpperCase(),
          position:   String(r.position || '').trim() || '상',
          qty:        Number(r.qty) || 0,
          cause,
          originProc,
          action:     String(r.action || '').trim(),
        };
      });
      const prodRecs = prodArr.map(r => ({
        _id: crypto.randomUUID(),
        product:  String(r.product || '').trim(),
        size:     String(r.size || '').trim().toUpperCase(),
        position: String(r.position || '').trim() || '상',
        qty:      Number(r.qty) || 0,
        time:     String(r.time || '').trim(),
      }));
      setInputRecords(defectRecords.length ? defectRecords : [makeEmptyBunghalRecord()]);
      setProductionRecords(prodRecs.length ? prodRecs : [makeEmptyProductionRecord()]);
      setOriginalRecords(defectRecords.map(r => ({ ...r })));

      // meta 처리 — 일자·작업자 인식
      const meta = (!Array.isArray(parsed) && parsed.meta) ? parsed.meta : {};
      const recoDate = String(meta.date || '').trim();
      const rawOwner = String(meta.owner || '').trim();
      const recoOwner = snapToKnownOwner(rawOwner, catalog.owners);
      const ownerInCatalog = (catalog.owners || []).includes(recoOwner);
      const dateValid = /^\d{4}-\d{2}-\d{2}$/.test(recoDate);
      const dateDiff = dateValid && recoDate !== inputDate;
      const ownerDiff = ownerInCatalog && recoOwner && recoOwner !== inputOwner;

      if (dateDiff || ownerDiff) {
        const msg = `인식: ${dateValid ? recoDate : '?'} · ${ownerInCatalog ? recoOwner : '?'}\n헤더: ${inputDate} · ${inputOwner || '—'}\n\n헤더를 갱신할까요?`;
        if (await dialog(msg)) {
          skipReloadRef.current = true;
          if (dateValid) setInputDate(recoDate);
          if (ownerInCatalog && recoOwner) handleSaveOwner(recoOwner);
          toast(`헤더 갱신 → ${dateValid ? recoDate : inputDate} · ${ownerInCatalog ? recoOwner : inputOwner}`, 'success');
        }
      }
      // 인식된 작업자가 목록에 없으면 팝업 (저장 막힘)
      if (rawOwner && !ownerInCatalog) {
        setOwnerAlert({ recognized: rawOwner, reason: 'recognition' });
      }
      toast(`생산 ${prodRecs.length}건 · 부적합 ${defectRecords.length}건 인식 완료 — 검토 후 저장`, 'success');
    } catch (e) {
      console.error(e);
      toast('인식 실패: ' + e.message, 'error');
    } finally {
      setRecognizing(false);
    }
  };

  // 일자·작업자 변경 시 — 그 일자+작업자 entry 있으면 로드 (date+owner unique key)
  useEffect(() => {
    if (skipReloadRef.current) { skipReloadRef.current = false; return; }
    // 편집 모드(editingEntryId 설정됨): 작업자 변경 시 records 초기화 방지
    if (editingEntryId) return;
    const ex = bunghalLog.find(e => e.date === inputDate && (e.owner || '') === (inputOwner || '').trim());
    setInputRecords(ex && ex.records ? ex.records : [makeEmptyBunghalRecord()]);
    setProductionRecords(ex && ex.productionRecords ? ex.productionRecords : [makeEmptyProductionRecord()]);
  }, [inputDate, inputOwner, bunghalLog]); // editingEntryId는 의도적으로 deps 제외

  const handleSaveOwner = (name) => {
    setInputOwner(name);
    localStorage.setItem('kpi_owner_bunghal', name);
  };

  const openOwnerEdit = () => {
    setOwnerEditText((catalog.owners || []).join(', '));
    setOwnerEditOpen(true);
  };

  const saveOwnerEdit = () => {
    const list = ownerEditText.split(',').map(s => s.trim()).filter(Boolean);
    if (!list.length) { toast('작업자 1명 이상 필요', 'warn'); return; }
    const nextCatalog = { ...catalog, owners: list };
    onSaveCatalog && onSaveCatalog(nextCatalog);
    // 현재 선택된 작업자가 새 목록에 없으면 첫 번째로 변경
    if (!list.includes(inputOwner)) handleSaveOwner(list[0]);
    setOwnerEditOpen(false);
    toast('작업자 목록 저장 완료', 'success');
  };

  const addRecord = () => setInputRecords(rs => [...rs, makeEmptyBunghalRecord()]);
  const updateRecord = (idx, field, val) => setInputRecords(rs => rs.map((r, i) => i === idx ? { ...r, [field]: val } : r));
  const removeRecord = (idx) => setInputRecords(rs => rs.filter((_, i) => i !== idx));

  const addProdRecord = () => setProductionRecords(rs => [...rs, makeEmptyProductionRecord()]);
  const updateProdRecord = (idx, field, val) => setProductionRecords(rs => rs.map((r, i) => i === idx ? { ...r, [field]: val } : r));
  const removeProdRecord = (idx) => setProductionRecords(rs => rs.filter((_, i) => i !== idx));

  const saveBunghalEntry = () => {
    if (!inputOwner.trim() || !(catalog.owners || []).includes(inputOwner.trim())) {
      setOwnerAlert({ recognized: inputOwner.trim() || null, reason: 'save' });
      return;
    }
    const valid = inputRecords.filter(r =>
      (r.product || '').trim() || (Number(r.qty) || 0) > 0
    );
    const validProd = productionRecords.filter(r =>
      (r.product || '').trim() || (Number(r.qty) || 0) > 0
    );
    if (!valid.length && !validProd.length) { toast('입력된 record가 없습니다', 'warn'); return; }
    // 편집 모드면 ID로 조회, 아니면 date+owner 조합으로 조회
    const existing = editingEntryId
      ? bunghalLog.find(e => e.id === editingEntryId)
      : bunghalLog.find(e => e.date === inputDate && (e.owner || '') === (inputOwner || '').trim());
    const entry = {
      id: existing?.id || crypto.randomUUID(),
      date: inputDate,
      owner: inputOwner || '',
      records: valid,
      productionRecords: validProd,
      createdAt: existing?.createdAt || new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    };
    const next = existing
      ? bunghalLog.map(e => e.id === existing.id ? entry : e)
      : [...bunghalLog, entry];
    setEditingEntryId(null);
    onSaveLog(next);

    // 자가 학습 — 인식 직후 originalRecords와 현재 inputRecords의 차이를 누적
    if (originalRecords.length && onSaveCorrections) {
      const diffs = [];
      const seen = new Set();
      inputRecords.forEach((cur, i) => {
        const orig = originalRecords[i];
        if (!orig) return;
        ['product', 'size', 'position', 'cause', 'originProc', 'action'].forEach(field => {
          const o = String(orig[field] || '').trim();
          const c = String(cur[field] || '').trim();
          if (o && c && o !== c && !seen.has(`${field}:${o}→${c}`)) {
            diffs.push({ field, wrong: o, correct: c, date: new Date().toISOString() });
            seen.add(`${field}:${o}→${c}`);
          }
        });
      });
      if (diffs.length) {
        const prev = data.bunghalCorrections || [];
        // 최근 100개만 유지
        const merged = [...prev, ...diffs].slice(-100);
        onSaveCorrections(merged);
      }
    }

    // 일간 KPI 자동 동기화 — quiltingDefect / interlockDefect
    syncDailyKpiFromBunghal(next, inputDate);

    setOriginalRecords([]);
    setPhotoDataUrl(null);
    toast(`${inputOwner} · ${inputDate} 저장 완료 — 다음 작업자 있으면 헤더 작업자명 변경`, 'success', { duration: 4500 });
  };

  // 일간 KPI(production) 자동 동기화 — 그 일자의 모든 작업자 봉탈·생산을 합산해서 봉탈률 계산
  const syncDailyKpiFromBunghal = (logList, date) => {
    if (!onSave) return;
    const sameDayEntries = (logList || []).filter(e => e.date === date);
    // 그 일자 전체 생산량 + 퀼팅·인터 봉탈 합계
    const totalProduction = sameDayEntries.reduce((s, e) =>
      s + (e.productionRecords || []).reduce((ps, r) => ps + (Number(r.qty) || 0), 0), 0);
    const isBunghal = r => (r.cause || '').trim() === '봉탈';
    const quiltingDefectQty = sameDayEntries.reduce((s, e) =>
      s + (e.records || []).filter(r => r.originProc === '퀼팅' && isBunghal(r)).reduce((rs, r) => rs + (Number(r.qty) || 0), 0), 0);
    const interlockDefectQty = sameDayEntries.reduce((s, e) =>
      s + (e.records || []).filter(r => r.originProc === '인터' && isBunghal(r)).reduce((rs, r) => rs + (Number(r.qty) || 0), 0), 0);

    // 봉탈률 계산 (생산량 0이면 null)
    const quiltingRate  = totalProduction > 0 ? Math.round(quiltingDefectQty  / totalProduction * 10000) / 100 : null;
    const interlockRate = totalProduction > 0 ? Math.round(interlockDefectQty / totalProduction * 10000) / 100 : null;
    if (quiltingRate === null && interlockRate === null) return;

    // 그 일자 production entry 찾기 / 새로 만들기
    const production = data.production || [];
    const existingProd = production.find(p => p.date === date);
    const selIso = getISOWeek(date);
    const baseTasks = existingProd?.tasks ? { ...emptyTasks(), ...existingProd.tasks } : emptyTasks();
    // quilting.task1 (봉탈률) 만 자동 채움 — task2/task3 등은 손대지 않음
    baseTasks.quilting = {
      ...(baseTasks.quilting || {}),
      task1: {
        ...((baseTasks.quilting && baseTasks.quilting.task1) || {}),
        quilting:  quiltingRate ?? ((baseTasks.quilting && baseTasks.quilting.task1) || {}).quilting,
        interlock: interlockRate ?? ((baseTasks.quilting && baseTasks.quilting.task1) || {}).interlock,
      },
    };
    const flat = tasksToFlatKpis(baseTasks);
    const entry = {
      id: existingProd?.id || crypto.randomUUID(),
      date,
      year: selIso.year, week: selIso.week,
      weekKey: `${selIso.year}-W${pad2(selIso.week)}`,
      owner: existingProd?.owner || '',
      tasks: baseTasks,
      ...flat,
      createdAt: existingProd?.createdAt || new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    };
    const nextProd = existingProd
      ? production.map(p => p.id === existingProd.id ? entry : p)
      : [...production, entry];
    onSave(nextProd);
  };

  const deleteBunghalEntry = async () => {
    const existing = editingEntryId
      ? bunghalLog.find(e => e.id === editingEntryId)
      : bunghalLog.find(e => e.date === inputDate && (e.owner || '') === (inputOwner || '').trim());
    if (!existing) { toast('이 일자에 등록된 작업일지가 없습니다', 'warn'); return; }
    if (!await dialog(`${inputDate} 작업일지를 삭제할까요?\n부적합 ${existing.records?.length || 0}건이 함께 삭제됩니다.`)) return;
    const next = bunghalLog.filter(e => e.id !== existing.id);
    setEditingEntryId(null);
    onSaveLog(next);
    setInputRecords([makeEmptyBunghalRecord()]);
    setProductionRecords([makeEmptyProductionRecord()]);
    setOriginalRecords([]);
    syncDailyKpiFromBunghal(next, inputDate);
    toast(`${inputDate} 작업일지 삭제 완료`, 'info');
  };

  const deleteBunghalEntryById = async (id) => {
    const target = bunghalLog.find(e => e.id === id);
    if (!target) return;
    if (!await dialog(`${target.date} · ${target.owner || '—'} 작업일지를 삭제할까요?\n부적합 ${target.records?.length || 0}건이 함께 삭제됩니다.`)) return;
    const next = bunghalLog.filter(e => e.id !== id);
    onSaveLog(next);
    syncDailyKpiFromBunghal(next, target.date);
    toast(`${target.date} · ${target.owner || '—'} 작업일지 삭제 완료`, 'info');
  };

  const editBunghalEntry = (entry) => {
    setEditingEntryId(entry.id || null);
    setInputDate(entry.date);
    setInputOwner(entry.owner || '');
    // records를 직접 로드 (useEffect가 editingEntryId 때문에 skip하므로)
    setInputRecords(entry.records?.length ? entry.records : [makeEmptyBunghalRecord()]);
    setProductionRecords(entry.productionRecords?.length ? entry.productionRecords : [makeEmptyProductionRecord()]);
    setInputOpen(true);
    setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 50);
  };

  const currentEntry = editingEntryId
    ? bunghalLog.find(e => e.id === editingEntryId)
    : bunghalLog.find(e => e.date === inputDate && (e.owner || '') === (inputOwner || '').trim());

  // 1) bunghalLog → 봉탈 records 추출 (date 필드 포함)
  const bunghalRecords = useMemo(() => {
    const out = [];
    bunghalLog.forEach(entry => {
      (entry.records || []).forEach(r => {
        out.push({
          ...r,
          date: entry.date,
          owner: entry.owner,
        });
      });
    });
    return out;
  }, [bunghalLog]);

  // bunghalLog → 생산 records 추출
  const productionRecordsAll = useMemo(() => {
    const out = [];
    bunghalLog.forEach(entry => {
      (entry.productionRecords || []).forEach(r => {
        out.push({
          ...r,
          date: entry.date,
          owner: entry.owner,
        });
      });
    });
    return out;
  }, [bunghalLog]);

  // 2) 사용 가능한 일·주·월 + dataRange
  // bunghalRecords + productionRecordsAll 양쪽 날짜를 합산해야
  // 봉탈 없이 생산량만 입력된 날도 기간 드롭다운에 포함됨
  const { availableDays, availableWeeks, availableMonths, dataRange } = useMemo(() => {
    const days = new Set();
    const weeks = new Map();
    const months = new Map();
    const addDate = (date) => {
      if (!date) return;
      days.add(date);
      const w = getISOWeek(date);
      const wk = `${w.year}-W${pad2(w.week)}`;
      if (!weeks.has(wk)) {
        const ml = isoWeekToMonthLabel(w.year, w.week);
        weeks.set(wk, `${ml.year} ${ml.month}월 ${ml.weekOfMonth}주차`);
      }
      const ym = date.slice(0, 7);
      if (!months.has(ym)) months.set(ym, `${ym.slice(0,4)}년 ${Number(ym.slice(5,7))}월`);
    };
    bunghalRecords.forEach(r => addDate(r.date));
    productionRecordsAll.forEach(r => addDate(r.date));
    const ds = [...days].sort();
    return {
      availableDays:   ds.slice().reverse(),
      availableWeeks:  [...weeks.entries()].sort((a,b) => a[0] < b[0] ? 1 : -1),
      availableMonths: [...months.entries()].sort((a,b) => a[0] < b[0] ? 1 : -1),
      dataRange:       { min: ds[0] || '', max: ds[ds.length-1] || '' },
    };
  }, [bunghalRecords, productionRecordsAll]);

  // 선택된 주/월이 유효 목록에 없으면 최신 데이터 기준으로 자동 조정 (월 변경 시 선택지 없는 문제 방지)
  useEffect(() => {
    if (availableWeeks.length) {
      const asc = [...availableWeeks].reverse(); // 오름차순
      if (!weekEnd || !availableWeeks.some(([k]) => k === weekEnd))
        setWeekEnd(availableWeeks[0][0]); // 최신 주
      if (!weekStart || !availableWeeks.some(([k]) => k === weekStart))
        setWeekStart(asc[Math.max(0, asc.length - 8)][0]); // 최대 8주 전
    }
    if (availableMonths.length && !availableMonths.some(([k]) => k === selectedMonth))
      setSelectedMonth(availableMonths[0][0]);
    if (!startDate && dataRange.min) setStartDate(dataRange.min);
    if (!endDate && dataRange.max)   setEndDate(dataRange.max);
  }, [availableWeeks, availableMonths, dataRange.min, dataRange.max]);

  const [effStart, effEnd] = (startDate && endDate && startDate > endDate) ? [endDate, startDate] : [startDate, endDate];

  // 3) 기간 + 유형 필터로 records 좁히기
  const filtered = useMemo(() => {
    let xs = bunghalRecords;
    if (typeFilter === 'quilting') xs = xs.filter(r => r.originProc === '퀼팅');
    else if (typeFilter === 'inter') xs = xs.filter(r => r.originProc === '인터');

    if (period === 'day') {
      xs = xs.filter(r => r.date === selectedDay);
    } else if (period === 'week') {
      const [ws, we] = weekStart <= weekEnd ? [weekStart, weekEnd] : [weekEnd, weekStart];
      xs = xs.filter(r => {
        if (!r.date) return false;
        const w = getISOWeek(r.date);
        const wk = `${w.year}-W${pad2(w.week)}`;
        return wk >= ws && wk <= we;
      });
    } else if (period === 'month' && selectedMonth) {
      xs = xs.filter(r => (r.date || '').startsWith(selectedMonth));
    } else if (period === 'range') {
      xs = xs.filter(r => {
        if (!r.date) return false;
        if (effStart && r.date < effStart) return false;
        if (effEnd && r.date > effEnd) return false;
        return true;
      });
    }
    return xs;
  }, [bunghalRecords, typeFilter, period, selectedDay, weekStart, weekEnd, selectedMonth, effStart, effEnd]);

  // 생산 records 기간 필터 (defects와 동일 기간 적용, 유형 필터는 무관)
  const filteredProduction = useMemo(() => {
    let xs = productionRecordsAll;
    if (period === 'day') {
      xs = xs.filter(r => r.date === selectedDay);
    } else if (period === 'week') {
      const [ws, we] = weekStart <= weekEnd ? [weekStart, weekEnd] : [weekEnd, weekStart];
      xs = xs.filter(r => {
        if (!r.date) return false;
        const w = getISOWeek(r.date);
        const wk = `${w.year}-W${pad2(w.week)}`;
        return wk >= ws && wk <= we;
      });
    } else if (period === 'month' && selectedMonth) {
      xs = xs.filter(r => (r.date || '').startsWith(selectedMonth));
    } else if (period === 'range') {
      xs = xs.filter(r => {
        if (!r.date) return false;
        if (effStart && r.date < effStart) return false;
        if (effEnd && r.date > effEnd) return false;
        return true;
      });
    }
    return xs;
  }, [productionRecordsAll, period, selectedDay, weekStart, weekEnd, selectedMonth, effStart, effEnd]);

  // 4) 품목 × 일자 cross-tab
  const crossTab = useMemo(() => {
    const products = new Map();          // key → { name, position, byDate }
    const dateSet = new Set();
    filtered.forEach(r => {
      const n = (r.product || '미지정').trim() || '미지정';
      const pos = (r.position || '').trim();
      const key = pos ? `${n}||${pos}` : n;
      const d = r.date || '—';
      dateSet.add(d);
      if (!products.has(key)) products.set(key, { name: n, position: pos, byDate: new Map() });
      const entry = products.get(key);
      entry.byDate.set(d, (entry.byDate.get(d) || 0) + (Number(r.qty) || 0));
    });
    const productList = [...products.values()].map(({ name, position, byDate }) => {
      const total = [...byDate.values()].reduce((a, b) => a + b, 0);
      return { name, position, byDate, total };
    }).sort((a, b) => b.total - a.total);
    const dateList = [...dateSet].sort();
    return { productList, dateList };
  }, [filtered]);

  const totalQty = filtered.reduce((a, r) => a + (Number(r.qty) || 0), 0);
  const totalRecords = filtered.length;
  // 봉탈 원인만 — 봉탈률 계산용 (업체 포함, 봉탈 외 원인 제외)
  const bunghalOnlyQty = filtered.filter(r => (r.cause || '').trim() === '봉탈')
                                 .reduce((a, r) => a + (Number(r.qty) || 0), 0);

  // 일별 추세 — 봉탈률(%) 기반
  const dailyTrend = useMemo(() => {
    const bunghalMap = new Map();
    filtered.filter(r => (r.cause||'').trim() === '봉탈').forEach(r => {
      if (!r.date) return;
      bunghalMap.set(r.date, (bunghalMap.get(r.date) || 0) + (Number(r.qty) || 0));
    });
    const prodMap = new Map();
    filteredProduction.forEach(r => {
      if (!r.date) return;
      prodMap.set(r.date, (prodMap.get(r.date) || 0) + (Number(r.qty) || 0));
    });
    const allDates = new Set([...bunghalMap.keys(), ...prodMap.keys()]);
    return [...allDates].sort()
      .map(date => {
        const bQty = bunghalMap.get(date) || 0;
        const pQty = prodMap.get(date) || 0;
        return { date, rate: pQty > 0 ? bQty / pQty * 100 : null, bunghalQty: bQty, prodQty: pQty };
      })
      .filter(d => d.prodQty > 0);
  }, [filtered, filteredProduction]);

  // 주별 추세 — 봉탈률(%), weekStart ~ weekEnd 범위
  const weeklyTrendData = useMemo(() => {
    if (!weekStart || !weekEnd) return [];
    const [ws, we] = weekStart <= weekEnd ? [weekStart, weekEnd] : [weekEnd, weekStart];

    let bRecs = bunghalRecords;
    if (typeFilter === 'quilting') bRecs = bRecs.filter(r => r.originProc === '퀼팅');
    else if (typeFilter === 'inter') bRecs = bRecs.filter(r => r.originProc === '인터');

    const bunghalByWeek = new Map();
    bRecs.filter(r => (r.cause||'').trim() === '봉탈').forEach(r => {
      if (!r.date) return;
      const w = getISOWeek(r.date);
      const wk = `${w.year}-W${pad2(w.week)}`;
      bunghalByWeek.set(wk, (bunghalByWeek.get(wk) || 0) + (Number(r.qty) || 0));
    });
    const prodByWeek = new Map();
    productionRecordsAll.forEach(r => {
      if (!r.date) return;
      const w = getISOWeek(r.date);
      const wk = `${w.year}-W${pad2(w.week)}`;
      prodByWeek.set(wk, (prodByWeek.get(wk) || 0) + (Number(r.qty) || 0));
    });

    return [...availableWeeks]
      .filter(([k]) => k >= ws && k <= we)
      .sort(([a], [b]) => a.localeCompare(b))
      .map(([k, fullLabel]) => {
        const bQty = bunghalByWeek.get(k) || 0;
        const pQty = prodByWeek.get(k)    || 0;
        const shortLabel = fullLabel.replace(/^\d{4}\s/, '').replace('주차', '주');
        return { week: k, label: shortLabel, fullLabel, rate: pQty > 0 ? bQty / pQty * 100 : null, bunghalQty: bQty, prodQty: pQty };
      });
  }, [bunghalRecords, productionRecordsAll, typeFilter, availableWeeks, weekStart, weekEnd]);

  // 원인 분포 (막대)
  const causeDist = useMemo(() => {
    const map = new Map();
    filtered.forEach(r => {
      const c = (r.cause || '').trim() || '미지정';
      map.set(c, (map.get(c) || 0) + (Number(r.qty) || 0));
    });
    return [...map.entries()].map(([name, qty]) => ({ name, qty })).sort((a, b) => b.qty - a.qty);
  }, [filtered]);

  // 원인공정 분포 (도넛)
  const originDist = useMemo(() => {
    const map = new Map();
    filtered.forEach(r => {
      const o = (r.originProc || '').trim() || '미지정';
      map.set(o, (map.get(o) || 0) + (Number(r.qty) || 0));
    });
    return [...map.entries()].map(([name, qty]) => ({ name, qty })).sort((a, b) => b.qty - a.qty);
  }, [filtered]);

  // 처리내역 분포 (도넛)
  // 처리내역 분포 — cause='봉탈' 레코드만 (종합 봉탈률과 동일 모집단)
  const actionDist = useMemo(() => {
    const map = new Map();
    filtered.filter(r => (r.cause || '').trim() === '봉탈').forEach(r => {
      const a = (r.action || '').trim() || '미지정';
      map.set(a, (map.get(a) || 0) + (Number(r.qty) || 0));
    });
    return [...map.entries()].map(([name, qty]) => ({ name, qty })).sort((a, b) => b.qty - a.qty);
  }, [filtered]);

  const totalProduction = filteredProduction.reduce((s, r) => s + (Number(r.qty) || 0), 0);
  const overallDefectRate = totalProduction > 0 ? (bunghalOnlyQty / totalProduction * 100) : null;

  // 품목별 불량률 (defect qty / production qty * 100)
  const defectRateByProduct = useMemo(() => {
    const prodMap = new Map();
    filteredProduction.forEach(r => {
      const n = (r.product || '').trim() || '미지정';
      const pos = (r.position || '').trim();
      const key = pos ? `${n}||${pos}` : n;
      const prev = prodMap.get(key) || { name: n, position: pos, qty: 0 };
      prodMap.set(key, { name: n, position: pos, qty: prev.qty + (Number(r.qty) || 0) });
    });
    const defectMap = new Map();
    filtered.forEach(r => {
      const n = (r.product || '').trim() || '미지정';
      const pos = (r.position || '').trim();
      const key = pos ? `${n}||${pos}` : n;
      defectMap.set(key, (defectMap.get(key) || 0) + (Number(r.qty) || 0));
    });
    // 생산량이 있는 품목만 (불량률 계산 가능)
    const result = [];
    prodMap.forEach(({ name, position, qty: production }, key) => {
      const defect = defectMap.get(key) || 0;
      const rate = production > 0 ? (defect / production * 100) : 0;
      result.push({ name, position, production, defect, rate });
    });
    return result.sort((a, b) => b.rate - a.rate);
  }, [filtered, filteredProduction]);

  // 작업자별 일 평균 생산량
  const workerStats = useMemo(() => {
    const map = new Map(); // owner → { totalQty, days: Set }
    filteredProduction.forEach(r => {
      const owner = (r.owner || '').trim() || '미지정';
      const qty   = Number(r.qty) || 0;
      if (!map.has(owner)) map.set(owner, { totalQty: 0, days: new Set() });
      const s = map.get(owner);
      s.totalQty += qty;
      if (r.date) s.days.add(r.date);
    });
    const result = [];
    map.forEach(({ totalQty, days }, owner) => {
      const dayCount = days.size || 1;
      result.push({ owner, totalQty, dayCount, avgPerDay: Math.round(totalQty / dayCount) });
    });
    return result.sort((a, b) => b.avgPerDay - a.avgPerDay);
  }, [filteredProduction]);

  // KPI 요약값
  const dayCount = crossTab.dateList.length;
  const dailyAvg = dayCount ? Math.round(totalQty / dayCount * 10) / 10 : 0;
  const topProduct = crossTab.productList[0];
  const topOrigin  = originDist[0];
  const topCause   = causeDist[0];

  // 라벨
  const periodLabel = (() => {
    if (period === 'day') {
      const tag = selectedDay === today ? ' · 오늘' : selectedDay === yesterday ? ' · 어제' : '';
      return `${selectedDay}${tag}`;
    }
    if (period === 'week') {
      if (!weekStart || !weekEnd) return '주 선택';
      const [ws, we] = weekStart <= weekEnd ? [weekStart, weekEnd] : [weekEnd, weekStart];
      const sLabel = availableWeeks.find(([k]) => k === ws)?.[1]?.replace(/^\d{4}\s/, '') || ws;
      const eLabel = availableWeeks.find(([k]) => k === we)?.[1]?.replace(/^\d{4}\s/, '') || we;
      return ws === we ? (availableWeeks.find(([k]) => k === ws)?.[1] || ws) : `${sLabel} ~ ${eLabel}`;
    }
    if (period === 'month') return availableMonths.find(([k]) => k === selectedMonth)?.[1] || selectedMonth;
    if (period === 'range') return effStart && effEnd ? `${effStart} ~ ${effEnd}` : '기간 선택';
    return '전체';
  })();

  // bunghalRecords 없어도 입력 영역은 보여줘야 함 — empty hint는 시각화 부분에서만 처리

  return (
    <Fragment>
      {/* 미등록 작업자 팝업 */}
      {ownerAlert && (
        <AlertModal
          title="작업자를 선택해주세요"
          message={
            ownerAlert.reason === 'recognition'
              ? '인식된 작업자명이 목록에 없습니다. 드롭다운에서 올바른 작업자를 선택한 후 저장해주세요.'
              : '등록된 작업자를 선택해야 저장할 수 있습니다.'
          }
          detail={ownerAlert.recognized ? `인식된 이름: "${ownerAlert.recognized}"` : null}
          onClose={() => setOwnerAlert(null)}
        />
      )}

      {/* 사진 확대 라이트박스 — Portal */}
      {photoZoomOpen && photoDataUrl && ReactDOM.createPortal(
        <div onClick={() => setPhotoZoomOpen(false)}
          className="fixed inset-0 bg-black/85 z-[10000] flex items-center justify-center p-6 animate-fade-in cursor-zoom-out"
          style={{ backdropFilter: 'blur(4px)' }}>
          <img src={photoDataUrl} alt="작업일지 확대"
            onClick={(e) => e.stopPropagation()}
            className="max-w-full max-h-full rounded-lg shadow-2xl cursor-default"
            style={{ objectFit: 'contain' }} />
          <button onClick={() => setPhotoZoomOpen(false)}
            className="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 text-white text-xl flex items-center justify-center backdrop-blur-md transition-colors">
            ×
          </button>
          <div className="absolute bottom-4 left-1/2 -translate-x-1/2 text-white/70 text-xs">
            배경 클릭 · ESC · × 버튼으로 닫기
          </div>
        </div>,
        document.body
      )}

      {/* 시각화 영역 — 분석 모드에서만 */}
      {isAnalysis && (<Fragment>
      {/* 헤더 + 토글 */}
      <Card>
        <div className="p-4 flex items-center justify-between flex-wrap gap-3">
          <div>
            <div className="text-sm font-bold text-slate-800">봉탈 집중 분석</div>
            <div className="text-[11px] text-slate-500 mt-0.5 num">{periodLabel}</div>
            <div className="text-[10px] text-slate-400 mt-0.5 num">{totalQty.toLocaleString('ko-KR')}건 발생 · 품목 {crossTab.productList.length}종 · record {totalRecords}건</div>
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            {/* 유형 토글 */}
            <div className="flex gap-1 bg-slate-100 p-1 rounded-lg">
              {[
                { v:'both',     l:'전체 봉탈' },
                { v:'quilting', l:'퀼팅' },
                { v:'inter',    l:'인터' },
              ].map(o => (
                <button key={o.v} onClick={() => setTypeFilter(o.v)}
                  className={`px-3 py-1.5 text-xs font-semibold rounded-md transition-colors
                    ${typeFilter === o.v ? 'bg-white text-violet-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                  {o.l}
                </button>
              ))}
            </div>
            {/* 기간 토글 */}
            <div className="flex gap-1 bg-slate-100 p-1 rounded-lg">
              {[
                { v:'day',   l:'일별' },
                { v:'week',  l:'주별' },
                { v:'month', l:'월별' },
                { v:'range', l:'기간' },
                { v:'all',   l:'전체' },
              ].map(o => (
                <button key={o.v} onClick={() => setPeriod(o.v)}
                  className={`px-3 py-1.5 text-xs font-semibold rounded-md transition-colors
                    ${period === o.v ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                  {o.l}
                </button>
              ))}
            </div>
            {period === 'day' && (
              <DateRangePicker mode="single"
                startDate={selectedDay}
                onChange={(d) => d && setSelectedDay(d)}
                max={today}
                accent="indigo" />
            )}
            {period === 'week' && availableWeeks.length > 0 && (
              <div className="flex items-center gap-2 flex-wrap">
                <select value={weekStart} onChange={e => setWeekStart(e.target.value)}
                  className="px-3 py-1.5 border border-slate-200 rounded-lg text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
                  {[...availableWeeks].reverse().map(([k, l]) => <option key={k} value={k}>{l}</option>)}
                </select>
                <span className="text-xs text-slate-400">~</span>
                <select value={weekEnd} onChange={e => setWeekEnd(e.target.value)}
                  className="px-3 py-1.5 border border-slate-200 rounded-lg text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
                  {[...availableWeeks].reverse().map(([k, l]) => <option key={k} value={k}>{l}</option>)}
                </select>
                <span className="text-[11px] text-slate-400">{weeklyTrendData.length}주</span>
              </div>
            )}
            {period === 'month' && availableMonths.length > 0 && (
              <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}
                className="px-3 py-1.5 border border-slate-200 rounded-lg text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
                {availableMonths.map(([k, l]) => <option key={k} value={k}>{l}</option>)}
              </select>
            )}
            {period === 'range' && (
              <DateRangePicker
                startDate={startDate} endDate={endDate}
                onChange={(s, e) => { setStartDate(s); setEndDate(e); }}
                min={dataRange.min} max={dataRange.max} />
            )}
          </div>
        </div>
      </Card>
      </Fragment>)}

      {/* 작업일지 입력 영역 — 기록 모드만 */}
      {isRecord && (<Fragment>
      <Card>
        <div className="w-full px-5 py-3 flex items-center gap-3 flex-wrap">
          <button onClick={() => setInputOpen(o => !o)}
            className="flex items-center gap-2 hover:bg-slate-50 transition-colors px-2 py-1.5 rounded -ml-2">

      {/* 등록된 작업일지 이력 */}

        <Card>

            right={
              <button onClick={() => {
                const rows = [
                  ['일자', '작업자', '생산량', '불량 수량', '작업시간(분)'],
                  ...[...bunghalLog].sort((a,b) => (a.date||'') < (b.date||'') ? 1 : -1).map(e => [
                    e.date || '',
                    e.owner || '',
                    (e.productionRecords||[]).reduce((s,r) => s+(Number(r.qty)||0), 0),
                    (e.records||[]).reduce((s,r) => s+(Number(r.qty)||0), 0),
                    [...new Set((e.productionRecords||[]).map(r=>r.time).filter(Boolean))].reduce((s,t)=>s+parseTimeRangeMinutes(t),0),
                  ])
                ];
                const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
                const blob = new Blob(['﻿'+csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href=url; a.download=`봉탈기록_${todayYMD()}.csv`; a.click();

              }}
                className="px-3 py-1.5 text-xs font-semibold rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 flex items-center gap-1.5">
                <Icon name="upload" size={13} className="rotate-180" />CSV 다운로드
              </button>
            } />
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead>
                <tr className="bg-slate-50 text-slate-500">
                  <th className="px-3 py-2 text-center font-semibold">일자</th>
                  <th className="px-3 py-2 text-center font-semibold">요일</th>
                  <th className="px-3 py-2 text-center font-semibold">작업자</th>
                  <th className="px-3 py-2 text-center font-semibold">생산량</th>
                  <th className="px-3 py-2 text-center font-semibold">불량 수량</th>
                  <th className="px-3 py-2 text-center font-semibold">작업시간</th>
                  <th className="px-3 py-2 text-center font-semibold">최종 저장</th>
                  <th className="px-3 py-2 text-center font-semibold w-[120px]">동작</th>
                </tr>
              </thead>
              <tbody className="num">
                {[...bunghalLog].sort((a, b) => {
                  // 일자 내림차순, 같으면 updatedAt 내림차순
                  if ((a.date || '') !== (b.date || '')) return (a.date || '') < (b.date || '') ? 1 : -1;
                  return (a.updatedAt || '') < (b.updatedAt || '') ? 1 : -1;
                }).slice(0, 30).map(e => {
                  const dow = e.date ? ['일','월','화','수','목','금','토'][parseYMD(e.date).getDay()] : '';

                  const defectQty  = (e.records || []).reduce((s, r) => s + (Number(r.qty) || 0), 0);
                  const workMinutes = [...new Set((e.productionRecords||[]).map(r=>r.time).filter(Boolean))].reduce((s,t)=>s+parseTimeRangeMinutes(t),0);

      ) : (
        <Fragment>
          {/* KPI 요약 카드 5장 */}
          <div className="grid grid-cols-2 lg:grid-cols-5 gap-4">
            <BunghalKpiCard label="총 발생 건수" value={totalQty} suffix="건"
              sub={`record ${totalRecords}건 · ${dayCount}일`}

            <BunghalKpiCard label="종합 봉탈률"
              value={overallDefectRate !== null ? overallDefectRate.toFixed(2) : '—'} suffix="%"

              {period === 'week' ? (

                  <CardHeader title="주별 봉탈률 추세" sub={`${weeklyTrendData.length}주 · 봉탈률`} />

              ) : (
                <Fragment>
                  <CardHeader title="일별 봉탈률 추세" sub={periodLabel} />

                </Fragment>
              )}

                  palette={['#10B981', '#F43F5E', '#94A3B8']} />

                      <div className="w-px bg-slate-100" />
                      <div>
                        <div className="text-xl font-bold text-rose-500 num">{dPct}%</div>
                        <div className="text-xs text-slate-500 mt-0.5">폐기율 <span className="text-slate-400">({discard.toLocaleString('ko-KR')}건)</span></div>

            <Card delay={360}>
              <CardHeader title="원인공정 분포" sub={`${totalQty.toLocaleString('ko-KR')}건 · 발생 기준`} />
              <div className="p-5">
                <BunghalDonutChart items={originDist}
                  palette={['#8B5CF6', '#EC4899', '#F59E0B', '#10B981']} />
              </div>
            </Card>

          {/* 원인 Top 5 + 품목 불량률 Top 5 + 작업자별 일 평균 생산량 */}
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
            <Card delay={420}>
              <CardHeader title={`원인 Top ${showMoreCause ? '10' : '5'}`} sub="가장 빈번한 원인" />
              <div className="p-5 space-y-2.5">
                {causeDist.slice(0, showMoreCause ? 10 : 5).map((c, i) => {
                  const maxQty = causeDist[0]?.qty || 1;
                  const pct = (c.qty / maxQty) * 100;
                  const colors = ['from-rose-400 to-rose-600', 'from-orange-400 to-orange-600', 'from-amber-400 to-amber-600', 'from-fuchsia-400 to-fuchsia-600', 'from-violet-400 to-violet-600'];
                  return (
                    <div key={c.name}>
                      <div className="flex items-baseline justify-between text-xs mb-1.5">
                        <span className="text-slate-700 font-medium truncate" title={c.name}>
                          <span className="text-slate-400 num mr-1.5">{i+1}.</span>{c.name}

                        <span className="num font-bold text-slate-800">{c.qty}건</span>
                      </div>
                      <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div className={`h-full bg-gradient-to-r ${colors[i % colors.length]} rounded-full transition-all`}
                             style={{ width: `${pct}%` }}></div>
                      </div>
                    </div>

                  <div className="text-xs text-slate-400 text-center py-6">데이터 없음</div>
                )}
                {causeDist.length > 5 && (
                  <button onClick={() => setShowMoreCause(v => !v)}

                )}

            </Card>

            <Card delay={480}>
              <CardHeader title={`품목 불량률 Top ${showMoreDefect ? '10' : '5'}`} sub="생산 대비 봉탈 % · 상대 위험" />
              <div className="p-5 space-y-2.5">
                {defectRateByProduct.slice(0, showMoreDefect ? 10 : 5).map((p, i) => {
                  const maxRate = defectRateByProduct[0]?.rate || 1;
                  const pct = (p.rate / maxRate) * 100;
                  const rateColor = p.rate >= 10 ? 'text-rose-700' : p.rate >= 5 ? 'text-amber-700' : p.rate >= 2 ? 'text-violet-700' : 'text-emerald-700';
                  const barColor = p.rate >= 10 ? 'from-rose-400 to-rose-600' : p.rate >= 5 ? 'from-amber-400 to-orange-500' : p.rate >= 2 ? 'from-violet-400 to-violet-600' : 'from-emerald-400 to-teal-500';
                  const rankColor = i === 0 ? 'text-rose-600 bg-rose-50' : i === 1 ? 'text-amber-600 bg-amber-50' : i === 2 ? 'text-violet-600 bg-violet-50' : 'text-slate-400 bg-slate-50';
                  const posBadge = p.position === '하' ? 'text-amber-700 bg-amber-50' : p.position ? 'text-sky-700 bg-sky-50' : null;
                  return (
                    <div key={`${p.name}||${p.position}`}>
                      <div className="flex items-baseline justify-between text-xs mb-1.5">
                        <span className="text-slate-700 font-medium truncate flex items-baseline gap-1.5" title={p.name}>
                          <span className={`text-[10px] num font-bold px-1.5 py-0.5 rounded ${rankColor}`}>{i+1}</span>
                          {p.name}
                          {posBadge && <span className={`text-[10px] font-bold px-1 py-0.5 rounded ${posBadge}`}>{p.position}</span>}
                        </span>
                        <span className="num shrink-0 text-right">
                          <span className={`font-bold ${rateColor}`}>{p.rate.toFixed(2)}%</span>
                          <span className="text-[10px] text-slate-400 ml-1 block">{p.defect}/{p.production}</span>

                      </div>
                      <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div className={`h-full bg-gradient-to-r ${barColor} rounded-full transition-all`}
                             style={{ width: `${pct}%` }}></div>
                      </div>
                    </div>
                  );
                })}
                {!defectRateByProduct.length && (
                  <div className="text-xs text-slate-400 text-center py-6">
                    생산량 데이터가 없습니다
                    <div className="text-[10px] mt-1">봉탈 기록에 생산 표 입력 후 다시 확인</div>
                  </div>
                )}
                {defectRateByProduct.length > 5 && (
                  <button onClick={() => setShowMoreDefect(v => !v)}
                    className="w-full mt-1 py-1.5 text-[11px] font-semibold text-slate-400 hover:text-slate-600 hover:bg-slate-50 rounded-lg transition-colors">
                    {showMoreDefect ? '접기 ▲' : `더보기 +${Math.min(defectRateByProduct.length - 5, 5)} ▼`}
                  </button>
                )}
              </div>
            </Card>

            <Card delay={540}>
              <CardHeader title="작업자별 일 평균 생산량" sub={`${periodLabel} · 생산 표 기준`} />
              <div className="p-5 space-y-4">
                {workerStats.length ? workerStats.slice(0, showMoreWorker ? 10 : 5).map((w, i) => {
                  const maxAvg = workerStats[0]?.avgPerDay || 1;
                  const pct = (w.avgPerDay / maxAvg) * 100;
                  const colors = [
                    { bar: 'from-violet-400 to-indigo-500', badge: 'bg-violet-50 text-violet-700' },
                    { bar: 'from-emerald-400 to-teal-500',  badge: 'bg-emerald-50 text-emerald-700' },
                    { bar: 'from-amber-400 to-orange-500',  badge: 'bg-amber-50 text-amber-700' },
                    { bar: 'from-rose-400 to-pink-500',     badge: 'bg-rose-50 text-rose-700' },
                  ];
                  const c = colors[i % colors.length];
                  return (
                    <div key={w.owner}>
                      <div className="flex items-baseline justify-between mb-1.5">
                        <span className={`text-[11px] font-bold px-2 py-0.5 rounded-md num ${c.badge}`}>{w.owner}</span>
                        <span className="num text-right">
                          <span className="text-sm font-extrabold text-slate-800">{w.avgPerDay.toLocaleString('ko-KR')}</span>
                          <span className="text-[11px] text-slate-400 ml-0.5">개/일</span>
                        </span>
                      </div>
                      <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
                        <div className={`h-full bg-gradient-to-r ${c.bar} rounded-full transition-all`}
                             style={{ width: `${pct}%` }}></div>
                      </div>
                      <div className="flex justify-between mt-1">
                        <span className="text-[10px] text-slate-400 num">총 {w.totalQty.toLocaleString('ko-KR')}개</span>
                        <span className="text-[10px] text-slate-400 num">{w.dayCount}일 근무</span>
                      </div>
                    </div>
                  );
                }) : (
                  <div className="text-xs text-slate-400 text-center py-6">
                    생산량 데이터가 없습니다
                    <div className="text-[10px] mt-1">봉탈 기록에 생산 표 입력 후 다시 확인</div>
                  </div>
                )}
                {workerStats.length > 5 && (
                  <button onClick={() => setShowMoreWorker(v => !v)}
                    className="w-full mt-1 py-1.5 text-[11px] font-semibold text-slate-400 hover:text-slate-600 hover:bg-slate-50 rounded-lg transition-colors">
                    {showMoreWorker ? '접기 ▲' : `더보기 +${Math.min(workerStats.length - 5, 5)} ▼`}
                  </button>
                )}
              </div>
            </Card>
          </div>
        </Fragment>
      ))}
    </Fragment>
  );
}

/* ============================================================
   22-C) PRODUCTION HISTORY TAB — 작성 이력 + 휴지통 + 되돌리기
   ============================================================ */
function ProductionHistoryTab({ data, onSave, onSaveTrash }) {
  const toast = useToast();
  const dialog = useConfirm();
  const reports = useMemo(() => refreshFlatKpis(data.production || []), [data.production]);
  const trash   = data.productionTrash || [];

  const sorted = useMemo(() => {
    return [...reports].sort((a, b) => (a.date || '') < (b.date || '') ? 1 : -1);
  }, [reports]);

  const dates = useMemo(() => reports.map(r => r.date).filter(Boolean).sort(), [reports]);
  const firstDate = dates[0];
  const lastDate  = dates[dates.length - 1];

  const deleteEntry = (id) => {
    const target = reports.find(r => r.id === id);
    if (!target) return;
    const next = reports.filter(r => r.id !== id);
    const newTrash = [...trash, { ...target, deletedAt: new Date().toISOString() }];
    onSave(next);
    onSaveTrash(newTrash);
    toast(`${target.date || ''} 기록 삭제됨`, 'info', {
      action: { label: '되돌리기', onClick: () => restoreOne(target.id) },
      duration: 7000,
    });
  };

  const restoreOne = (id) => {
    const t = (data.productionTrash || []).find(x => x.id === id);
    if (!t) { toast('복원할 항목을 찾을 수 없습니다', 'warn'); return; }
    const { deletedAt, ...orig } = t;
    onSave([...(data.production || []).filter(r => r.id !== id), orig]);
    onSaveTrash((data.productionTrash || []).filter(x => x.id !== id));
    toast(`${orig.date || ''} 복원 완료`, 'success');
  };

  const permaDeleteOne = async (id) => {
    if (!await dialog('이 항목을 영구 삭제할까요?\n이 작업은 되돌릴 수 없습니다.')) return;
    onSaveTrash(trash.filter(t => t.id !== id));
    toast('영구 삭제 완료', 'info');
  };

  const emptyTrash = async () => {
    if (!await dialog(`휴지통의 ${trash.length}건을 모두 영구 삭제할까요?`)) return;
    onSaveTrash([]);
    toast('휴지통을 비웠습니다', 'info');
  };

  if (!reports.length && !trash.length) {
    return <EmptyHint iconName="pencil" msg="작성된 일간 입력이 없습니다." />;
  }

  const dayCount = firstDate && lastDate ? Math.round((parseYMD(lastDate)-parseYMD(firstDate))/86400000) + 1 : 0;

  return (
    <Fragment>
      {/* 요약 */}
      <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
        <HistoryStat label="저장된 일자" value={reports.length} unit="건" color="sky" />
        <HistoryStat label="데이터 범위" textValue={firstDate && lastDate ? (firstDate === lastDate ? firstDate : `${firstDate} ~ ${lastDate}`) : '—'}
          sub={dayCount ? `${dayCount}일` : ''}
          color="indigo" />
        <HistoryStat label="휴지통" value={trash.length} unit="건" color="rose" />
      </div>

      {/* 작성 이력 표 — 최근 30건 */}
      <Card>
        <CardHeader title="작성 이력" sub={reports.length > 30 ? `최근 순 · 30건 표시 (총 ${reports.length}건)` : `최근 순 · 총 ${reports.length}건`} />
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead>
              <tr className="bg-slate-50 text-slate-500">
                <th className="px-3 py-2 text-left font-semibold whitespace-nowrap">일자</th>
                <th className="px-3 py-2 text-left font-semibold whitespace-nowrap">요일</th>
                <th className="px-3 py-2 text-left font-semibold">담당자</th>
                {KPI_DEFS.map(k => (
                  <th key={k.key} className="px-3 py-2 text-center font-semibold whitespace-nowrap">{k.short}</th>
                ))}
                <th className="px-3 py-2 text-left font-semibold">최종 저장</th>
                <th className="px-3 py-2 text-center font-semibold w-[80px]">동작</th>
              </tr>
            </thead>
            <tbody className="num">
              {sorted.length === 0 && (
                <tr><td colSpan={5 + KPI_DEFS.length} className="px-3 py-8 text-center text-slate-400">기록이 없습니다.</td></tr>
              )}
              {sorted.slice(0, 30).map(r => {
                const dow = r.date ? ['일','월','화','수','목','금','토'][parseYMD(r.date).getDay()] : '';
                return (
                  <tr key={r.id} className="border-t border-slate-100 hover:bg-slate-50/60">
                    <td className="px-3 py-2 text-slate-700 font-semibold whitespace-nowrap">{r.date || '—'}</td>
                    <td className="px-3 py-2 text-slate-500 whitespace-nowrap">{dow ? `${dow}요일` : '—'}</td>
                    <td className="px-3 py-2 text-slate-700">{r.owner || '—'}</td>
                    {KPI_DEFS.map(k => {
                      const v = r[k.key];
                      const has = v !== null && v !== undefined && v !== '';
                      return (
                        <td key={k.key} className="px-3 py-2 text-center text-slate-700">
                          {has ? fmtNumber(v, k.decimals) : <span className="text-slate-300">—</span>}
                        </td>
                      );
                    })}
                    <td className="px-3 py-2 text-slate-400 text-[10px]">
                      <div>{fmtDateTime(r.updatedAt || r.createdAt)}</div>
                      <div>{relTime(r.updatedAt || r.createdAt)}</div>
                    </td>
                    <td className="px-3 py-2 text-center">
                      <button onClick={() => deleteEntry(r.id)}
                        className="px-2 py-1 text-[11px] font-semibold rounded text-rose-600 hover:bg-rose-50">삭제</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>

      {/* 휴지통 */}
      <Card>
        <CardHeader title={`휴지통 · ${trash.length}건`}
          sub={trash.length
            ? `복원하면 작성 이력으로 되돌아갑니다 · 삭제 후 ${TRASH_RETENTION_DAYS}일 경과 시 자동 영구 삭제`
            : `삭제된 항목이 ${TRASH_RETENTION_DAYS}일간 보관됩니다`}
          right={trash.length > 0 && (
            <button onClick={emptyTrash} className="px-3 py-1.5 text-xs font-semibold rounded-lg border border-rose-200 text-rose-600 hover:bg-rose-50">
              전체 비우기
            </button>
          )} />
        {trash.length === 0 ? (
          <div className="px-5 py-8 text-center text-slate-400 text-xs">휴지통이 비어 있습니다.</div>
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead>
                <tr className="bg-slate-50 text-slate-500">
                  <th className="px-3 py-2 text-left font-semibold">일자</th>
                  <th className="px-3 py-2 text-left font-semibold">담당자</th>
                  <th className="px-3 py-2 text-left font-semibold">삭제 시각</th>
                  <th className="px-3 py-2 text-center font-semibold">자동삭제까지</th>
                  <th className="px-3 py-2 text-center font-semibold w-[160px]">동작</th>
                </tr>
              </thead>
              <tbody className="num">
                {[...trash].sort((a,b) => (b.deletedAt || '') < (a.deletedAt || '') ? -1 : 1).map(t => {
                  const label = t.date || '—';
                  const purgeAt = t.deletedAt ? new Date(t.deletedAt).getTime() + TRASH_RETENTION_MS : null;
                  const remainMs = purgeAt ? purgeAt - Date.now() : null;
                  const remainHours = remainMs !== null ? Math.max(0, remainMs / 3600000) : null;
                  const ddayLabel = remainHours === null ? '—'
                    : remainHours <= 0 ? '곧 삭제'
                    : remainHours < 24 ? `${Math.ceil(remainHours)}시간 후`
                    : `${Math.ceil(remainHours/24)}일 후`;
                  const ddayCls = remainHours === null ? 'text-slate-400'
                    : remainHours < 24 ? 'text-rose-600 font-semibold'
                    : remainHours < 72 ? 'text-amber-600 font-semibold'
                    : 'text-slate-500';
                  return (
                    <tr key={t.id} className="border-t border-slate-100 hover:bg-slate-50/60">
                      <td className="px-3 py-2 text-slate-700 font-semibold">{label}</td>
                      <td className="px-3 py-2 text-slate-500">{t.owner || '—'}</td>
                      <td className="px-3 py-2 text-slate-500 text-[10px]">
                        <div>{fmtDateTime(t.deletedAt)}</div>
                        <div className="text-slate-400">{relTime(t.deletedAt)}</div>
                      </td>
                      <td className={`px-3 py-2 text-center text-[11px] ${ddayCls}`}>{ddayLabel}</td>
                      <td className="px-3 py-2 text-center space-x-1">
                        <button onClick={() => restoreOne(t.id)}
                          className="px-2 py-1 text-[11px] font-semibold rounded border border-emerald-200 text-emerald-700 hover:bg-emerald-50">복원</button>
                        <button onClick={() => permaDeleteOne(t.id)}
                          className="px-2 py-1 text-[11px] font-semibold rounded border border-rose-200 text-rose-600 hover:bg-rose-50">영구삭제</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </Card>
    </Fragment>
  );
}

/* ============================================================
   23-B) ERP REPORT TAB — 부적합 양식 업로드 + 리포트
   ============================================================ */
function UploadDropZone({ onFile, loading, accent = 'rose', hint }) {
  const inputRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const handleDrop = (e) => {
    e.preventDefault(); setDragging(false);
    const f = e.dataTransfer.files?.[0];
    if (f) onFile(f);
  };
  const accentMap = {
    rose:   { border: dragging ? 'border-rose-400 bg-rose-50' : 'border-slate-300 bg-slate-50/50 hover:bg-slate-50', iconBg: 'bg-rose-50 text-rose-600 border-rose-200' },
    indigo: { border: dragging ? 'border-indigo-400 bg-indigo-50' : 'border-slate-300 bg-slate-50/50 hover:bg-slate-50', iconBg: 'bg-indigo-50 text-indigo-600 border-indigo-200' },
  };
  const cs = accentMap[accent] || accentMap.rose;
  return (
    <div
      onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
      onDragLeave={() => setDragging(false)}
      onDrop={handleDrop}
      onClick={() => inputRef.current?.click()}
      className={`rounded-2xl border-2 border-dashed px-6 py-10 text-center cursor-pointer transition-colors ${cs.border}`}>
      <input ref={inputRef} type="file" accept=".xls,.xlsx" className="hidden"
        onChange={(e) => { const f = e.target.files?.[0]; if (f) onFile(f); e.target.value = ''; }} />
      <div className={`w-12 h-12 mx-auto mb-3 rounded-2xl grid place-items-center border ${cs.iconBg}`}>
        <Icon name="upload" size={22} />
      </div>
      <div className="text-sm font-semibold text-slate-700">
        {loading ? '파싱 중…' : '엑셀 파일을 끌어다 놓거나 클릭하여 선택'}
      </div>
      <div className="text-xs text-slate-500 mt-1">{hint || '.xls / .xlsx · 자동 인식'}</div>
    </div>
  );
}

function ErpReportTab({ data, onSaveErp }) {
  const toast = useToast();
  const reports = data.erpReports || [];
  const [loading, setLoading] = useState(false);
  const fileRef = useRef(null);

  // 기간 필터
  const [period, setPeriod] = useState('day');
  const [selectedWeek, setSelectedWeek] = useState('');
  const [selectedMonth, setSelectedMonth] = useState('');
  const [startDate, setStartDate] = useState('');
  const [endDate, setEndDate] = useState('');

  const { availableWeeks, availableMonths, dataRange } = useMemo(() => {
    const days = new Set();
    const weeks = new Map();
    const months = new Map();
    reports.forEach(r => {
      if (!r.reportDate) return;
      days.add(r.reportDate);
      const w = getISOWeek(r.reportDate);
      const wk = `${w.year}-W${pad2(w.week)}`;
      if (!weeks.has(wk)) {
        const ml = isoWeekToMonthLabel(w.year, w.week);
        weeks.set(wk, `${ml.year} ${ml.month}월 ${ml.weekOfMonth}주차`);
      }
      const ym = r.reportDate.slice(0, 7);
      if (!months.has(ym)) months.set(ym, `${ym.slice(0,4)}년 ${Number(ym.slice(5,7))}월`);
    });
    const ds = [...days].sort();
    return {
      availableWeeks:  [...weeks.entries()].sort((a,b) => a[0] < b[0] ? -1 : 1),
      availableMonths: [...months.entries()].sort((a,b) => a[0] < b[0] ? -1 : 1),
      dataRange: { min: ds[0] || '', max: ds[ds.length - 1] || '' },
    };
  }, [reports]);

  useEffect(() => {
    if (!selectedWeek && availableWeeks.length) setSelectedWeek(availableWeeks[availableWeeks.length - 1][0]);
    if (!selectedMonth && availableMonths.length) setSelectedMonth(availableMonths[availableMonths.length - 1][0]);
    if (!startDate && dataRange.min) setStartDate(dataRange.min);
    if (!endDate   && dataRange.max) setEndDate(dataRange.max);
  }, [availableWeeks, availableMonths, dataRange.min, dataRange.max]);

  const [effStart, effEnd] = (startDate && endDate && startDate > endDate) ? [endDate, startDate] : [startDate, endDate];
  const yesterday = ymdShift(todayYMD(), -1);

  // 처리결정 정보 누락 날짜 감지 (이전 버전으로 업로드된 데이터 → decision 전부 빈값)
  const damagedDates = useMemo(() =>
    reports
      .filter(r => {
        const recs = r.records || [];
        return recs.length > 0 && recs.every(rec => !rec.decision);
      })
      .map(r => r.reportDate)
      .sort()
  , [reports]);

  // 기간에 해당하는 entry들
  const filtered = useMemo(() => {
    if (period === 'all') return reports;
    return reports.filter(r => {
      if (!r.reportDate) return false;
      if (period === 'day')   return r.reportDate === yesterday;
      if (period === 'week') {
        const w = getISOWeek(r.reportDate);
        return `${w.year}-W${pad2(w.week)}` === selectedWeek;
      }
      if (period === 'month') return r.reportDate.slice(0, 7) === selectedMonth;
      if (period === 'range') {
        if (effStart && r.reportDate < effStart) return false;
        if (effEnd   && r.reportDate > effEnd)   return false;
        return true;
      }
      return true;
    });
  }, [reports, period, yesterday, selectedWeek, selectedMonth, effStart, effEnd]);

  // 기간 entry들을 한 양식으로 합산
  const aggregated = useMemo(() => {
    if (!filtered.length) return null;
    const allRecords = filtered.flatMap(r => r.records || []);
    const processIncidents = { '2F': 0, '4F': 0, 'OUT': 0 };
    const inputQty   = { '2F': null, '4F': null, 'OUT': null };
    const notesArr   = { '2F': [], '4F': [], 'OUT': [] };
    filtered.forEach(r => {
      ['2F','4F','OUT'].forEach(k => {
        processIncidents[k] += Number(r.processIncidents?.[k]) || 0;
        const inp = r.inputQty?.[k];
        if (inp !== null && inp !== undefined && !isNaN(inp)) {
          inputQty[k] = (inputQty[k] || 0) + Number(inp);
        }
        if (r.notes?.[k]) notesArr[k].push(r.notes[k]);
      });
    });
    return {
      records: allRecords,
      processIncidents,
      inputQty,
      notes: Object.fromEntries(['2F','4F','OUT'].map(k => [k, notesArr[k].filter(Boolean).join(' / ')])),
    };
  }, [filtered]);

  const report = useMemo(() => aggregated ? buildErpReport(aggregated.records) : null, [aggregated]);

  const periodMetaLabel = (() => {
    if (period === 'day')   return yesterday;
    if (period === 'week')  return availableWeeks.find(([k]) => k === selectedWeek)?.[1] || '—';
    if (period === 'month') return availableMonths.find(([k]) => k === selectedMonth)?.[1] || '—';
    if (period === 'range') return effStart && effEnd ? `${effStart} ~ ${effEnd}` : '—';
    return `전체 기간 (${reports.length}건)`;
  })();

  const periodMetaSub = (() => {
    const fmtMD = (ymd) => `${Number(ymd.slice(5,7))}/${Number(ymd.slice(8,10))}`;
    if (period === 'week' && selectedWeek) {
      const [yStr, wStr] = selectedWeek.split('-W');
      const y = Number(yStr), w = Number(wStr);
      const monday = isoWeekToMonday(y, w);
      const sunday = new Date(monday); sunday.setUTCDate(sunday.getUTCDate() + 6);
      const s = `${monday.getUTCFullYear()}-${pad2(monday.getUTCMonth()+1)}-${pad2(monday.getUTCDate())}`;
      const e = `${sunday.getUTCFullYear()}-${pad2(sunday.getUTCMonth()+1)}-${pad2(sunday.getUTCDate())}`;
      return `${fmtMD(s)} ~ ${fmtMD(e)}`;
    }
    if (period === 'month' && selectedMonth) {
      const [y, m] = selectedMonth.split('-').map(Number);
      const last = new Date(Date.UTC(y, m, 0)).getUTCDate();
      return `${m}/1 ~ ${m}/${last}`;
    }
    if (period === 'range' && effStart && effEnd) {
      const days = Math.round((parseYMD(effEnd) - parseYMD(effStart)) / 86400000) + 1;
      return effStart === effEnd ? '1일' : `총 ${days}일`;
    }
    if (period === 'all' && dataRange.min && dataRange.max) {
      return `데이터 ${fmtMD(dataRange.min)} ~ ${fmtMD(dataRange.max)}`;
    }
    return '';
  })();

  // ERP 업로드 핸들러
  const handleFile = async (file) => {
    if (!file) return;
    setLoading(true);
    try {
      const records = await parseErpFile(file);
      if (!records.length) { toast('인식된 데이터 행이 없습니다 (품목명에 "커버"/"Cover" 없는 행은 제외됩니다)', 'warn'); return; }
      const groups = new Map();
      records.forEach(r => {
        const d = r.date || todayYMD();
        if (!groups.has(d)) groups.set(d, []);
        groups.get(d).push(r);
      });
      const dates = [...groups.keys()].sort();
      const now = new Date().toISOString();
      const newEntries = dates.map(date => ({
        id: crypto.randomUUID(),
        reportDate: date,
        filename: file.name,
        source: 'erp',
        createdAt: now,
        updatedAt: now,
        processIncidents: { '2F': 0, '4F': 0, 'OUT': 0 },
        inputQty:         { '2F': null, '4F': null, 'OUT': null },
        records: groups.get(date).map((r, i) => ({ ...r, _id: crypto.randomUUID(), no: r.no || (i+1) })),
      }));
      // 같은 발생일 데이터는 새 파일로 통째로 대체 (파일명 무관)
      const newDates = new Set(newEntries.map(e => e.reportDate));
      const filtered = reports.filter(r => !newDates.has(r.reportDate));
      onSaveErp([...filtered, ...newEntries]);
      if (dates.length === 1) toast(`${dates[0]} · ${records.length}건 저장 완료`, 'success');
      else                    toast(`${dates.length}개 일자 자동 분리 · 총 ${records.length}건 저장 완료`, 'success');
    } catch (e) {
      toast('파싱 실패: ' + e.message, 'error');
    } finally { setLoading(false); }
  };

  // 데이터 자체가 없을 때 — 업로드 안내
  if (!reports.length) {
    return (
      <Card>
        <div className="p-6">
          <UploadDropZone onFile={handleFile} loading={loading} accent="rose"
            hint="grd_list 양식 (.xls/.xlsx) — 헤더 자동 인식" />
        </div>
      </Card>
    );
  }

  return (
    <Fragment>
      {/* 기간 토글 + ERP 새 업로드 */}
      <Card>
        <div className="p-4 flex items-center justify-between gap-3 flex-wrap">
          <div>
            <div className="text-sm font-bold text-slate-800">부적합 리포트</div>
            <div className="text-[11px] text-slate-500 mt-0.5 num">{periodMetaLabel}</div>
            {periodMetaSub && <div className="text-[10px] text-slate-400 mt-0.5 num">{periodMetaSub}</div>}
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            <div className="flex gap-1 bg-slate-100 p-1 rounded-lg">
              {[
                { v:'day',   l:'어제' },
                { v:'week',  l:'주별' },
                { v:'month', l:'월별' },
                { v:'range', l:'기간' },
                { v:'all',   l:'전체' },
              ].map(o => (
                <button key={o.v} onClick={() => setPeriod(o.v)}
                  className={`px-3 py-1.5 text-xs font-semibold rounded-md transition-colors
                    ${period === o.v ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                  {o.l}
                </button>
              ))}
            </div>
            {period === 'week' && (
              <select value={selectedWeek} onChange={e => setSelectedWeek(e.target.value)}
                className="px-3 py-1.5 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-rose-300">
                {availableWeeks.map(([k, l]) => <option key={k} value={k}>{l}</option>)}
              </select>
            )}
            {period === 'month' && (
              <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}
                className="px-3 py-1.5 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-rose-300">
                {availableMonths.map(([k, l]) => <option key={k} value={k}>{l}</option>)}
              </select>
            )}
            {period === 'range' && (
              <DateRangePicker
                startDate={startDate} endDate={endDate}
                onChange={(s, e) => { setStartDate(s); setEndDate(e); }}
                min={dataRange.min} max={dataRange.max} />
            )}
            <div className="h-6 w-px bg-slate-200 mx-1"></div>
            <input ref={fileRef} type="file" accept=".xls,.xlsx" className="hidden"
              onChange={(e) => { const f = e.target.files?.[0]; if (f) handleFile(f); e.target.value=''; }} />
            <button onClick={() => fileRef.current?.click()}
              className="px-3 py-2 rounded-lg bg-gradient-to-r from-rose-500 to-pink-500 text-white hover:from-rose-600 hover:to-pink-600 text-xs font-semibold flex items-center gap-1.5 shadow shadow-rose-500/20">
              <Icon name="upload" size={14} /> ERP 새 업로드
            </button>
          </div>
        </div>
      </Card>

      {/* 처리구분 정보 누락 경고 */}
      {damagedDates.length > 0 && (
        <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 flex items-start gap-3">
          <svg className="w-4 h-4 text-amber-500 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
          </svg>
          <div className="flex-1 min-w-0">
            <div className="text-sm font-semibold text-amber-800">폐기·수리 분류 오류 — {damagedDates.length}개 날짜 재업로드 필요</div>
            <div className="text-xs text-amber-700 mt-0.5">
              아래 날짜는 이전 버전으로 업로드되어 폐기가 전부 수리로 표시됩니다. 원본 파일을 다시 업로드하면 자동 수정됩니다.
            </div>
            <div className="mt-1.5 flex flex-wrap gap-1">
              {damagedDates.map(d => (
                <span key={d} className="px-2 py-0.5 bg-amber-100 text-amber-800 rounded text-[11px] font-mono font-semibold border border-amber-200">
                  {d}
                </span>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* 양식 — 단일 일자 보기일 때 인라인 편집, 합산(여러 일자)이면 보기 전용 */}
      {!report
        ? <EmptyHint iconName="upload" msg={`${periodMetaLabel}에 해당하는 리포트가 없습니다.`} />
        : <ErpReportView report={report} meta={{ reportDate: periodMetaLabel }} draft={aggregated}
            records={aggregated?.records || []}
            onUpdateField={filtered.length === 1 ? (field, key, val) => {
              const entry = filtered[0];
              const next = {
                ...entry,
                [field]: { ...(entry[field] || {}), [key]: val },
                updatedAt: new Date().toISOString(),
              };
              onSaveErp(reports.map(r => r.id === entry.id ? next : r));
            } : null} />}
    </Fragment>
  );
}

function ErpReportView({ report, meta, draft, onUpdateField, records = [] }) {
  const [drillDown, setDrillDown] = React.useState(null);
  // drillDown = null | { floor: '2F'|'4F'|'OUT'|null, dispositionType: '폐기'|'수리'|null, label: string }

  const handleCellClick = (floor, dispositionType, label) => {
    const key = `${floor}:${dispositionType}`;
    setDrillDown(prev => (prev && `${prev.floor}:${prev.dispositionType}` === key) ? null : { floor, dispositionType, label });
  };

  const drillRecords = drillDown ? records.filter(r => {
    if (drillDown.floor && classifyErpFloor(r.originProc) !== drillDown.floor) return false;
    if (drillDown.dispositionType && getDispositionType(r) !== drillDown.dispositionType) return false;
    return true;
  }) : [];

  const grandTotal = {
    qty:           report.byFloor['2F'].qty + report.byFloor['4F'].qty + report.byFloor.OUT.qty,
    amount:        report.byFloor['2F'].amount + report.byFloor['4F'].amount + report.byFloor.OUT.amount,
    disposalAmount: (report.byFloor['2F'].disposalAmount||0) + (report.byFloor['4F'].disposalAmount||0) + (report.byFloor.OUT.disposalAmount||0),
    repairAmount:   (report.byFloor['2F'].repairAmount||0) + (report.byFloor['4F'].repairAmount||0) + (report.byFloor.OUT.repairAmount||0),
  };
  const allTotalQty = report.total.qty;
  const incidents = (draft && draft.processIncidents) || {};
  const inputs    = (draft && draft.inputQty)         || {};
  const notes     = (draft && draft.notes)            || {};
  const totalIncidents = ERP_FLOORS.reduce((a, f) => a + (Number(incidents[f.key]) || 0), 0);
  const totalInputs    = ERP_FLOORS.reduce((a, f) => a + (Number(inputs[f.key])    || 0), 0);
  const calcRate = (defect, input) => (input && input > 0) ? (defect / input * 100) : null;
  const fmtRate = (r) => r === null ? null : (r >= 100 ? r.toFixed(1) : r.toFixed(2));
  return (
    <Fragment>
      {/* 1) 당일 종합 실적 */}
      <Card delay={100}>
        <CardHeader
          title={`당일 종합 실적${meta?.reportDate && meta.reportDate !== '미리보기' ? ' · ' + meta.reportDate : meta?.isDraft ? ' (미리보기)' : ''}`}
          sub={meta?.filename ? `출처 ${meta.filename}` : ''} />
        <div className="overflow-x-auto">
          <table className="w-full text-sm border-t border-slate-200 table-fixed">
            <colgroup>
              <col style={{ width: '160px' }} />
              <col style={{ width: '130px' }} />
              <col style={{ width: '120px' }} />
              <col style={{ width: '110px' }} />
              <col style={{ width: '100px' }} />
              <col style={{ width: '120px' }} />
              <col style={{ width: '120px' }} />
              <col style={{ width: '120px' }} />
              <col />
            </colgroup>
            <thead>
              <tr className="bg-slate-50 text-slate-700">
                <th rowSpan={2} className="px-4 py-3 text-center font-bold border-b border-r border-slate-200">구분</th>
                <th rowSpan={2} className="px-4 py-3 text-center font-bold border-b border-r border-slate-200 whitespace-nowrap">공정 이상발생</th>
                <th colSpan={6} className="px-4 py-2 text-center font-bold border-b border-r border-slate-200 bg-rose-50 text-rose-700">공정부적합</th>
                <th rowSpan={2} className="px-4 py-3 text-center font-bold border-b border-slate-200">비고</th>
              </tr>
              <tr className="bg-slate-50 text-slate-600 text-xs">
                <th className="px-3 py-2 text-center font-semibold border-b border-r border-slate-200">투입 수량</th>
                <th className="px-3 py-2 text-center font-semibold border-b border-r border-slate-200">발생수량</th>
                <th className="px-3 py-2 text-center font-semibold border-b border-r border-slate-200">부적합률</th>
                <th className="px-3 py-2 text-center font-semibold border-b border-r border-slate-200">폐기 비용</th>
                <th className="px-3 py-2 text-center font-semibold border-b border-r border-slate-200">수리 비용</th>
                <th className="px-3 py-2 text-center font-bold border-b border-r border-slate-200">합계</th>
              </tr>

              {ERP_FLOORS.map(f => {

                <td onClick={() => handleCellClick(null, '수리', 'TOTAL · 수리')}

                <td onClick={() => handleCellClick(null, null, 'TOTAL · 전체')}
                  className={`px-3 py-3 text-right text-slate-900 font-bold border-b-2 border-r border-slate-300 cursor-pointer select-none ${drillDown?.floor === null && drillDown?.dispositionType === null ? 'bg-amber-100 ring-1 ring-inset ring-amber-300' : 'hover:bg-amber-50/60'}`}>
                  {grandTotal.amount.toLocaleString('ko-KR')} <span className="text-xs font-normal">원</span>
